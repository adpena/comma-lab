# Artifact kind registry — committed source of truth for the lifecycle
# classifier (src/tac/artifact_lifecycle.py).
#
# Schema:
#   - pattern: <fnmatch glob relative to repo root>
#     kind: <LIVE_STATE | HISTORICAL_PROVENANCE | LIVE_RECIPE | DERIVED_OUTPUT | UNKNOWN>
#     rationale: <one-line explanation>
#     append_fields: [list]   # only meaningful for HISTORICAL_PROVENANCE
#
# This file is itself DERIVED_OUTPUT-shaped (it summarizes repo intent), but
# it is committed. First match wins (registry order matters).
#
# Cross-ref: feedback_codex_findings_meta_pattern_artifact_lifecycle_FIXED_20260508.md

# ---------------------------------------------------------------------------
# LIVE_STATE — transient session state, must be gitignored
# ---------------------------------------------------------------------------

- pattern: ".omx/state/active_lane_dispatch_claims.md.lock"
  kind: LIVE_STATE
  rationale: "fcntl lock file, transient per-session"

- pattern: ".omx/state/.commit-lock"
  kind: LIVE_STATE
  rationale: "subagent-commit-serializer lock"

- pattern: ".omx/state/commit-serializer.log"
  kind: LIVE_STATE
  rationale: "rolling JSONL log of commit serialization"

- pattern: ".omx/state/vastai_active_instances.json"
  kind: LIVE_STATE
  rationale: "live-fleet snapshot, regenerated per launch/destroy event"

- pattern: ".omx/state/.fs_cache/**"
  kind: LIVE_STATE
  rationale: "preflight filesystem cache; regenerated each run"

- pattern: ".claude/scheduled_tasks.lock"
  kind: LIVE_STATE
  rationale: "scheduler runtime lock"

- pattern: "/tmp/codex_runs/**"
  kind: LIVE_STATE
  rationale: "transient codex review session logs (pattern A canonical path)"

- pattern: "experiments/results/.codex_runs/**"
  kind: LIVE_STATE
  rationale: "transient codex review session logs"

- pattern: "**/__pycache__/**"
  kind: LIVE_STATE
  rationale: "Python bytecode cache, never commit"

- pattern: "**/*.pyc"
  kind: LIVE_STATE
  rationale: "Python compiled bytecode"

# ---------------------------------------------------------------------------
# HISTORICAL_PROVENANCE — append-only forensic records
# ---------------------------------------------------------------------------

- pattern: "experiments/results/recovered_*/recovery_metadata.json"
  kind: HISTORICAL_PROVENANCE
  rationale: "recovery audit; mutation in place destroyed Apr 30 timing (codex finding 5)"
  append_fields: [attempts, attempt_log, history]

- pattern: ".omx/state/lane_maturity_audit.log"
  kind: HISTORICAL_PROVENANCE
  rationale: "lane maturity gate transitions; append-only JSONL"
  append_fields: [entries, log_lines]

- pattern: ".omx/state/active_lane_dispatch_claims.md"
  kind: HISTORICAL_PROVENANCE
  rationale: "lane claims ledger, terminal rows append at top per CLAUDE.md"
  append_fields: [claims, rows]

- pattern: ".omx/state/current_focus.md"
  kind: DERIVED_OUTPUT
  rationale: "canonical operator focus snapshot; refreshed from latest ledgers and reports"

- pattern: ".omx/state/next_experiments.md"
  kind: DERIVED_OUTPUT
  rationale: "canonical operator queue snapshot; refreshed from latest ledgers and reports"

- pattern: ".omx/state/canonical_task_status.jsonl"
