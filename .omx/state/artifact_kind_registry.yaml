# Binary regen outputs under reports/graphs/** — reclassified to
# HISTORICAL_PROVENANCE 2026-05-09 (catalog #113 cleanup) because the
# regen-header rule is text-format-only by construction. Once a graph is
# rendered to .png/.jpg/.gif/.mp4 bytes, those bytes are an immutable
# snapshot that consumers can hash/compare; they cannot embed a 4KB
# header. The build pipeline still REGENERATES them on demand, but the
# committed bytes are the snapshot of "what the renderer produced".
- pattern: "reports/graphs/**/*.png"
  kind: HISTORICAL_PROVENANCE
  rationale: "regenerated plot image bytes; immutable snapshot of renderer output"
  append_fields: []

- pattern: "reports/graphs/**/*.jpg"
  kind: HISTORICAL_PROVENANCE
  rationale: "regenerated plot image bytes; immutable snapshot of renderer output"
  append_fields: []

- pattern: "reports/graphs/**/*.gif"
