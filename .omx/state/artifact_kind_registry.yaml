  rationale: "regenerated animated diagnostic bytes; immutable snapshot of renderer output"
  append_fields: []

- pattern: "reports/graphs/**/*.mp4"
  kind: HISTORICAL_PROVENANCE
  rationale: "regenerated comparison media bytes; immutable snapshot of renderer output"
  append_fields: []

# reports/graphs/**/*.mmd reclassified HISTORICAL_PROVENANCE 2026-05-09
