  rationale: "rebuilt roadmap status; do not freeze transient dirty-paths (codex finding 3)"

- pattern: "experiments/results/frontier_roadmap_status_*/rebuild_command.txt"
  kind: LIVE_RECIPE
  rationale: "frontier roadmap rebuild recipe (sister gate covers baked timestamps)"

- pattern: "reports/latest.md"
