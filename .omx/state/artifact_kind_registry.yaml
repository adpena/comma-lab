- pattern: ".omx/state/lane_registry.json"
  kind: DERIVED_OUTPUT
  rationale: "lane registry snapshot; mutated through tools/lane_maturity.py CLI only"

# reports/raw/**/*.json reclassified to HISTORICAL_PROVENANCE 2026-05-09
# (catalog #113). These are raw per-sweep result snapshots dating back to
# April 2026 — immutable forensic records of past experiments, not
# regenerated from current state. The narrower `reports/raw/**/*-summary.json`
# pattern below is now redundant but kept for documentation clarity.
- pattern: "reports/raw/**/*.json"
  kind: HISTORICAL_PROVENANCE
  rationale: "raw per-sweep result snapshot; immutable forensic record of past experiment"
  append_fields: []

- pattern: "experiments/results/**/predispatch_sanity_report.json"
  kind: DERIVED_OUTPUT
  rationale: "predispatch sanity gate report; regenerable"

- pattern: "experiments/results/**/dispatch_plan.json"
