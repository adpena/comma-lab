predicted_delta: |
  NULL after V1/V2/V3 disambiguator probe + before any new D4 probe on a
  selected channel. Measured 2026-05-18 diagnostic outcomes:
    - V1 dense full-PQ: NOT SHIPPABLE; +0.518 rate cost dwarfs any plausible
      ΔS gain; diagnostic only.
    - V2 sparse top-k: MEANINGFUL MI 2.4574 but high-cardinality upper-bound only
      (unique_fraction=1.0) and 7,941 Brotli bytes; not dispatch authority.
    - V3 pool-shared: SHIPPABLE at 3,114 Brotli bytes but WEAK MI 0.121512;
      not dispatch authority.
    - Cached scorer-softmax sketches: all byte-closed under 2KB and no
      high-cardinality guard, but best MI only 0.076162617811; not dispatch
      authority.
  Predicted band scales with disambiguator outcome:
    - MEANINGFUL_CONDITIONING (MI >= 0.5 on V3 SHIPPABLE): [-0.015, -0.005] rate-axis
    - WEAK_CONDITIONING (0.01 <= MI < 0.5 on V3 SHIPPABLE): [-0.005, -0.002] rate-axis
    - INDEPENDENT on V3: pivot to V2 ARGUABLE; if V2 ALSO INDEPENDENT pivot per
      ATW V2 symposium Revision #4 (DIFFERENT base substrate OR G2-PARTIAL).

predicted_delta_basis: |
  .omx/research/atw_v2_1_faiss_ivf_pq_substrate_design_memo_20260518.md §5 + §6.3
  + .omx/research/council_per_substrate_symposium_atw_v2_reactivation_20260518.md (parent symposium)
  + .omx/state/atw_v2_1_byte_closed_side_info_probe.json (existing 323-byte WEAK_CONDITIONING anchor)
  + .omx/state/atw_v2_1_scorer_softmax_sketch_probe.json (cached scorer-softmax sketch WEAK anchor)
  Dykstra-feasibility intersection of 4 polytopes per design memo §5:
    - Atick-Redlich rate constraint: R_AR >= H(X) - I(X; Y_cooperative)
    - IB constraint: I(X;T) - beta*I(T;Y) <= K_IB (Tao+Boyd Blahut-Arimoto floor)
    - Wyner-Ziv side-info constraint: R_WZ >= R(D) - I(X; Y_side_PQ_encoded)
    - Contest rate budget: 25 * archive_bytes / 37545489
  Intersection polytope non-empty IFF: I(X; Y_side_PQ) on shipped bytes >= 0.5 bits/symbol
  AND archive_bytes added <= ~5KB (V3 pool-shared regime).

literature_anchor: |
  - Atick & Redlich (1990) "Towards a theory of early visual processing"
    Neural Computation 2(3):308-320 (cooperative-receiver theorem; channel #2 ranking)
  - Tishby, Pereira & Bialek (1999) "The information bottleneck method" Proc. 37th Allerton
  - Wyner & Ziv (1976) "The rate-distortion function for source coding with side information
    at the decoder" IEEE Trans Info Theory 22(1):1-10
  - Jégou, Douze & Schmid (2011) "Product quantization for nearest neighbor search"
    IEEE PAMI 33(1):117-128 (canonical Faiss-IVF-PQ algorithm)
  - Faiss 1.8 (2024) GitHub `facebookresearch/faiss` (GPU-accelerated PQ)
  - ATW V2 reactivation symposium 2026-05-18 (Revisions #1-#7 binding)
  - Comprehensive research wave 2026-05-18 §0 (TOP-5 #3)
  Source-supports: paper-grade information-theoretic + cooperative-receiver bounds
  + canonical Faiss IVF-PQ algorithm Jégou-Douze-Schmid 2011.
  PACT must prove: the Faiss-IVF-PQ encoded per-region SegNet softmax histogram
  channel or successor trained residual/raw-logit channel produces MI >= 0.5
  bits/symbol against A1 latents at <2KB per pair OR <5KB total (V3 pool-shared
  regime), measured via a byte-closed local disambiguator before any paid Modal
  A100 dispatch authorizes.

paper_claim_scope: |
  Atick-Redlich 1990 establishes cooperative-receiver loss is provably optimal
  for known downstream receiver R. Tishby IB 1999 establishes encoder p*(t|x)
  is closed-form modulo numerical tractability. Wyner-Ziv 1976 establishes
  R_WZ(D) = R_X|S(D) <= R(D) for side-info at decoder. Jégou-Douze-Schmid 2011
  establishes PQ as approximate vector quantization with bounded reconstruction
  error. All four bounds are theoretical; PACT must prove the Faiss-IVF-PQ
  realization preserves enough I(X; Y_side) at the shipped-bytes budget to
  beat the existing 323-byte WEAK_CONDITIONING anchor (MI=0.047 bits/symbol).

pact_must_prove: |
  V2-1 Faiss-IVF-PQ encoded channel produces:
    (a) MI >= 0.5 bits/symbol on V3 pool-shared variant at <5KB total archive
        contribution (V1/V2/V3 disambiguator probe; $0 CPU local M5 Max).
    (b) Contest-CUDA + contest-CPU paired score in the predicted band
        conditional on disambiguator outcome (Modal A100 smoke + paired exact
        eval per CLAUDE.md "Submission auth eval — BOTH CPU AND CUDA").

decode_complexity_evidence: |
  Inflate runtime ~200 LOC (substrate_engineering waiver per HNeRV L4 + L7);
  inherits ATW V2's inflate.py + adds Faiss codebook decode (<1ms per pair per
  Jégou-Douze-Schmid 2011 benchmark; total <600ms for 600 pairs).
  Dependencies: torch + brotli + numpy + faiss-cpu (4 total; +1 vs V2; HNeRV L4
  substrate_engineering waiver).
  Per-pair compute: 1 forward through decoder + WZ side-info head + Faiss
  reconstruct (~ms each) + range decode of z_residual via G1 CDF (~ms per 600 pairs).
  Total inflate budget << contest 30-min runtime.

