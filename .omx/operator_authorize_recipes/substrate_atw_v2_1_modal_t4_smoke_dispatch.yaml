# RESEARCH-ONLY recipe at landing per CLAUDE.md "Substrate scaffolds MUST be
# COMPLETE or RESEARCH-ONLY" + Catalog #240 + Catalog #324 + Catalog #325
# per-substrate symposium-evidence requirement.
#
# ATW V2-1 is the substrate-engineering successor of ATW V2 that replaces V2's
# `scorer_class_prior_table_fp16` slot (currently per-pair argmax composite
# collapsed to 2 unique signatures per the 2026-05-16 D4 INDEPENDENT verdict)
# with Faiss-IVF-PQ encoded per-region SegNet softmax histograms (Atick
# ranking #2 channel; per ATW V2 reactivation symposium 2026-05-18).
#
# Dispatch is GATED on FOUR reactivation criteria (per design memo §12):
#   1. ``uv pip install faiss-cpu`` locally on dispatch machine (done 2026-05-18)
#   2. V1/V2/V3 disambiguator probe lands MI + byte-budget verdict per variant
#      (done 2026-05-18; see .omx/state/atw_v2_1_faiss_pq_disambiguator_probe.json)
#   2b. Cached scorer-softmax sketch probe tests the immediately available
#      non-PQ scorer-derived sketches (done 2026-05-18; all byte-closed but WEAK,
#      see .omx/state/atw_v2_1_scorer_softmax_sketch_probe.json)
#   3. Z6 Wave 2 4c outcome lands per ATW V2 symposium Revision #5
#      cross-pollination binding (done 2026-05-18; zero-epoch full/identity
#      exact eval did NOT validate scorer-logit channel at delta >= 0.005)
#   4. Wave 3 sextet pact symposium ratifies V2-1 channel pick per Catalog #325
#   5. New D4 probe on selected V2-1 channel returns MEANINGFUL_CONDITIONING
#      (MI >= 0.5 bits/symbol per cooperative-receiver threshold)
#   6. Catalog #324 post-training Tier-C validation declared
#   7. Catalog #270 dispatch optimization protocol verdict PASS
