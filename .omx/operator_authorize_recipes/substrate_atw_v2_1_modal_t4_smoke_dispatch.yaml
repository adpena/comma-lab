      top-k ARGUABLE (+0.011 rate cost; net -0.004 if MI clears 0.5); V3
      pool-shared SHIPPABLE (+0.003 rate cost; sister to existing 323-byte
      probe at WEAK MI=0.047). Local M5 Max disambiguator probe $0 cost MUST
      run before any paid dispatch.

  (b) FAISS-CPU DEPENDENCY — +1 dep beyond HNeRV L4 budget (3 → 4 with
      substrate_engineering waiver); first-pass Modal smoke validates wheel
      size + import cost.

  (c) CROSS-POLLINATION DEPENDENCY — V2-1 channel pick AWAITS Z6 4c outcome
      per ATW V2 symposium Revision #5; sequencing dependency.

  (d) CODEBOOK GENERALIZATION — trained on contest video only (no held-out
      split); per CLAUDE.md mutation frontier this is the canonical contest
      workflow.

