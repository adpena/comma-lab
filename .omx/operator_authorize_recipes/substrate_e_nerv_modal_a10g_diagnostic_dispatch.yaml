schema_version: 1
name: substrate_e_nerv_modal_a10g_diagnostic_dispatch
lane_id: lane_e_nerv_l0_scaffold_20260520
summary: |
  e_nerv L0 SCAFFOLD diagnostic recipe (Modal A10G). This recipe pairs with
  experiments/train_substrate_e_nerv.py (BUILD-1 NeRV-trio queue fill
  2026-05-20). NOT DISPATCH-ELIGIBLE: substrate is research_only until the
  Phase 2 council symposium per CLAUDE.md "PER-SUBSTRATE OPTIMAL FORM via
  adversarial grand council symposium" (Catalog #325) lands AND the canonical
  src/tac/substrates/e_nerv/ package migration completes (currently the
  substrate library lives at src/tac/e_nerv_as_renderer.py in legacy
  monolithic format).

  Sister recipe substrate_e_nerv_modal_a100_dispatch.yaml (legacy 2026-05-13)
  pairs with the OLD experiments/train_e_nerv_as_renderer.py scaffold-only
  trainer and is preserved per CLAUDE.md HISTORICAL_PROVENANCE Catalog #110/#113.

dispatch_enabled: false
research_only: true

dispatch_blockers:
  - per_substrate_council_symposium_pending_per_catalog_325
  - canonical_substrate_package_migration_pending
  - full_main_raises_NotImplementedError_per_catalog_240
  - phase_2_council_approval_required_to_lift_research_only_per_catalog_315

platform: modal
gpu: "${MODAL_GPU:-A10G}"
min_vram_gb: 22
# Catalog #215: A10G smoke-phase pinning per NeRV-family timeout precedent.
min_smoke_gpu: "A10G"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: sane_hnerv

cost_band:
  epochs: 100
  all_flags_on: false
  hand_calibrated_fallback_p50_usd: 1.10
  platform_key: modal
  gpu_key: A10G

predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: |
  Post-training Tier-C density re-measurement via
  tools/mdl_scorer_conditional_ablation.py --tier c on the landed archive
  after Phase 2 council symposium per Catalog #325 admits the substrate for
  full-mode training. Pre-training prediction is CARGO-CULTED per Catalog
  #324 + sister C6 IBPS 22x miss empirical anchor 2026-05-17.

predicted_score_target: "unknown_l0_scaffold_pending_council_symposium"
predicted_delta: "unknown_l0_scaffold_no_empirical_anchor"
literature_anchor: "Li et al. NeurIPS 2022 'E-NeRV: Expedite Neural Video Representation' arXiv:2207.08132"

risk: |
  L0 SCAFFOLD posture. The trainer experiments/train_substrate_e_nerv.py
  raises NotImplementedError on the non-smoke path per Catalog #240. The
  recipe is dispatch_enabled:false + research_only:true so the
  operator-authorize harness refuses to fire a paid dispatch.

  Architectural distinction vs sane_hnerv canary: e_nerv adds an explicit
  compress-time encoder (ENeRVEncoder) that maps frame pairs to a structured
  latent space. The encoder is NOT shipped in the archive (compress-time
  only per strict-scorer-rule discipline); only the decoder + per-pair
  latents ship. Hypothesis: structured encoder learns a more compact latent
  space than the pure-table approach, reducing latent_blob bytes at fixed
  reconstruction quality.

  Phase 2 council symposium MUST evaluate per Catalog #325 6-step contract.

envelope_status: |
  RESEARCH_ONLY: dispatch refused per recipe + trainer + 4 catalog gates
  (#220 + #240 + #315 + #325). Reactivation criteria documented in trainer
  _full_main docstring + this recipe's dispatch_blockers + lane registry
  notes.

remote_driver: scripts/remote_lane_substrate_e_nerv_l0_scaffold.sh
timeout_hours: 1.5

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv
  - flag: --output-dir
    note: "required (no default); operator must thread"

modal:
  lane_script: scripts/remote_lane_substrate_e_nerv_l0_scaffold.sh
  cost_band_trainer: experiments/train_substrate_e_nerv.py
  cost_band_epochs: 100
  cost_band_batch_size: 2
  cost_band_all_flags_on: false

required_input_files_trainer: experiments/train_substrate_e_nerv.py

env_overrides:
  E_NERV_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  E_NERV_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  E_NERV_OUTPUT_DIR: /workspace/pact/lane_e_nerv_l0_scaffold_results/output
  E_NERV_EPOCHS: "2"
  E_NERV_UPSTREAM_DIR: /workspace/pact/upstream
  E_NERV_DEVICE: cpu
  E_NERV_SMOKE: "1"
  SMOKE_ONLY: "1"
  LOCAL_CUDA_WORKER: "0"

dependencies:
  - scripts/remote_lane_substrate_e_nerv_l0_scaffold.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_e_nerv.py
  - src/tac/e_nerv_as_renderer.py
  - src/tac/substrates/_shared/trainer_skeleton.py
  - src/tac/differentiable_eval_roundtrip.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)

sentinel_files:
