  - src/tac/substrates/_shared/trainer_skeleton.py
  - src/tac/differentiable_eval_roundtrip.py

reactivation_criteria: |
  1. Per-substrate adversarial grand council symposium per Catalog #325
     returns PROCEED or PROCEED_WITH_REVISIONS verdict for e_nerv specifically.
  2. Canonical src/tac/substrates/e_nerv/ package migration lands with
     architecture.py + archive.py + inflate.py + score_aware_loss.py
     matching tc_nerv structure.
  3. submissions/e_nerv_substrate/inflate.{py,sh} smoke proves a
     contest-compliant 3-positional-arg runtime per Catalog #146.
  4. Trainer experiments/train_substrate_e_nerv.py _full_main path
     replaces NotImplementedError with real score-aware Lagrangian + EMA
     + canonical auth-eval helper invocation per Catalog #226.
  5. Recipe research_only flips from true to false; dispatch_enabled
     flips from false to true; predicted_band declared with
     validation_status per Catalog #324.

notes: |
