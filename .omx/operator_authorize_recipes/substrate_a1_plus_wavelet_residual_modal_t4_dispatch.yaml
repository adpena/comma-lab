predicted_band: [0.180, 0.210]
predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: "Catalog #324: before promotion or full-run score-band authority, measure Tier-C density on the post-training A1+wavelet smoke archive and replace this pending status with validated_post_training plus artifact path; until then the band is planning-only, not dispatch/promotion authority."

risk: |
  META-COUNCIL §6b highest-EV/$ competing path retarget.  The wavelet
  residual scaffold previously L2 against PR106 r2 has NEVER been
  retargeted to A1 base; A1's pose-axis headroom is empirically unknown.
  This dispatch establishes the H3 (A1 saturation) prior at 5-25× the
  cost of A1+LAPose ($0.20-1 vs $4-5).

  A1 substrate is FROZEN (loaded verbatim from archive.zip SHA
  87ec7ca5f2f328a8acdfc65f5cce0ab08a3a558eae88f36d4140870f141492b5
  unzipped to 178,162 B "x" blob SHA 8e664385...).  Only the wavelet
  residual head is trained — per-pair low-rank K=1 coefficient outer
  product per detail band (LH/HL/HH) × 2 frames × 3 RGB channels at
  a half-camera foveal patch (default 64x64 = 128x128 at camera-native
  after DB4 IDWT).

  Sidecar overhead empirically observed at ~40-200 B for zero-init
  coefficients (brotli compresses sparse residuals very well); after
  training the upper bound stays under the D2 ≤500 B target with high
  margin.

  Per CLAUDE.md "Submission auth eval — BOTH CPU AND CUDA" non-negotiable,
  this lane requires BOTH `[contest-CUDA]` (inline) AND `[contest-CPU]`
  (Linux x86_64 separate dispatch) before promotion.  First-anchor
  dispatch is CUDA-only; CPU axis follow-up is a separate operator step.

  Smoke-before-full pattern (Catalog #167): the operator-authorize wrapper
  routes through `tools/run_modal_smoke_before_full.py` which fires a
  100-epoch ~$0.15 Modal T4 smoke FIRST, validates rc=0 + auth-eval JSON
  present + score in plausible band [0.15, 0.25], then fires the full
  2000-epoch T4 dispatch only on smoke-green.

  Additional pre-smoke macOS-CPU gate (operator pre-approved 2026-05-13):
  the wrapper runs `tools/score_macos_cpu_advisory_proxy.py` on the smoke
  archive before Modal smoke is fired.  macOS-CPU score outside
  [0.187, 0.200] refuses the chain at the local $0 surface.

envelope_status: "FITS $5 envelope at p50 fallback (macOS-CPU $0 + smoke $0.15 + full $0.60)"

