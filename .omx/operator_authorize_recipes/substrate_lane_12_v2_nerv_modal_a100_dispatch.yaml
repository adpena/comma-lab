dispatch_enabled: false
research_only: false
substrate_tradition: TRADITION_2
defer_reason: |
  Remote driver scripts/remote_lane_substrate_lane_12_v2_nerv.sh LANDED
  2026-05-13 (WAVE-6-FOLLOWUP-MULTI) per the canonical sane_hnerv/cnerv
  pattern (Catalog #2 set -euo pipefail; Catalog #11 NVDEC probe; Catalog
  #163 sentinel-sourced bootstrap; driver-version-pinned torch via
  bootstrap_runtime_deps; Catalog #152 required-input file existence
  pre-dispatch validation PLUS Catalog #150 Phase B auth memo pre-flight
  validation — refuses /tmp/ and ~/.claude anchors before GPU spend;
  heartbeat + watchdog + lane-claim terminal-status update; cost-band
  anchor emission).

  Remaining blocker: per .omx/research/lane_12_v2_nerv_as_renderer_phase_a_design_20260509.md
  and lane registry notes — Phase B (the $40 CUDA dispatch on score-aware
  loss) is gated behind 5 reactivation preconditions. `--auth-eval`
  requires `--phase-b-auth-memo` (Catalog #150 STRICT) — the auth memo
  must live in .omx/research/operator_authorizations/ and be committed.

  Per Catalog #150, dispatch with --auth-eval is REFUSED until the auth
  memo is committed and the Phase B preconditions are met. Dispatch
  WITHOUT --auth-eval is permitted (smoke or archive-only training);
  the trainer's `--auth-eval` switch is opt-in via LANE_12_V2_PHASE_B_AUTH_MEMO
  env-var.

dispatch_blockers:
  - phase_b_preconditions_not_met
  - operator_phase_b_authorization_memo_required_per_catalog_150

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
# Catalog #215 (FIX-HARDEN-OPT 2026-05-14 P0): A100 full-run requires
# matching smoke-phase compute class. SIREN smoke timed out on T4 default
# (rc=124 at 3601s wall-clock 2026-05-13); coordinate-MLP / NeRV-family
# substrates won't complete 100-epoch smoke on T4 within timeout. Declaring
# min_smoke_gpu pins the smoke phase to A100 too; the CLI --smoke-gpu T4
# default is overridden. Backfilled by RECIPE-CANON-BACKFILL-SUBAGENT
# 2026-05-14 (lane_recipe_canon_backfill_sweep_20260514).
min_smoke_gpu: "A100"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: sane_hnerv

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 5.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: "Phase B target: <0.21 sub-Quantizr-band [predicted; council Phase A design]"
predicted_delta: "Phase B prediction: -0.020 to -0.080 vs PR101 0.193 [predicted; design memo $9]"
predicted_delta_basis: ".omx/research/lane_12_v2_nerv_as_renderer_phase_a_design_20260509.md"
literature_anchor: "Lane 12 v2 — NeRV-as-renderer rescope per HNeRV retrospective lesson 5 (paradigm_alpha clarification 2026-05-06; replaces mask-only Lane 12)"

risk: |
  TRADITION 2 substrate. Trainer is the most production-mature in the
  TRADITION 2 set (479 LOC + 20 tests + ALL CLAUDE.md non-negotiables wired:
  eval_roundtrip True + EMA 0.997 snapshot+restore + differentiable YUV6 +
  score-aware Lagrangian + CUDA-required default + no MPS + no /tmp + Phase B
  Option C auth_memo_path Catalog #150).

  Phase B authorization gate: `--auth-eval` is REFUSED unless
  `--phase-b-auth-memo` points to a committed repo-relative file under
  .omx/research/operator_authorizations/ that contains
  `operator_phase_b_authorization=true` outside any code-fence. This is
  STRICT per Catalog #150.

  Architectural note: 8-archive-grammar-fields declared at design time per
  Catalog #124 (archive_grammar=L12V_monolithic_single_file_0_bin
  parser_section_manifest=ARCHIVE_GRAMMAR_constant_in_module
  inflate_runtime_loc_budget=100 runtime_dep_closure=torch+brotli
  export_format=monolithic_single_file_0_bin_with_int8_per_tensor_fp16_scales
  score_aware_loss=gradient_through_FastViT-T12_PoseNet_and_EfficientNet-B2_SegNet_on_upstream_videos_0_mkv
  bolt_on_loc_budget=350 no_op_detector_planned=true_via_test_archive_roundtrip_via_inflate_module).

  TIER manifest gap: trainer has `--enable-differentiable-yuv6` and
  `--enable-score-aware-loss` flags but no formal TIER_<N>_OPERATOR_REQUIRED_FLAGS
  manifest yet. Catalog #151 STRICT will require the manifest before wrapper
  unification.
envelope_status: "DEFERRED: Phase B auth gate (remote driver landed)"

remote_driver: scripts/remote_lane_substrate_lane_12_v2_nerv.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv
  - flag: --output-dir
    note: "required (no default); operator must thread"
  - flag: --phase-b-auth-memo
    note: "REQUIRED to enable --auth-eval (Catalog #150); points to committed memo under .omx/research/operator_authorizations/"

argparse_inventory:
  trainer: experiments/train_lane_12_v2_nerv_as_renderer.py
  flags:
    - --output-dir (Path, required)
    - --device (cuda|cpu, default=cuda; mps REFUSED at argparse level)
    - --epochs (int, default=200)
    - --batch-size (int, default=8)
    - --learning-rate (float, default=1e-3)
    - --ema-decay (float, default=0.997)
    - --latent-dim (int, default=16)
    - --base-channels (int, default=36)
    - --n-pairs (int, default=600)
    - --lambda-seg (float, default=100.0)
    - --lambda-pose (float, default=288.6751345948129)
    - --grad-clip-norm (float, default=1.0)
    - --video-path (Path, default=upstream/videos/0.mkv)
    - --max-pairs (int, default=None)
    - --enable-differentiable-yuv6 (bool, default=True)
    - --enable-score-aware-loss (bool, default=True)
    - --seed (int, default=20260511)
    - --smoke (bool, default=False)
    - --auth-eval (bool, default=False; REFUSED unless --phase-b-auth-memo)
    - --phase-b-auth-memo (str, default=None; Catalog #150 gate)
    - --eval-every-epochs (int, default=25)

env_overrides:
  LANE_12_V2_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  LANE_12_V2_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
