  LANE_12_V2_EPOCHS: "2000"
  LANE_12_V2_BATCH_SIZE: "8"
  LANE_12_V2_UPSTREAM_DIR: /workspace/pact/upstream
  LANE_12_V2_DEVICE: cuda
  LANE_12_V2_PHASE_B_AUTH_MEMO: ""  # operator must populate with committed repo path
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - tools/claim_lane_dispatch.py
  - tools/append_cost_band_anchor.py
