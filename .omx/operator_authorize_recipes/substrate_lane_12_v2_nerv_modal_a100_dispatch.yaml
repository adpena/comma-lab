reactivation_criteria: |
  1. TIER_<N>_OPERATOR_REQUIRED_FLAGS manifest landed in the trainer
     (council review required; advisory blocker — does not block dispatch).
  2. Operator-Phase-B-authorization memo committed at .omx/research/
     operator_authorizations/phase_b_auth_lane_12_v2_<YYYYMMDD>.md with
     line-level `operator_phase_b_authorization=true` outside any code-fence
     (REQUIRED for --auth-eval; OPTIONAL for archive-only training).
  3. Phase B 5 reactivation preconditions per Phase A design memo $6 met
     (REQUIRED for the $40 CUDA Phase B dispatch).
  4. Local smoke verifies inflate.sh emits a contest-compliant 0.bin.
  5. Catalog #152 validates --video-path resolves before dispatch.

