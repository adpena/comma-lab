predicted_score_target: null
# Catalog #324 enforcement: this recipe declares
# predicted_band_validation_status: pending_post_training (NOT a numeric band)
# because the IBPS random-init Tier-C density is empirically falsified as a
# valid predictive basis. The 50ep smoke + post-training Tier-C
# re-measurement is required BEFORE any predictive band can be committed.
predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: "Catalog #324 + #848 symposium parallel-path-(a): dispatch remains disabled until (a) 50ep Modal A10G smoke lands with archive + auth-eval evidence, (b) post-training Tier-C density measurement replaces random-init basis, (c) revised predicted band is committed based on empirical evidence. If smoke score < baseline 3.04 with seg_contribution < pose_contribution, the β_ib=0.0001 (100× LESS compression) operating point is confirmed as MacKay's rate-distortion-curve-knee disambiguator and Lagrangian-multiplier-IS-cargo-cult HARD-EARNED."
smoke_score_band: [0.10, 0.50]
predicted_delta: "pending_post_training_tier_c_re_measurement per Catalog #324; baseline C6 IBPS at β_ib=0.01 produced 3.04 [contest-CPU advisory] (22× outside random-init derived band [0.113, 0.163]); reactivation path (a) hypothesis is that 100× LESS IB regularization preserves SegNet-relevant features per MacKay MDL rate-distortion curve analysis"
predicted_delta_basis: "#848 C6 IBPS symposium MacKay MDL verdict (verbatim §2: 'The 22× miss may indicate the curve is steeper than predicted OR has multiple local minima; both hypotheses are tested by the β sweep') + Contrarian binding revision (parallel paths (a)+(b) under $5 envelope) + Catalog #324 META-FIX (pending post-training Tier-C validation required for any predicted_band)"
provenance_kind: empirical_anchor_pending_smoke
literature_anchor: |
  MacKay (2003) "Information Theory, Inference, and Learning Algorithms" chs. 28-30 — MDL
    principle; rate-distortion curve; Lagrangian-multiplier-as-operating-point;
  Tishby & Zaslavsky (2015) "Deep Learning and the Information Bottleneck Principle"
    IEEE Info. Theory Workshop DOI 10.1109/ITW.2015.7133169 — β-VAE rate-distortion;
  Alemi et al. (2017) "Deep Variational Information Bottleneck" ICLR — β capacity scaling
    for IB; β-sweep canonical methodology;
  Rissanen (1978) "Modeling by shortest data description" Automatica 14:465-471;
  Higgins et al. (2017) "β-VAE: Learning Basic Visual Concepts with a Constrained
    Variational Framework" ICLR — β as capacity-disentanglement tradeoff knob.

source_supports: |
  MacKay (2003) chs. 28-30 establishes that the Lagrangian multiplier β in the IB
  formulation L = D + β·R selects an operating point on the rate-distortion curve;
  different β values trace out the curve (HARD-EARNED at MDL theory level).
  Tishby-Zaslavsky 2015 + Alemi et al. 2017 + Higgins et al. 2017 collectively
  establish that β-sweep is the CANONICAL methodology for finding the optimal
  operating point in variational IB (HARD-EARNED at neural-IB methodology level).
  #848 symposium MacKay verbatim verdict confirms the framework applies to the
  C6 IBPS empirical falsification at β_ib=0.01.

paper_claim_scope: |
  Source theorems establish that (a) β values trace the rate-distortion curve and
  (b) optimal β depends on task complexity + dataset structure. NEITHER paper
  makes claims about β_ib=0.0001 being optimal for the Pact contest scorer
  (PoseNet + SegNet on 600 pair contest video). That surface IS the C6 IBPS
  β_ib=0.0001 sweep empirical anchor target via the 50ep Modal A10G smoke +
  paired CPU/CUDA auth-eval.

pact_must_prove: |
  C6 IBPS β_ib=0.0001 (100× LESS IB regularization than baseline) must empirically
  prove on paired CPU/CUDA: (a) the lower β preserves SegNet-relevant features
  (chromaticity, structure) better than baseline; (b) the score_seg_contribution
  decreases below baseline 2.60; (c) reduced KL-regularization does not destroy
  pose preservation; (d) the smoke score lands < baseline 3.04 — IF YES →
  100× LESS β confirmed as rate-distortion-curve-knee disambiguator per MacKay
  hypothesis; advance to β_ib=0.001 + paired-CPU; IF NO → DEFER-pending-research
  per Catalog #308 alternative-probe-methodologies (combine β-sweep with sister
  #846 latent_dim sweep for 2D ablation; or pivot to path (c) Phase 2 redesign
  per #848 Tishby dual-latent + Atick scorer-conditioning hypotheses).

decode_complexity_evidence: |
  Inflate runtime is the same vendored C6 IBPS substrate package (no LOC delta).
  Per-pair decoder forward: same SIREN PixelShuffle blocks; β_ib does not affect
  decoder architecture or inflate path (only the training-time loss). Total
  per-video inflate IDENTICAL to baseline C6 (within 30 min contest budget).

risk: |
  C6 IBPS β_ib=0.0001 sweep BUILD trainer extension IS complete (zero LOC delta;
  --beta-ib already wired via TIER_1_OPERATOR_REQUIRED_FLAGS line 176; the
  argparse flag at trainer line 233 is the canonical entry point). The recipe
  is intentionally non-dispatchable (`research_only: true`, `dispatch_enabled:
  false`) pending #848 symposium parallel-path-(a) operator sign-off + Catalog
  #167 smoke-before-full gate + Catalog #324 post-training Tier-C re-measurement.

  Architectural risk:
  - The β_ib=0.0001 regularization may be TOO WEAK — the IB bottleneck z may
    collapse to memorization (effectively encoding the input frames into z
    without compressing). If reconstruction loss dominates and KL barely
    contributes, the latent space may not generalize to held-out pairs at
    inference time. If smoke seg_contribution remains > 1.0 OR pose_contribution
    spikes, the next iteration is β_ib=0.001 (more KL pressure).
  - The encoder + decoder + per-pair latent compose with brotli but β only
    affects training; archive bytes UNCHANGED at ~225 KB. If archive grows
    after β-sweep training (less compression-amenable weights), the rate term
    penalty dominates.
  - β_ib=0.0001 may converge slowly (less compressed gradient signal). 50ep
    smoke may be insufficient; if loss has not stabilized, schedule a 100ep
    follow-up.

  Modal A10G is the minimum smoke GPU per baseline C6 recipe + the canonical
  A10G minimum after the 2026-05-14 100ep T4 timeout finding. Helper
  `tools/run_modal_smoke_before_full.py` honors `min_smoke_gpu: "A10G"`.

  Per CLAUDE.md "Auth eval EVERYWHERE" the dispatch MUST end with CUDA auth
  eval on EMA shadow + paired CPU eval per "Submission auth eval — BOTH CPU
  AND CUDA".

envelope_status: "FITS $0.50 smoke envelope at A10G p50 fallback ($0.30); paired CPU adds $0.20; total $0.50 per β_ib=0.0001 dispatch"

