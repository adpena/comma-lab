# C6 IBPS reactivation path (a) — β_ib=0.0001 (100x BELOW baseline 0.01) Wave 2 BUILD
# recipe per #848 C6 IBPS symposium parallel-path (a) MacKay MDL verdict + Contrarian
# binding revision (parallel paths (a) + (b) under $5 envelope cap).
#
# Architecture: same C6 IBPS substrate as baseline; ONLY change is β_ib=0.0001 vs
# baseline 0.01. Param breakdown UNCHANGED (latent_dim=24 baseline; β_ib is a
# Lagrangian multiplier on the IB regularizer, not an architectural parameter).
#
# Cargo-cult unwound per the #848 symposium MacKay verdict:
#   - CC-Lagrangian-Multiplier: baseline β_ib=0.01 may be the WRONG operating point
#     on the rate-distortion curve. Per MacKay verbatim (#848 §2): "The 22× miss
#     may indicate (a) the curve is steeper than predicted at β=0.01 OR (b) the
#     curve has multiple local minima and we're stuck in a bad one. Both
#     hypotheses are tested by the β sweep."
#
# Empirical hypothesis (per MacKay MDL framework + #848 symposium):
#   - β_ib=0.0001 = 100× LESS compression pressure than baseline. The IB
#     regularizer barely penalizes mutual information I(z;frames), so reconstruction
#     fidelity DOMINATES. Hypothesis: lower β preserves more SegNet-relevant
#     features (chromaticity, edge structure).
#   - IF β_ib=0.0001 smoke → score significantly < baseline 3.04 AND
#     seg_contribution < pose_contribution → Lagrangian-multiplier IS the cargo-cult;
#     baseline β_ib=0.01 was over-regularized for SegNet preservation.
#   - IF β_ib=0.0001 smoke ≈ baseline 3.04 → β-tuning alone insufficient; pivot
#     to path (c) Phase 2 cargo-cult-unwind redesign per #848 Tishby + Atick verdicts.
#
# Per CLAUDE.md "Substrate scaffolds MUST be COMPLETE or RESEARCH-ONLY" (Catalog
# #240) the recipe remains `research_only: true` + `dispatch_enabled: false` at
# THIS landing. The trainer extension IS complete (no NotImplementedError);
# the recipe research_only flag expresses the pre-dispatch operator-sign-off gate.
# Flip to `dispatch_enabled: true` is the operator's explicit decision per the
# #848 symposium parallel-path-(a) authorization.
research_only: true
dispatch_enabled: false
dispatch_blockers:
  - sym848_op_routable_path_a_requires_operator_sign_off_for_beta_ib_sweep_dispatch
  - catalog_167_smoke_before_full_pattern_required_at_dispatch_time
  - catalog_324_predicted_band_validation_status_pending_post_training_tier_c_required_before_promotion
  - paired_cpu_cuda_empirical_anchor_required_before_promotion_eligible_per_catalog_220
summary: |
  C6 IBPS reactivation path (a) — β_ib=0.0001 (100× BELOW baseline) Wave 2 BUILD
  recipe per #848 C6 IBPS symposium parallel-path (a) MacKay MDL verdict.

  Architecture: same C6 IBPS substrate (IBEncoder + IBDecoder + per-pair latents,
  latent_dim=24 baseline) as baseline; ONLY change is β_ib=0.0001 vs baseline
  0.01. Param breakdown UNCHANGED (β_ib is a Lagrangian multiplier on the IB
  regularizer, not an architectural parameter).

  Hypothesis: per MacKay MDL framework, baseline β_ib=0.01 may be on the wrong
  side of the rate-distortion curve knee. β=0.0001 represents 100× LESS
  compression pressure on I(z; frames); the IB regularizer barely penalizes
  mutual information, so reconstruction fidelity DOMINATES. This preserves more
  SegNet-relevant features (chromaticity, edge structure) per the rate-
  distortion-as-MDL framework.

  Predicted ΔS band: TBD_post_training_tier_c_re_measurement_required per
  Catalog #324. Pre-training Tier-C density estimate is NOT a valid predictive
  band (sister #836 empirical bug class anchor: C6 baseline random-init Tier-C
  2.67e-5 produced predicted band [0.113, 0.163]; actual 50ep smoke 3.04, 22×
  outside upper). This recipe declares predicted_band_validation_status:
  pending_post_training and requires a 50ep smoke + post-training Tier-C
  re-measurement BEFORE any predictive band is committed.

  Param breakdown (UNCHANGED from baseline latent_dim=24):
    encoder = 35,664 params
    decoder = 78,818 params
    latents = 14,400 params (600 pairs × 24 latent_dim)
    TOTAL   = 128,882 params
    per-pair int8 = 14,400 bytes (unchanged)
    archive estimate: ~225 KB (unchanged; β_ib does not affect archive bytes)

platform: modal
gpu: "${MODAL_GPU:-T4}"
min_vram_gb: 16
min_smoke_gpu: "A10G"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - contest_generalized
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: c6_e4_mdl_ibps
# Baseline C6 IBPS recipe IS the canary; baseline was empirically falsified
# 2026-05-17 (smoke 3.04; SegNet collapse mechanism). The reactivation path
# (a) β_ib sweep tests whether the Lagrangian-multiplier itself is the
# cargo-cult — per MacKay MDL verdict in #848 symposium.

active_dispatch_contract: c6_mdl_ibps_beta_ib_0p0001_substrate
dispatch_contracts:
  - id: c6_mdl_ibps_beta_ib_0p0001_substrate
    archive_role: monolithic_ibps1_self_contained_beta_ib_0p0001
    builder_surface: experiments/train_substrate_c6_e4_mdl_ibps.py
    status: active_recipe_contract
    exact_eval_path: archive.zip -> submission/inflate.sh -> experiments/contest_auth_eval.py --device cuda

cost_band:
  epochs: 50
  smoke_score_band: [0.10, 0.50]
  predicted_cpu_band: TBD_post_training
  predicted_cost_usd: 0.30
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 0.30
  platform_key: modal
