notes: |
  E.7 fixed-int16 VQV1 diagnostic variant. Sister of
  substrate_vq_vae_modal_a100_dispatch.yaml (full 2000ep production dispatch);
  this variant measures reconstruction/quality sensitivity to K at fixed int16
  index width. It does not validate the Wave 2A bit-packed Pareto-pole
  hypothesis, because VQV1 archive bytes do not yet move with K.

  Council T3 Finding 1 directive (op-routable #1):
  "dispatch K-sweep paired-comparison smoke ($1-3 Modal T4) on D4 or
  sane_hnerv: K in {2, 4, 8, 16, 32, 64, 256} at lambda=1.0 to empirically
  validate the Pareto pole"
  Current implementation note: this A10G recipe is deliberately narrower than
  the original wording. It is a fixed-int16 VQV1 diagnostic only. The named
  class-shift required for Pareto/rank authority is
  `vq_v1_k_dependent_entropy_packed_archive` (bit-packing, ANS/range coding,
  or another measured K-dependent archive grammar).

  Why VQ-VAE substrate (not D4 or sane_hnerv): the VQ-VAE substrate IS the
  canonical persistent-codebook substrate (van den Oord 2017); the K-sweep
  here is the direct test on the substrate-of-canonical-VQ-design. D4/sane_hnerv
  K-sweeps would be follow-on lanes.

    K dispatch matrix (analytical bit-packed floor, NOT current archive bytes):
      K=2:   per-cell floor = 1 bit;  byte impact must be measured from archive.zip/0.bin
      K=4:   per-cell floor = 2 bits; byte impact must be measured from archive.zip/0.bin
      K=8:   per-cell floor = 3 bits; byte impact must be measured from archive.zip/0.bin
      K=16:  per-cell floor = 4 bits; byte impact must be measured from archive.zip/0.bin
      K=32:  per-cell floor = 5 bits; byte impact must be measured from archive.zip/0.bin
      K=64:  per-cell floor = 6 bits; byte impact must be measured from archive.zip/0.bin
      K=128: per-cell floor = 7 bits; byte impact must be measured from archive.zip/0.bin
      K=256: per-cell floor = 8 bits; byte impact must be measured from archive.zip/0.bin
    The current VQV1 archive grammar is measured empirically after training; do
    not treat the floor table as bit-packer implementation evidence or as a
    promotion/ranking score axis.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py.

  Per CLAUDE.md "PER-SUBSTRATE OPTIMAL FORM via adversarial grand council
  symposium" (Catalog #325): convocation pending operator approval.

  Per CLAUDE.md "Forbidden premature KILL without research exhaustion": this
  K-sweep is an empirical-anchor research dispatch, NOT a kill verdict. Any
  K-value that under-performs at 100ep smoke is DEFERRED-pending-research
  (e.g. longer epochs may rescue large-K underutilization).

