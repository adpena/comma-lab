  - tools/run_modal_smoke_before_full.py (Catalog #167)

notes: |
  PHASE-B1-PIVOT first-anchor dispatch for the Ballé hyperprior family.
  Per CLAUDE.md "HNeRV / leaderboard-implementation parity discipline":
  this is a substrate-engineering lane (not bolt-on) — Ballé 2018 ships
  a learned entropy bottleneck + GDN nonlinearity + scale-hyperprior
  side info that the HNeRV substrate does NOT carry. The trainer's
  TIER_1_OPERATOR_REQUIRED_FLAGS manifest declares the β-specific knobs
  (`--balle-hyperprior-channels`, `--gdn-eps`, `--lambda-hyperprior`)
  per Catalog #151.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

  Cost band: tac.cost_band_calibration.predict('modal', 'A100', 2000) — current
  confidence: hand_calibrated_fallback (N=0 anchors). The smoke + full
  dispatches in this lane will bootstrap the calibration system.

