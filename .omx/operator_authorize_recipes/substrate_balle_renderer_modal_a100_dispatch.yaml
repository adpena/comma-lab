schema_version: 1
name: substrate_balle_renderer_modal_a100_dispatch
lane_id: lane_substrate_balle_renderer_20260512
summary: Ballé hyperprior renderer (β) first-anchor dispatch on Modal A100 (PHASE-B1-PIVOT HIGH-target attack).

platform: modal
gpu: "${MODAL_GPU:-A100}"

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 5.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: 0.18
predicted_delta: "-0.013 vs PR101 0.193 [predicted; council Phase 5 first β anchor]"
predicted_delta_basis: ".omx/research/grand_council_fields_medal_substrate_design_20260512.md#balle-renderer"
literature_anchor: "Ballé, Minnen, Singh, Hwang, Johnston — 'Variational Image Compression with a Scale Hyperprior' ICLR 2018"
council_phase_5_prediction: 0.18

risk: |
  PHASE-B1-PIVOT HIGH-target dispatch on Modal A100. Ballé 2018 hyperprior is
  the FIRST representative of the entropy-bottleneck + scale-hyperprior family
  to enter our empirical anchor set; differs structurally from the HNeRV-family
  cluster (PR100/PR101/PR103) by carrying a side-info latent stream w (the
  "hyperprior") whose role is to predict the rate of the main latent y. The
  arch is mathematically well-motivated and well-studied; the risk is purely
  engineering: GDN nonlinearity numerical floor (--gdn-eps default 1e-12 may
  need 1e-6 if fp16 autocast underflows), and the lambda_hyperprior=0.5 default
  is conservative (follow-up should sweep [0.1, 1.0]). Trainer _full_main
  wires 16 stages including auth eval at stage 12. Single-axis [contest-CUDA]
  acceptable for first anchor; CPU axis required separately before promotion.

  Smoke-before-full pattern (Catalog #167): the operator-authorize wrapper
  routes through `tools/run_modal_smoke_before_full.py` which fires a 100-epoch
  ~$0.30 Modal T4 smoke FIRST, validates rc=0 + auth-eval JSON present +
  score in plausible band [0.0, 10.0], then fires the full 2000-epoch A100
  dispatch only on smoke-green. This pattern was established same-day after
  two consecutive sane_hnerv crashes (fc-01KREXK209TRX7ED5ZRVXHY1VT 14.77s +
  fc-01KREXXSKGTDCF61QXQNBF6SX3 72.03s) burned $0.30 each chasing pre-fix
  integration bugs.
envelope_status: "FITS $20 envelope at p50 fallback (smoke $0.30 + full $5)"

remote_driver: scripts/remote_lane_substrate_balle_renderer.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

