predicted_score_target: 20.0
predicted_delta: "v8 Path B predicted band [15, 25] [prediction; first-principles + Dykstra-feasibility-validated; MEDIUM VARIANCE]"
predicted_delta_basis: |
  STACKED FIRST-PRINCIPLES BOUNDS (per design memo Section 18):
    v7 Path A baseline: 58.89 [diagnostic_cpu] = 25.27 seg + 30.94 pose + 2.67 rate
    v8 Path B predicted decomposition:
      - seg_contrib 100*seg_avg: 6.0 - 10.0 (seg_avg 0.06 - 0.10)
        mechanism: real chroma (Cb + Cr) full-resolution coded per Mallat
        decorrelation; chroma no longer anchor-derived; SegNet sees coloured
        frames.
      - pose_contrib sqrt(10*pose_avg): 6.32 - 12.25 (pose_avg 4.0 - 15.0)
        mechanism: Wyner-Ziv per-pixel temporal residual replaces 6-DOF
        affine warp; per-pixel residual decorrelates the v7 structural
        approximation error.
      - rate_contrib 25*archive_bytes/N: 0.40 (archive 600 KB)
        mechanism: DB4 depth-2 decorrelation 5-10x vs raw spatial per
        Mallat 1989 + Daubechies 1992 Ch. 6.
      - TOTAL: [12.72, 22.65] -> rounded with MEDIUM VARIANCE -> [15, 25]
    Catalog #296 Dykstra-feasibility check: FEASIBLE.
    Polytope [0.40, 28.76] strictly contains predicted [15, 25].

literature_anchor: |
  - Mallat 1989 multiresolution approximation + wavelet orthonormal bases
  - Daubechies 1992 Ten Lectures on Wavelets Ch. 6 (DB4 filter)
  - Antonini-Barlaud-Mathieu-Daubechies 1992 image coding via wavelets
  - Wyner-Ziv 1976 side-information source coding theorem
  - Witten-Neal-Cleary 1987 arithmetic coding
  - MacKay 2003 ITILA Ch. 2 (max-entropy Laplacian under |E| constraint)
  - Slepian-Wolf 1973 (companion to Wyner-Ziv)
  Source-supports: paper-grade information-theoretic + wavelet-coding
  bounds; predicted band derived from each by first-principles arithmetic
  over the contest scorer's per-component cost function. PACT must prove:
  the per-subband Laplacian-prior + per-class CDF arithmetic coder + DB4
  depth-2 separable 2D DWT + Wyner-Ziv residual operationally produces
  the predicted band on the byte-closed WLV2 archive at the contest video.

paper_claim_scope: |
  Mallat 1989 + Daubechies 1992 establish that DB4 depth-2 separable 2D
  DWT achieves 5-10x decorrelation on natural images. Wyner-Ziv 1976
  establishes the rate to encode X given side-info Y is H(X|Y) << H(X)
  for correlated sequences. Both bounds are theoretical; PACT must prove
  them empirically on the contest scorer + contest video.

pact_must_prove: |
  v8 produces a contest-CUDA paired score in the predicted band [15, 25]
  on the byte-closed WLV2 archive when dispatched to Modal T4 with the
  canonical contest auth eval helper. Below [15, 25]: breakthrough. Above
  [25, 40]: marginal; pivot to Path C. Above [40]: WAIVE Path B.

decode_complexity_evidence: |
  Inflate runtime ~310 LOC (substrate_engineering exception per HNeRV L7).
  Dependencies: numpy + Pillow + pywavelets (3 total; pywt is +1 over v7).
  Per-pair compute: 7 IDWT decompositions (~ms) + 7 arith decodes
  (~tens-of-ms per stream) + YUV->RGB (~ms) + bilinear upscale (~ms).
  Total inflate budget for 600 pairs at 384x512 << contest 30-min runtime.

council_phase_5_prediction: 20.0
substrate_tradition: NSCS06_V8_PATH_B_DESIGN_MEMO_2026_05_16

risk: |
  MEDIUM VARIANCE first-anchor dispatch. Architectural risks:

  (a) WAVELET DECORRELATION ASSUMPTION - DB4 depth-2 + Laplacian prior
      assumes natural-image statistics. Contest video has driving-scene
      content with sky + road + lanes; spectral content may differ from
      generic natural-image priors. Mitigated by per-(subband, class)
      empirical scale estimation.

  (b) WYNER-ZIV RESIDUAL ENTROPY - assumes H(frame_1|frame_0) is small
      relative to H(frame_1). For low-motion driving content this should
      hold; for high-motion content the residual entropy approaches
      H(frame_1) and the rate gain disappears.

  (c) L1 SCAFFOLD SCOPE - this first dispatch ships the FIRST PAIR ONLY
      streams (every pair decodes the same reconstruction). Per-pair-
      distinct streams are L2 work (deferred per design memo Section 14).
      The L1 dispatch validates pipeline integration + the Dykstra-
      feasibility band prediction; L2 unlocks the full [15, 25] band.

  Predicted archive size: ~600 KB (rate-axis contribution 25 * 600000 /
  37545489 = 0.40). Per the Dykstra-feasibility check (Catalog #296),
  the predicted band fits inside the convex polytope at all 3 budgets.

