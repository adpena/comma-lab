# Catalog #220 + #272 distinguishing-feature integration contract
distinguishing_feature_name: ibps_latent_48_capacity_unwind
distinguishing_bytes_path: latent_blob
# Inflate consumer: the existing C6 IBPS substrate's inflate path reconstructs
# rgb_0/rgb_1 from per-pair latent z via decoder forward. The latent_dim=48
# variant uses the same shape contract (z shape (B, 48) vs baseline (B, 24));
# the inflate path consumes the entire latent_blob structurally.
inflate_consumer_function: tac.substrates.c6_e4_mdl_ibps.inflate.inflate_one_video
byte_mutation_smoke_passes: pending_smoke

# Catalog #167 smoke-before-full required for any dispatch
smoke_before_full: true

# Catalog #309 horizon-class declaration: frontier_pursuit per Schmidhuber
# class-shift framework (IBPS substrate IS frontier-pursuit class; widening
# bottleneck does NOT change the substrate class).
horizon_class: frontier_pursuit

operator_required_flags:
  TIER_1_OPERATOR_REQUIRED_FLAGS:
    - --video-path
    - --output-dir
    - --epochs
    - --batch-size
    - --lr
    - --latent-dim
    - --beta-ib
    - --enable-autocast-fp16
    - --enable-gt-scorer-cache

notes: |
  C6 IBPS reactivation path (b) — latent_dim=48 (2x baseline) Wave 2 BUILD
  recipe. The trainer extension IS complete (zero LOC delta; --latent-dim
  already wired via TIER_1_OPERATOR_REQUIRED_FLAGS); the recipe remains
  non-dispatchable until R3 SEAL op-routable #2 operator sign-off + Catalog
  #167 smoke-before-full gate clears.

  Per Catalog #240 recipe-vs-trainer-state consistency, the trainer's
  _full_main IS lifted (baseline C6 IBPS sister landing 2026-05-15) and the
  --latent-dim argparse + resolver + downstream MDLIBPSConfig wiring ARE all
  in place. The protection lives in recipe dispatchability: `research_only:
  true`, `dispatch_enabled: false`, and the explicit `dispatch_blockers`
  list. `operator_authorize.py` correctly refuses this recipe before
  claim/provider setup.

  Stage 0B smoke ($0.30-$0.50 Modal A10G) is the gating empirical test
  (post-operator sign-off):
  - smoke score < baseline 3.04 AND seg_contribution < pose_contribution →
    smoke green; advance to latent_96 + paired-CPU dispatch
  - smoke score >= baseline 3.04 → DEFERRED-pending-research per CLAUDE.md
    (NOT KILL); enumerate alternative reducers per Catalog #308

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py.

  Per CLAUDE.md "Submission auth eval — BOTH CPU AND CUDA": dispatch ends
  with paired CPU/CUDA auth eval on EMA shadow before any frontier-claim
  language.

  Per Catalog #324 the predicted_band_validation_status MUST remain
  `pending_post_training` until 50ep Modal A10G smoke + post-training
  Tier-C density measurement replaces the empirically-falsified random-init
  basis. The reactivation_criteria field documents the canonical fix.

