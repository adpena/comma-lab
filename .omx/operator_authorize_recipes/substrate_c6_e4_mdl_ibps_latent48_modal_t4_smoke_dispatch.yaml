schema_version: 1
name: substrate_c6_e4_mdl_ibps_latent48_modal_t4_smoke_dispatch
lane_id: lane_c6_ibps_reactivation_path_b_latent_dim_sweep_build_20260518
# C6 IBPS reactivation path (b) — latent_dim=48 (2x baseline) Wave 2 BUILD
# recipe per R3 SEAL council (`feedback_recursive_adversarial_review_r3_council_rotation_c_seal_gate_post_r2_clean_landed_20260517.md`)
# op-routable #2 + C6 IBPS first-asymptotic dispatch empirical falsification
# anchor (`feedback_c6_ibps_first_asymptotic_dispatch_smoke_before_full_paired_landed_20260517.md`).
#
# Architecture: same C6 IBPS substrate as baseline; ONLY change is latent_dim=48
# vs baseline 24. Parameter counts: encoder=38784 + decoder=88034 + latents=28800
# = 155618 total (+21% vs baseline 128882). Per-pair int8 latent: 28800 bytes
# (vs baseline 14400 bytes).
#
# Cargo-cult unwound per the IBPS empirical falsification:
#   - CC-1 (latent_dim=24 sufficient): 50ep smoke produced 3.04 with SegNet
#     collapse (score_seg_contribution=2.60 dominates); 24-dim IB bottleneck
#     compresses pose well but DESTROYS segmentation. Schmidhuber (R3 SEAL
#     council) verbatim: "24-dim is WRONG operating point for PoseNet+SegNet
#     task complexity (per Tishby I(T;Y) decomposition)". The sweep tests
#     whether widening latent_dim preserves segmentation while maintaining
#     pose compression.
#
# Empirical hypothesis (per Tishby I(T;Y) information-bottleneck framework):
#   - IF latent_48 smoke → score significantly < 3.04 AND seg_contribution <
#     pose_contribution → CC-1 (24-dim too narrow) HARD-EARNED for SegNet
#   - 2x capacity SHOULD double per-class chroma + segmentation feature
#     preservation per Atick-Redlich early-visual-processing redundancy
#     reduction theory
#
# Per CLAUDE.md "Substrate scaffolds MUST be COMPLETE or RESEARCH-ONLY"
# (Catalog #240) the recipe remains `research_only: true` + `dispatch_enabled:
# false` at THIS landing. The trainer extension IS complete (no
# NotImplementedError); the recipe research_only flag expresses the
# pre-dispatch operator-sign-off gate. Flip to `dispatch_enabled: true` is
# the operator's explicit decision per the R3 SEAL op-routable #2.
research_only: true
dispatch_enabled: false
dispatch_blockers:
  - r3_seal_op_routable_2_requires_operator_sign_off_for_reactivation_path_b_dispatch
  - catalog_167_smoke_before_full_pattern_required_at_dispatch_time
  - catalog_324_predicted_band_validation_status_pending_post_training_tier_c_required_before_promotion
  - paired_cpu_cuda_empirical_anchor_required_before_promotion_eligible_per_catalog_220
summary: |
  C6 IBPS reactivation path (b) — latent_dim=48 (2x baseline) Wave 2 BUILD
  recipe per R3 SEAL council op-routable #2 (Schmidhuber rationale).

  Architecture: same C6 IBPS substrate (IBEncoder + IBDecoder + per-pair
  latents) as baseline; ONLY change is latent_dim=48 vs baseline 24.

  Hypothesis: per Tishby information-bottleneck framework, the 24-dim
  bottleneck destroyed SegNet-relevant features (chromaticity, structure).
  Doubling latent capacity to 48-dim allows the IB bottleneck to preserve
  more SegNet-relevant signal while still compressing pose efficiently.

  Predicted ΔS band: TBD_post_training_tier_c_re_measurement_required per
  Catalog #324. Pre-training Tier-C density estimate is NOT a valid
  predictive band (sister #836 empirical bug class anchor: C6 baseline
  random-init Tier-C 2.67e-5 produced predicted band [0.113, 0.163]; actual
  50ep smoke 3.04, 22x outside upper). This recipe declares
  predicted_band_validation_status: pending_post_training and requires a
  50ep smoke + post-training Tier-C re-measurement BEFORE any predictive
  band is committed.

  Param breakdown (verified empirically):
    encoder = 38,784 params
    decoder = 88,034 params
    latents = 28,800 params (600 pairs x 48 latent_dim)
    TOTAL   = 155,618 params (+21% vs baseline 128,882)
    per-pair int8 = 28,800 bytes (vs baseline 14,400)
    archive estimate: ~250-350 KB (vs baseline 225 KB)

platform: modal
gpu: "${MODAL_GPU:-T4}"
min_vram_gb: 16
min_smoke_gpu: "A10G"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - contest_generalized
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: c6_e4_mdl_ibps
# Baseline C6 IBPS recipe IS the canary; baseline was empirically falsified
# 2026-05-17 (smoke 3.04; SegNet collapse mechanism). The reactivation path
# (b) latent_dim sweep tests whether wider IB bottleneck preserves segmentation.
# Per R3 SEAL Schmidhuber verbatim: empirical falsification is NOT refutation
# of compression-as-intelligence framework; it IS validation that 24-dim is
# WRONG operating point.

active_dispatch_contract: c6_mdl_ibps_latent48_substrate
dispatch_contracts:
  - id: c6_mdl_ibps_latent48_substrate
    archive_role: monolithic_ibps1_self_contained_latent48
    builder_surface: experiments/train_substrate_c6_e4_mdl_ibps.py
    status: active_recipe_contract
    exact_eval_path: archive.zip -> submission/inflate.sh -> experiments/contest_auth_eval.py --device cuda

cost_band:
  epochs: 50
  smoke_score_band: [0.10, 0.50]
  predicted_cpu_band: TBD_post_training
  predicted_cost_usd: 0.50
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 0.30
  platform_key: modal
  gpu_key: A10G

predicted_score_target: null
# Catalog #324 enforcement: this recipe declares
# predicted_band_validation_status: pending_post_training (NOT a numeric band)
# because the IBPS random-init Tier-C density is empirically falsified as a
# valid predictive basis. The 50ep smoke + post-training Tier-C
# re-measurement is required BEFORE any predictive band can be committed.
predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: "Catalog #324 + R3 SEAL op-routable #2: dispatch remains disabled until (a) 50ep Modal A10G smoke lands with archive + auth-eval evidence, (b) post-training Tier-C density measurement replaces random-init basis, (c) revised predicted band is committed based on empirical evidence. If smoke score < baseline 3.04 with seg_contribution < pose_contribution, the latent_dim=48 width is confirmed as a SegNet-preservation operating point per Schmidhuber Tishby I(T;Y) hypothesis."
smoke_score_band: [0.10, 0.50]
predicted_delta: "pending_post_training_tier_c_re_measurement per Catalog #324; baseline C6 IBPS at latent_dim=24 produced 3.04 [contest-CPU advisory] (22x outside random-init derived band [0.113, 0.163]); reactivation path (b) hypothesis is that 2x capacity preserves SegNet-relevant features"
predicted_delta_basis: "R3 SEAL council op-routable #2 (Schmidhuber rationale; rotation C 2026-05-18) + C6 IBPS first-asymptotic dispatch empirical falsification (feedback_c6_ibps_first_asymptotic_dispatch_smoke_before_full_paired_landed_20260517.md) + Catalog #324 META-FIX (pending post-training Tier-C validation required for any predicted_band)"
provenance_kind: empirical_anchor_pending_smoke
literature_anchor: |
  Tishby & Zaslavsky (2015) "Deep Learning and the Information Bottleneck Principle"
    IEEE Info. Theory Workshop DOI 10.1109/ITW.2015.7133169 — I(T;Y) capacity
    decomposition; saturation curves with bottleneck width;
  Schmidhuber (R3 SEAL council 2026-05-18) — C6 IBPS empirical 3.04 + SegNet
    collapse IS empirical validation that 24-dim is WRONG operating point per
    Tishby I(T;Y) decomposition, NOT refutation of compression-as-intelligence
    framework;
  Atick & Redlich (1990) "Towards a theory of early visual processing" — early
    visual processing redundancy reduction; chroma + structure preservation
    operating points;
  Rissanen (1978) "Modeling by shortest data description" Automatica 14:465-471;
  Alemi et al. (2017) "Deep Variational Information Bottleneck" ICLR — β-VAE
    capacity scaling for IB.

source_supports: |
  Tishby-Zaslavsky 2015 IB framework establishes that I(T;Y) saturation depends
  on bottleneck capacity vs task complexity (HARD-EARNED at information-theory
  level). Atick-Redlich 1990 cooperative-receiver demonstrates early-visual-
  processing redundancy reduction varies with channel capacity (HARD-EARNED at
  neuroscience level). Schmidhuber R3 SEAL deliberation 2026-05-18 confirms
  the framework applies to the C6 IBPS empirical falsification at latent_dim=24.

paper_claim_scope: |
  Source theorems establish that (a) bottleneck width affects what information
  the IB compression preserves, and (b) task complexity matters for choosing
  the operating point. NEITHER paper makes claims about latent_dim=48 being
  optimal for the Pact contest scorer (PoseNet + SegNet on 600 pair contest
  video). That surface IS the C6 IBPS latent48 sweep empirical anchor target
  via the 50ep Modal A10G smoke + paired CPU/CUDA auth-eval.

pact_must_prove: |
  C6 IBPS latent_dim=48 must empirically prove on paired CPU/CUDA: (a) the
  wider 48-dim bottleneck preserves SegNet-relevant features (chromaticity,
  structure) better than baseline 24-dim; (b) the score_seg_contribution
  decreases below baseline 2.60; (c) the rate increase from 28800 vs 14400
  bytes/pair is recovered by the segmentation gain; (d) the smoke score
  lands < baseline 3.04 — IF YES → 2x capacity confirmed as SegNet-preservation
  operating point per Schmidhuber Tishby hypothesis; advance to latent_96
  sweep + paired-CPU; IF NO → DEFER-pending-research with alternative reducer
  enumeration per Catalog #308 alternative-probe-methodologies (try β-IB sweep
  at fixed latent_48, or chroma-priors per Atick-Redlich, or per-class
  segmentation conditioning).

decode_complexity_evidence: |
  Inflate runtime is the same vendored C6 IBPS substrate package (no LOC
  delta). Per-pair decoder forward: same SIREN PixelShuffle blocks; only the
  per-pair int8 latent grows from 14400 → 28800 bytes/pair. T4 single-pair
  decode estimated unchanged (decoder body identical; only input embedding
  width grows from 24 → 48). Total per-video inflate well within 30 min
  contest budget.

risk: |
  C6 IBPS latent_dim=48 sweep BUILD trainer extension IS complete (zero LOC
  delta; --latent-dim already wired via TIER_1_OPERATOR_REQUIRED_FLAGS). The
  recipe is intentionally non-dispatchable (`research_only: true`,
  `dispatch_enabled: false`) pending R3 SEAL op-routable #2 operator sign-off
  + Catalog #167 smoke-before-full gate + Catalog #324 post-training Tier-C
  re-measurement.

  Architectural risk:
  - The IB bottleneck (48-dim z) may STILL be too tight to reconstruct
    contest segmentation features at the required SegNet fidelity. If smoke
    seg_contribution remains > 1.0, the 96-dim and 192-dim sweep variants
    are the next iteration.
  - The encoder + decoder grow modestly (+21% total params); the per-pair
    latent grows 2x (28800 bytes vs baseline 14400). Total archive estimate
    250-350 KB (vs baseline 225 KB). If archive grows beyond 400KB without
    proportional score improvement, the rate term penalty dominates.
  - The β_IB Lagrangian default 0.01 may need re-tuning for the wider
    bottleneck (more capacity to penalize). Default kept at 0.01 for
    apples-to-apples comparison with baseline; β-sweep deferred to a
    follow-up wave if seg_contribution improves but plateaus.

  Modal A10G is the minimum smoke GPU per baseline C6 recipe + the canonical
  A10G minimum after the 2026-05-14 100ep T4 timeout finding. Helper
  `tools/run_modal_smoke_before_full.py` honors `min_smoke_gpu: "A10G"`.

  Per CLAUDE.md "Auth eval EVERYWHERE" the dispatch MUST end with CUDA auth
  eval on EMA shadow + paired CPU eval per "Submission auth eval — BOTH CPU
  AND CUDA".

envelope_status: "FITS $0.50 smoke envelope at A10G p50 fallback ($0.30); paired CPU adds $0.20; total $0.50 per latent_48 dispatch"

remote_driver: scripts/remote_lane_substrate_c6_e4_mdl_ibps.sh
# C6 IBPS latent_48 reuses the canonical baseline C6 remote driver script.
# The driver already carries Catalog #244 NVML/CUDA env block + Catalog #163
# bootstrap sentinel + Catalog #189 empty-array guard. The latent_dim=48
# value is threaded via env_overrides below (C6_E4_MDL_IBPS_LATENT_DIM=48);
# the driver passes --latent-dim to the trainer.
timeout_hours: 1.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
