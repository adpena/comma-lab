  cost_band_trainer: experiments/train_substrate_c6_e4_mdl_ibps.py
  cost_band_epochs: 50
  cost_band_batch_size: 4
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_c6_e4_mdl_ibps.py

