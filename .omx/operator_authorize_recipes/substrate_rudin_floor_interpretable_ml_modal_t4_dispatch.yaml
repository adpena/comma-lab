research_only: false
dispatch_enabled: true
smoke_only: false
smoke_validation_contract: contest_cuda_auth_eval_v1

summary: |
  Rudin floor interpretable-ML compositional decoder substrate per the
  2026-05-16 design memo
  (`.omx/research/rudin_floor_interpretable_ml_substrate_asymptotic_pursuit_scoping_design_20260516.md`).

  The substrate is a TRIPLE CLASS-SHIFT (architecture class + decode-time
  contract + scorer-relationship) per the abandon-within-class taxonomy.
  The META-layer Rudin-Daubechies autopilot (Catalogs #273-#278;
  src/tac/autopilot_rudin_daubechies/) is RE-ARCHITECTED here as the
  decode-time architecture itself: GOSDT depth-4 encoder + Wang-Rudin 2015
  K=4-6 falling-rule-list decoder + Semenova-Rudin-Parr 2020 K=8 Rashomon
  ensemble loss + RDIF v1 monolithic archive + ≤200 LOC pure Python inflate.

  Score movement is unranked at landing. Predicted bands per T4 SYMPOSIUM
  4x4 floor matrix Rudin floor row: Mid 30-90d [0.150, 0.180]; Long 6m-1y
  [0.10, 0.13]; Asymptotic [0.05, 0.10] — empirically validated only after
  K=8 LEVEL-1 dispatch per design memo §18.

  Mission contribution: frontier_breaking x asymptotic_pursuit = HIGHEST
  per HORIZON-CLASS directive Consequence 3.

  STACKS WITH (per design memo §13): NSCS06 v8 (both asymptotic-pursuit;
  HIGH priority), A-STACK (novel meta-decoder pattern), Z6/Z7/Z8 + Tishby
  IB-pure (sister asymptotic-pursuit), ATW v2 (cooperative-receiver as
  scorer side-info for Rudin's per-rule predicates).

