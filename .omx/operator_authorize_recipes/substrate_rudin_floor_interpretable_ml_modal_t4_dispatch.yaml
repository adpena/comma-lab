literature_anchor: |
  Wang, F. & Rudin, C. (2015) "Falling Rule Lists" AISTATS proceedings;
  Ustun, B. & Rudin, C. (2016) "Supersparse linear integer models for
    optimized medical scoring systems" Machine Learning 102(3):349-391;
  Lin, J., Zhong, C., Hu, D., Hu, M., Rudin, C., & Seltzer, M. (2020)
    "Generalized and Scalable Optimal Sparse Decision Trees" ICML;
  Semenova, L., Rudin, C., & Parr, R. (2020) "On the Existence of Simpler
    Machine Learning Models" arXiv:1908.01755 (Rashomon set canonical);
  Candes, E., Romberg, J., & Tao, T. (2006) "Robust uncertainty principles:
    exact signal reconstruction from highly incomplete frequency
    information" IEEE Trans Info Theory 52(2):489-509;
  Daubechies, I., DeVore, R., Fornasier, M., & Gunturk, C. S. (2010)
    "Iteratively reweighted least squares minimization for sparse recovery"
    Comm. Pure Appl. Math. 63(1):1-38;
  T4 SYMPOSIUM 4x4 floor matrix Rudin floor row anchor:
    .omx/research/grand_council_symposium_time_traveler_optimal_staircase_20260516.md;
  Rudin-Daubechies AUTOPILOT (the META-layer this substrate consumes):
    src/tac/autopilot_rudin_daubechies/ (Catalogs #273-#278; commit 42665ce95).

risk: |
  Rudin floor interpretable-ML substrate is Phase 1b L2-integrated: the
  trainer's _full_main is implemented and this recipe is dispatch_enabled=true.
  This is pre-score dispatch authority only; no score, rank, or promotion claim
  exists until paired CPU/CUDA exact-eval artifacts are harvested and reviewed.

  The predicted Mid band [0.150, 0.180] is verifiable in $3-15 of Modal T4
  spend per the design memo §18 cost band:

  - $0 pre-smoke: design-memo K=6 canonical rule_list + RDIF v1 archive
    roundtrip + 1-frame inflate sanity (this trainer's --smoke mode; CPU only)
  - $3-15 Modal T4 smoke: K=8 LEVEL-1 dispatch with 100 frames + paired
    SegNet/PoseNet feature extraction + Rashomon bootstrap + RDIF v1
    archive + paired CPU+CUDA eval
  - $30-50 Modal A100 full anchor: L2 INTEGRATION 1200-frame compress +
    paired CPU+CUDA eval + sister Dykstra-feasibility check
    (tools/check_substrate_dykstra_feasibility.py per Catalog #296)

  Architectural risk per design memo §19 cargo-cult ledger:
  - Interpretability tax of 3-5% is canonical (Rudin literature) but
    SPECIFIC magnitude for video compression UNVALIDATED.
  - K=6 falling rules canonical (Wang-Rudin) for binary classification;
    video compression is structurally different; K=4/K=8/K=12 sweep at
    reactivation per design memo §18.
  - GOSDT depth-4 canonical (Lin-Rudin) for tabular data; per-pair video
    region characterization different; depth-3/depth-6 sweep at reactivation.
  - Rashomon K=8 canonical (Semenova-Rudin-Parr) for general prediction;
    per-pixel probe priority at substrate level structurally different;
    K=16/K=32 sweep at reactivation.
  - SLIM bound [-10, 10] canonical (Ustun-Rudin) for medical scoring;
    substrate-specific bound may differ; [-20, 20]/[-5, 5] sweep at reactivation.

  Modal T4 cost band: $3 smoke; $5-15 full + paired auth eval. Per
  CLAUDE.md "Auth eval EVERYWHERE" the dispatch MUST end with paired
  CPU+CUDA auth eval per "Submission auth eval — BOTH CPU AND CUDA"
  non-negotiable.

