notes: |
  Rudin floor interpretable-ML substrate Phase 1b L2 integration recipe. The
  trainer _full_main is implemented, the recipe is research_only=false, and
  dispatch_enabled=true is intentional. This authorizes claimed provider runs;
  it does NOT authorize score promotion without harvested paired CPU/CUDA
  evidence and result-review classification.

  lane_class=substrate_engineering per HNeRV parity discipline lesson 7
  (substrate engineering happens ONCE per architecture class; Rudin floor is
  the new class — pure-Python rule application with no neural at inflate).

  horizon_class=asymptotic_pursuit per HORIZON-CLASS standing directive
  (`feedback_horizon_class_evaluation_axis_plateau_warning_standing_directive_20260516.md`);
  Rudin floor named under ASYMPTOTIC-PURSUIT GAP; ≥20% K-schedule allocation
  to asymptotic-pursuit per directive Consequence 2.

  Reactivation criteria per design memo §18:
  1. K=8 LEVEL-1 dispatch lands in predicted Mid band [0.150, 0.180] →
     HYPOTHESIS VALIDATED; proceed to L2 INTEGRATION + paired CPU eval +
     sister Dykstra-feasibility check + composition-with-asymptotic-sisters
     per design memo §13.
  2. Lands above 0.180 but below 0.30 → PARTIAL VALIDATION; review Rashomon
     ensemble disagreement queue for next-iteration probes; refine rule-list
     per Wang-Rudin canonical falling-rule-list prune_ineffective_rule discipline.
  3. Lands above 0.30 → FALSIFICATION at this specific config; per CLAUDE.md
     "Forbidden premature KILL": DO NOT KILL; classify DEFERRED-pending-research;
     reactivation: (a) K=12 Rashomon; (b) K=4 rules; (c) predicate vocabulary
     expansion; (d) T4 SYMPOSIUM Rudin floor estimate revised downward only
     if 3+ Rudin-class dispatches all land >0.25.
  4. Lands at <0.15 (better than predicted Mid) → HYPOTHESIS STRENGTHENED;
     revise T4 SYMPOSIUM Rudin floor row downward; queue stack-of-stacks
     composition smokes per design memo §13.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE" non-negotiable: when
  dispatched, modal_train_lane.py uses .spawn(); harvest within 24h via
  tools/harvest_modal_calls.py.

  Per CLAUDE.md "Auth eval EVERYWHERE" + "Submission auth eval — BOTH CPU
  AND CUDA": when dispatched, ends with paired CPU+CUDA auth eval. Use
  tools/dispatch_modal_paired_auth_eval.py with
  --skip-axis-if-promotable-anchor-exists per Catalog #246.

  Per CLAUDE.md "Production-hardened dispatch optimization protocol": Tier 1
  engineering primitives are waived where mathematically N/A for this no-neural
  substrate; Tier 2 hardware correctness is declared (min_vram_gb=16;
  min_smoke_gpu=T4; video_input_strategy + pyav_decode_strategy + target_modes
  + canary_status all set); Tier 3 substrate correctness is active via
  gate_auth_eval_call routing, canonical inflate device-fork, and live
  recipe-vs-trainer consistency. Catalog #270 and local_pre_deploy strict checks
  passed at commit f2f81383f / 6cae1cf6d lineage and must be replayed before
  any new dispatch if the trainer or recipe changes.

