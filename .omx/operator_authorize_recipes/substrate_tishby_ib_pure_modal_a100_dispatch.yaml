risk: |
  HIGH-VARIANCE substrate when dispatch_enabled is lifted. Architectural risks
  per design memo §16 cargo-cult audit (3 HARD-EARNED + 6 CARGO-CULTED):

  (a) D4 PROBE INDEPENDENT AT LANDING - the L1 anchor returned INDEPENDENT
      (MI ~0.006 bits/symbol) on A1 latents because the SegNet majority class
      on dashcam footage is degenerate (single class 2 = "road" dominates
      ~100% of pairs). Reactivation per design memo §19.3: (a) re-run probe
      with per-pair multi-class spatial-bin proportions signature; (b) train
      Tishby IB-pure with scorer-conditional CDF range coding to see if the
      SUBSTRATE'S OWN encoder produces non-degenerate latent-class
      distribution; (c) operator-approved council deliberation.

  (b) VIB TRACTABILITY SYNTHETIC PROXY - the L1 anchor returned TRACTABLE
      (SNR ~6.75) on synthetic Gaussian smoke but the synthetic-data proxy
      is HARD-EARNED-at-bound-level / CARGO-CULTED-at-empirical-equivalence
      per the assumption-statement disclosure. Real-scorer SNR may differ
      by 2-5x. Mitigation: Modal A100 100ep proxy per design memo §19 STAGE 1
      ($5-10 envelope).

  (c) PATH-VIB VS PATH-MINE - if Path-VIB tractability fails on real
      scorer, Path-MINE pivot adds ~$10 council-adjudication cost +
      statistic-network training overhead per design memo §22 op-routable #3.

  Modal A100 cost band: $5-10 smoke; $10-15 Path-VIB full + paired auth eval;
  $20-30 Path-MINE full + statistic-network overhead. Per CLAUDE.md
  "Submission auth eval — BOTH CPU AND CUDA" the dispatch MUST end with
  paired CPU+CUDA auth eval when dispatch is lifted.

