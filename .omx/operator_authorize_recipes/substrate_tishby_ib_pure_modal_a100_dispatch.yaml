summary: |
  Tishby IB-pure substrate (PRIMARY variational Information Bottleneck
  architecture) per the 2026-05-16 design memo. PRIMARY architecture
  (NOT bolt-on like Z4 / ATW v1 / ATW v2): the entire codec IS the
  variational IB Lagrangian + Atick-Redlich cooperative-receiver framing
  + Wyner-Ziv side-information construction operationalized as a single
  coherent substrate.

  Two operationalization paths per design memo §4:
    - Path-VIB (Alemi 2017 canonical reparam-trick) — DEFAULT
    - Path-MINE (Belghazi 2018 MINE statistic-network) — v2 fallback

  L_VIB = E_{q(t|x)}[ -log p(y|t) ]    # reconstruction (Atick-Redlich)
        + β · KL(q(t|x) || p(t))       # bottleneck (compression)

  Score movement: NULL pending D4 probe MEANINGFUL_CONDITIONING + VIB
  tractability TRACTABLE on real-scorer Modal A100 100ep proxy + Dykstra-
  feasibility intersection per Catalog #296. Asymptotic-pursuit horizon
  class per T4 SYMPOSIUM theoretical-floor row.

