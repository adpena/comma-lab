literature_anchor: |
  - Tishby, Pereira & Bialek (1999) "The information bottleneck method"
    Proc. 37th Allerton Conf. (IB Lagrangian original)
  - Tishby & Zaslavsky (2015) "Deep learning and the information bottleneck"
    (deep-IB framework; Zaslavsky active-living voice per CLAUDE.md grand
    council roster)
  - Alemi, Fischer, Dillon, Murphy (2017) "Deep Variational Information
    Bottleneck" https://arxiv.org/abs/1612.00410 (Path-VIB canonical operationalization)
  - Belghazi et al. (2018) "MINE: Mutual Information Neural Estimation"
    (Path-MINE canonical reference)
  - Atick & Redlich (1990) "Towards a Theory of Early Visual Processing"
    Neural Computation 2(3):308-320 (cooperative-receiver theorem)
  - Wyner & Ziv (1976) "The rate-distortion function for source coding with
    side information at the decoder" IEEE Trans Info Theory 22(1):1-10
  Source-supports: paper-grade information-theoretic + cooperative-receiver
  + variational IB bounds; predicted band derived from each via first-
  principles arithmetic over the contest scorer's per-component cost
  function. PACT must prove: the variational IB Lagrangian operationalized
  as PRIMARY architecture (NOT bolt-on) operationally produces the
  predicted band on the byte-closed TIBP1 archive at the contest video,
  conditional on D4 probe MEANINGFUL_CONDITIONING + VIB tractability
  TRACTABLE on real scorer.

paper_claim_scope: |
  Alemi 2017 VIB establishes the variational lower bound is gradient-tractable
  for any diagonal-Gaussian variational posterior. Tishby IB 1999 establishes
  the encoder p*(t|x) is closed-form modulo numerical tractability.
  Atick-Redlich 1990 establishes the cooperative-receiver loss is provably
  optimal for known downstream receiver R. Wyner-Ziv 1976 establishes
  R_WZ(D) = R_X|S(D) ≤ R(D) for side-info at decoder. All four bounds are
  theoretical; PACT must prove them empirically on the contest scorer +
  contest video + TIBP1 archive grammar.

pact_must_prove: |
  Tishby IB-pure produces a contest-CUDA paired score in the predicted band
  conditional on D4 verdict, on the byte-closed TIBP1 archive when
  dispatched to Modal A100 with the canonical contest auth eval helper.
  Path-VIB: $10-15 paired (single mechanism direct measurement).
  Path-MINE (v2 fallback): $15-30 paired (statistic network training overhead).

decode_complexity_evidence: |
  Inflate runtime ~200 LOC (substrate_engineering waiver per HNeRV L4 + L7).
  Dependencies: torch + brotli + numpy (3 total). Per-pair compute: 1
  forward through variational decoder (~ms per pair on A100) + WZ side-info
  offset add (~us per pair) + range decode of latent symbols via
  scorer-conditional CDF (~ms per 600 pairs). Total inflate budget << contest
  30-min runtime.

