schema_version: 1
name: substrate_d1_segnet_margin_polytope_modal_t4_dispatch
lane_id: lane_d1_segnet_margin_polytope_encoder_20260514
summary: D1 SegNet margin polytope encoder L1 custody scaffold on Modal T4. Exact dispatch is blocked until L2 consumes the sidecar overlay in the runtime.
dispatch_enabled: false
dispatch_blockers:
  - d1_l1_runtime_overlay_not_consumed
  - l2_overlay_adapter_missing
  - current_l1_packet_base_renderer_plus_rate_only
  - do_not_dispatch_until_ready_for_exact_eval_dispatch_true

platform: modal
gpu: "${MODAL_GPU:-T4}"
min_vram_gb: 14
min_smoke_gpu: "T4"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - research_substrate
canary_status: independent_substrate

cost_band:
  epochs: 1000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 1.00
  platform_key: modal
  gpu_key: T4

predicted_score_target: null
predicted_delta: "L2-only projection from deep-math memo section 10 D1: delta -0.005 to -0.012 on A1 0.192848 baseline => [contest-CPU projection] [0.181, 0.188]. L1 does not apply the overlay and carries no score claim."
predicted_delta_basis: ".omx/research/deep_math_geometry_manifolds_synthesis_20260514.md#section-10-top-5-dispatch-queue-d1"
literature_anchor: "Fridrich-Holub 2014 UNIWARD steganalysis + Filler 2011 STC + Boyd-Vandenberghe 2004 §6 polytope geometry"
council_verdicts:
  D1: "sidecar architecture (HNeRV parity L3; mirrors YUCR + a1_plus_wavelet pattern)"
  D2: "≤500 B target overhead at full budget (smaller than YUCR; margin map is non-negative + brotli-friendly)"
  D3: "freeze-A1 base (default; B-side composition order may flip after empirical anchor lands)"
  D4: "magic-byte 'D1PY' distinct from YUCR/WAV1/LPA1/STC1"
  D5: "frame-1 polytope-interior noise allocation (deep-math memo §3.6)"
  D6: "BOTH AXES contest-CPU + contest-CUDA (mandatory; CUDA inline, CPU dispatched separately)"

predicted_band: null
l2_projected_band: [0.181, 0.188]
predicted_score_evidence_grade: blocked_l1_noop_overlay

risk: |
  D1 L1 is NOT dispatchable for exact score movement. The current runtime
  verifies the D1 sidecar and the frozen A1 base custody, then delegates to
  A1 without applying the polytope overlay. An exact eval of L1 would measure
  base renderer output plus D1 sidecar rate overhead, not the D1 hypothesis.

  The sub-0.188 band remains an L2 projection only. Per deep-math memo section
  10 D1, projected delta -0.005 to -0.012 is bounded from above by the
  fraction of pixels with high margin times per-pixel safe-bit budget. An A1
  archive whose margin distribution skews boundary-dominant (>50% pixels with
  m < margin_threshold) would compress the achievable delta toward the lower
  bound -0.005.

  A1 substrate is FROZEN (loaded verbatim from archive.zip SHA
  87ec7ca5f2f328a8acdfc65f5cce0ab08a3a558eae88f36d4140870f141492b5
  unzipped to 178,162 B "x" blob SHA 8e664385...). The D1POLY1 sidecar
  carries only the int8 margin map + brotli-compressed polytope payload
  + base sha truncation + metadata JSON. Predicted overhead ~1-2 KB
  post-brotli.

  Per CLAUDE.md "Submission auth eval — BOTH CPU AND CUDA" non-negotiable,
  this lane requires BOTH `[contest-CUDA]` (inline) AND `[contest-CPU]`
  (Linux x86_64 separate dispatch) before promotion. First-anchor dispatch
  is CUDA-only; CPU axis follow-up is a separate operator step.

  Smoke-before-full pattern (Catalog #167): this recipe is blocked before
  smoke until the trainer readiness manifest reports
  ready_for_exact_eval_dispatch=true and runtime_overlay_consumed=true. Do
  not route the L1 packet through auth eval.

  Pre-smoke macOS-CPU SANITY gate (operator pre-approved 2026-05-13):
  the wrapper runs `tools/score_macos_cpu_advisory_proxy.py` on the A1
  baseline BEFORE Modal smoke to verify the proxy chain end-to-end.
  Proxy score outside [0.187, 0.200] refuses the chain at $0.

envelope_status: "BLOCKED for exact dispatch until L2 overlay adapter consumes d1_polytope.bin in runtime"

remote_driver: scripts/remote_lane_substrate_d1_segnet_margin_polytope.sh
timeout_hours: 1.5

required_input_files:
  # Use submissions/a1/archive.zip (sha 87ec7ca5...; identical bytes to the
  # canonical track4_sg_a1_t178000_20260509 archive) so the file is mounted
  # via STRUCTURAL_MINIMUM_DIRS('submissions', None). The experiments/results/
  # tree is EXCLUDED from Modal mounts via DEFAULT_RESULTS_IGNORE per
  # src/tac/deploy/modal/mount_manifest.py.
  - flag: --a1-archive
    default_path: submissions/a1/archive.zip
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_d1_segnet_margin_polytope.sh
  cost_band_trainer: experiments/train_substrate_d1_segnet_margin_polytope.py
  cost_band_epochs: 1000
  cost_band_batch_size: 32
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_d1_segnet_margin_polytope.py

env_overrides:
  D1_POLYTOPE_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  D1_POLYTOPE_A1_ARCHIVE: /workspace/pact/submissions/a1/archive.zip
  D1_POLYTOPE_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  # Catalog #204: leave D1_POLYTOPE_OUTPUT_DIR unset so the remote driver
  # auto-routes to /modal_results/<job>/output when MODAL_RUNTIME=1.
  D1_POLYTOPE_EPOCHS: "1000"
  D1_POLYTOPE_UPSTREAM_DIR: /workspace/pact/upstream
  D1_POLYTOPE_DEVICE: cuda
  D1_POLYTOPE_PAYLOAD_BITS: "8000"
  D1_POLYTOPE_JACOBIAN_LIPSCHITZ: "20.0"
  # Use the 16x-shrunk L2 margin-map path. Full 384x512 maps paid a
  # measured ~43 KB sidecar tax; 96x128 is the cost-efficient D1 smoke target.
  D1_POLYTOPE_MARGIN_H: "96"
  D1_POLYTOPE_MARGIN_W: "128"
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_d1_segnet_margin_polytope.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_d1_segnet_margin_polytope.py
  - experiments/results/track4_sg_a1_t178000_20260509/submission_dir/archive.zip
  - tools/validate_dispatch_required_inputs.py (Catalog #152)
  - tools/run_modal_smoke_before_full.py (Catalog #167)
  - tools/score_macos_cpu_advisory_proxy.py (operator pre-smoke gate)

sentinel_files:
  - experiments/train_substrate_d1_segnet_margin_polytope.py
  - src/tac/substrates/d1_segnet_margin_polytope/architecture.py
  - src/tac/substrates/d1_segnet_margin_polytope/archive.py
  - src/tac/substrates/d1_segnet_margin_polytope/margin_map.py
  - src/tac/substrates/d1_segnet_margin_polytope/polytope_encoder.py
  - src/tac/substrates/d1_segnet_margin_polytope/score_aware_loss.py
  - src/tac/substrates/d1_segnet_margin_polytope/inflate.py

notes: |
  D1 L1 is a custody scaffold for the SegNet margin polytope encoder. The
  sidecar grammar, archive composition, base SHA binding, and runtime guard
  are valid, but the current packet is not a score-lowering candidate because
  the runtime does not yet apply the sidecar overlay.

  Per deep-math memo section 10 D1, L2 remains a plausible low-cost path to
  sub-0.188 once the fused D1+A1 runtime consumes d1_polytope.bin and the
  readiness manifest flips runtime_overlay_consumed=true.

  Per CLAUDE.md "HNeRV / leaderboard-implementation parity discipline":
  this is a substrate-engineering lane (substrate-engineering LOC budget
  per HNeRV parity lesson L7). Substrate package + trainer total ~1500
  LOC; freeze-A1 mode keeps the substantive surface small vs joint-mode
  substrates.

  Per CLAUDE.md "Design decisions — non-negotiable": the FULL trainer
  path is currently NotImplementedError-gated until inner-quintet
  council adjudicates the 5 design verdicts enumerated in the trainer
  docstring (Jacobian Lipschitz calibration strategy; per-pair vs
  per-frame margin map; pre- vs post-renderer noise application;
  composition order with YUCR; EMA shadow scope). The SMOKE path
  validates substrate end-to-end at $0 cost.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py
  uses .spawn(); harvest within 24h via tools/harvest_modal_calls.py.

  Per the new macOS-CPU proxy (verified 2026-05-13 within 2e-5 of GHA
  Linux x86_64 contest-CPU): the operator wrapper runs the local-host
  proxy BEFORE Modal smoke, gated on [0.187, 0.200] for the A1 baseline.

  Cost band: tac.cost_band_calibration.predict('modal', 'T4', 1000) —
  hand_calibrated_fallback p50 = $1.00 (n=0 anchors; this dispatch
  bootstraps the calibration system for the D1 family).

