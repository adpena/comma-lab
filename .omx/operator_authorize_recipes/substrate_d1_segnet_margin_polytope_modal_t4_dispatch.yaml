notes: |
  D1 first-anchor dispatch for the SegNet margin polytope encoder.
  Per deep-math memo §10 D1 this is the LOWEST-COST sufficient path to
  sub-0.188-CLEARING ($1 Modal smoke + 3 days build; $0 GPU during the
  L1 SCAFFOLD landing).

  Per CLAUDE.md "HNeRV / leaderboard-implementation parity discipline":
  this is a substrate-engineering lane (substrate-engineering LOC budget
  per HNeRV parity lesson L7). Substrate package + trainer total ~1500
  LOC; freeze-A1 mode keeps the substantive surface small vs joint-mode
  substrates.

  Per CLAUDE.md "Design decisions — non-negotiable": the FULL trainer
  path is currently NotImplementedError-gated until inner-quintet
  council adjudicates the 5 design verdicts enumerated in the trainer
  docstring (Jacobian Lipschitz calibration strategy; per-pair vs
  per-frame margin map; pre- vs post-renderer noise application;
  composition order with YUCR; EMA shadow scope). The SMOKE path
  validates substrate end-to-end at $0 cost.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py
  uses .spawn(); harvest within 24h via tools/harvest_modal_calls.py.

  Per the new macOS-CPU proxy (verified 2026-05-13 within 2e-5 of GHA
  Linux x86_64 contest-CPU): the operator wrapper runs the local-host
  proxy BEFORE Modal smoke, gated on [0.187, 0.200] for the A1 baseline.

  Cost band: tac.cost_band_calibration.predict('modal', 'T4', 1000) —
  hand_calibrated_fallback p50 = $1.00 (n=0 anchors; this dispatch
  bootstraps the calibration system for the D1 family).

