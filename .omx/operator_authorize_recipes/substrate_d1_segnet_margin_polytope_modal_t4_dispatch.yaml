predicted_delta_basis: ".omx/research/deep_math_geometry_manifolds_synthesis_20260514.md#section-10-top-5-dispatch-queue-d1"
literature_anchor: "Fridrich-Holub 2014 UNIWARD steganalysis + Filler 2011 STC + Boyd-Vandenberghe 2004 §6 polytope geometry"
council_verdicts:
  D1: "sidecar architecture (HNeRV parity L3; mirrors YUCR + a1_plus_wavelet pattern)"
  D2: "≤500 B target overhead at full budget (smaller than YUCR; margin map is non-negative + brotli-friendly)"
  D3: "freeze-A1 base (default; B-side composition order may flip after empirical anchor lands)"
  D4: "magic-byte 'D1PY' distinct from YUCR/WAV1/LPA1/STC1"
  D5: "frame-1 polytope-interior noise allocation (deep-math memo §3.6)"
  D6: "BOTH AXES contest-CPU + contest-CUDA (mandatory; CUDA inline, CPU dispatched separately)"

predicted_band: [0.165, 0.200]

risk: |
  D1 is the lowest-cost sub-0.188-CLEARING substrate per deep-math memo §10
  Top-K ranking. Predicted Δ band -0.005 to -0.012 is BOUNDED-FROM-ABOVE
  by the fraction of pixels with high margin × per-pixel safe-bit budget.
  An A1 archive whose margin distribution skews boundary-dominant (>50%
  pixels with m < margin_threshold) would compress the achievable Δ
  toward the lower bound -0.005.

  A1 substrate is FROZEN (loaded verbatim from archive.zip SHA
  87ec7ca5f2f328a8acdfc65f5cce0ab08a3a558eae88f36d4140870f141492b5
  unzipped to 178,162 B "x" blob SHA 8e664385...). The D1POLY1 sidecar
  carries only the int8 margin map + brotli-compressed polytope payload
  + base sha truncation + metadata JSON. Predicted overhead ~1-2 KB
  post-brotli.

  Per CLAUDE.md "Submission auth eval — BOTH CPU AND CUDA" non-negotiable,
  this lane requires BOTH `[contest-CUDA]` (inline) AND `[contest-CPU]`
  (Linux x86_64 separate dispatch) before promotion. First-anchor dispatch
  is CUDA-only; CPU axis follow-up is a separate operator step.

  Smoke-before-full pattern (Catalog #167): the operator-authorize wrapper
  routes through `tools/run_modal_smoke_before_full.py` which fires a
  100-epoch ~$0.15 Modal T4 smoke FIRST, validates rc=0 + auth-eval JSON
  present + score in plausible band [0.15, 0.25], then fires the full
  1000-epoch T4 dispatch only on smoke-green.

  Pre-smoke macOS-CPU SANITY gate (operator pre-approved 2026-05-13):
  the wrapper runs `tools/score_macos_cpu_advisory_proxy.py` on the A1
  baseline BEFORE Modal smoke to verify the proxy chain end-to-end.
  Proxy score outside [0.187, 0.200] refuses the chain at $0.

envelope_status: "FITS $5 envelope at p50 fallback (macOS-CPU $0 + smoke $0.15 + full $1.00)"

