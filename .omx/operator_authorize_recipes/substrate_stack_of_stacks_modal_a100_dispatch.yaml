  * L12 single-LOC review — PARTIAL: composer tests exist; dispatch path blocked.
  * L13 KILL is last resort — N/A (build-time module, no kill verdict).

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py
  uses .spawn(); harvest within 24h via tools/harvest_modal_calls.py.

