notes: |
  Per TT cost refinement landing 2026-05-11 + 2026-05-12 engineering audit:

  AMDAHL-ADJUSTED SPEEDUP MATH (Amdahl decomposition, NOT multiplicative-naive):
    Per-batch decomposition on T4: ~80% scorer work + ~20% other.
    - teacher cache: 1.25× (NOT 1.4×)
    - soft_cosine: 1.11× (NOT 5×)
    - batch_size 32: 1.13× of total (NOT 1.18×)
    - autocast FP16: ~1.6× (NOT 4-6×)
    - Compound, INDEPENDENT assumption: ~2.5-3.5× total speedup, NOT 33-50×.
    - Compound, REALISTIC (savings overlap): ~1.6-2.0× total worst case.

  REALIZED COST BAND post-Tier-1:
    - Modal T4 all-flags-on PRE-patch:    ~$50-80 / 3000 ep (codex empirical)
    - Modal T4 all-flags-on POST-patch:   ~$15-25 / 3000 ep
    - Modal A100 all-flags-on POST-patch: ~$8-15 / 3000 ep
    - Vast.ai 4090 all-flags-on POST-patch: ~$3-8 / 3000 ep

  WORKABLE COST FRAME FOR $5-INDIVIDUAL CAP:
    At 3000 epochs only platform within $5 is Vast.ai 4090; for sub-$5 dispatches
    on Modal, use REDUCED epoch counts (500-1000ep).

  Per CLAUDE.md "Submission auth eval — BOTH CPU AND CUDA": Modal T4 training
  does NOT produce promotion-grade contest-CUDA anchor. A real [contest-CUDA]
  anchor requires a separate Vast.ai 4090 / Lightning T4 exact-eval dispatch
  on the trained checkpoint AFTER harvest.

