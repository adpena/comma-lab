schema_version: 1
name: substrate_c6_e4_mdl_ibps_latent192_modal_t4_smoke_dispatch
lane_id: lane_c6_ibps_reactivation_path_b_latent_dim_sweep_build_20260518
# C6 IBPS reactivation path (b) — latent_dim=192 (8x baseline) Wave 2 BUILD
# recipe per R3 SEAL council (`feedback_recursive_adversarial_review_r3_council_rotation_c_seal_gate_post_r2_clean_landed_20260517.md`)
# op-routable #2 + C6 IBPS first-asymptotic dispatch empirical falsification
# anchor (`feedback_c6_ibps_first_asymptotic_dispatch_smoke_before_full_paired_landed_20260517.md`).
#
# Architecture: same C6 IBPS substrate as baseline; ONLY change is latent_dim=192
# vs baseline 24. Parameter counts: encoder=57504 + decoder=143330 + latents=115200
# = 316034 total (+145% vs baseline 128882). Per-pair int8 latent: 115200 bytes
# (vs baseline 14400 bytes).
#
# Cargo-cult unwound per the IBPS empirical falsification:
#   - CC-1 (latent_dim=24 sufficient): 8x capacity tests the maximum reasonable
#     IB bottleneck width before the per-pair latent dominates the archive.
#
# Empirical hypothesis (per Tishby I(T;Y) information-bottleneck framework):
#   - IF latent_192 smoke ≈ latent_96 smoke → diminishing returns; optimal
#     width is somewhere in [48, 96]; archive cost penalty dominates
#   - IF latent_192 smoke significantly < latent_96 smoke → linear-in-dim
#     trend continues; consider even wider (256 max per encoder constraint)
#
# Per CLAUDE.md "Substrate scaffolds MUST be COMPLETE or RESEARCH-ONLY"
# (Catalog #240) the recipe remains `research_only: true` + `dispatch_enabled:
# false` at THIS landing pending operator sign-off.
research_only: true
dispatch_enabled: false
dispatch_blockers:
  - r3_seal_op_routable_2_requires_operator_sign_off_for_reactivation_path_b_dispatch
  - catalog_167_smoke_before_full_pattern_required_at_dispatch_time
  - catalog_324_predicted_band_validation_status_pending_post_training_tier_c_required_before_promotion
  - paired_cpu_cuda_empirical_anchor_required_before_promotion_eligible_per_catalog_220
  - latent_96_smoke_outcome_required_before_latent_192_fire_per_cost_band_ladder
summary: |
  C6 IBPS reactivation path (b) — latent_dim=192 (8x baseline) Wave 2 BUILD
  recipe per R3 SEAL council op-routable #2 (Schmidhuber rationale).

  Architecture: same C6 IBPS substrate (IBEncoder + IBDecoder + per-pair
  latents) as baseline; ONLY change is latent_dim=192 vs baseline 24.

  Hypothesis: per Tishby I(T;Y) framework, 8x capacity is the maximum
  reasonable IB bottleneck width before the per-pair latent dominates the
  archive (115KB latents at 192 vs 14KB at 24). Tests the upper end of the
  width sweep.

  Predicted ΔS band: TBD_post_training_tier_c_re_measurement per Catalog #324.
  This recipe declares predicted_band_validation_status: pending_post_training
  and requires a 50ep smoke + post-training Tier-C re-measurement BEFORE any
  predictive band is committed.

  Param breakdown (verified empirically):
    encoder = 57,504 params
    decoder = 143,330 params
    latents = 115,200 params (600 pairs x 192 latent_dim)
    TOTAL   = 316,034 params (+145% vs baseline 128,882)
    per-pair int8 = 115,200 bytes (vs baseline 14,400)
    archive estimate: ~400-550 KB (vs baseline 225 KB)

platform: modal
gpu: "${MODAL_GPU:-T4}"
min_vram_gb: 16
min_smoke_gpu: "A10G"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - contest_generalized
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: c6_e4_mdl_ibps_latent96
# Sequential cost-band ladder: latent_96 smoke is the canary for latent_192.
# Per R3 SEAL Schmidhuber: cheap-first dispatching tests the hypothesis at
# minimum cost. If latent_96 shows diminishing returns vs latent_48,
# latent_192 is DEFERRED (budget redirected to alternative reducers).

active_dispatch_contract: c6_mdl_ibps_latent192_substrate
dispatch_contracts:
  - id: c6_mdl_ibps_latent192_substrate
    archive_role: monolithic_ibps1_self_contained_latent192
    builder_surface: experiments/train_substrate_c6_e4_mdl_ibps.py
    status: active_recipe_contract
    exact_eval_path: archive.zip -> submission/inflate.sh -> experiments/contest_auth_eval.py --device cuda

cost_band:
  epochs: 50
  smoke_score_band: [0.10, 0.50]
  predicted_cpu_band: TBD_post_training
  predicted_cost_usd: 0.75
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 0.50
  platform_key: modal
  gpu_key: A10G

predicted_score_target: null
predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: "Catalog #324 + R3 SEAL op-routable #2: dispatch remains disabled until (a) 50ep Modal A10G smoke lands with archive + auth-eval evidence, (b) post-training Tier-C density measurement replaces random-init basis, (c) revised predicted band is committed based on empirical evidence. latent_192 is the upper-end sweep; if latent_96 already showed diminishing returns, this dispatch is DEFERRED and budget redirected to alternative reducers per Catalog #308."
smoke_score_band: [0.10, 0.50]
predicted_delta: "pending_post_training_tier_c_re_measurement per Catalog #324; baseline C6 IBPS at latent_dim=24 produced 3.04 [contest-CPU advisory]; latent_192 reactivation path (b) hypothesis is 8x capacity at upper-end of reasonable IB bottleneck width"
predicted_delta_basis: "R3 SEAL council op-routable #2 (Schmidhuber rationale; rotation C 2026-05-18) + C6 IBPS first-asymptotic dispatch empirical falsification + Catalog #324 META-FIX (pending post-training Tier-C validation required for any predicted_band)"
provenance_kind: empirical_anchor_pending_smoke
literature_anchor: |
  Tishby & Zaslavsky (2015) "Deep Learning and the Information Bottleneck Principle"
    IEEE Info. Theory Workshop DOI 10.1109/ITW.2015.7133169;
  Schmidhuber (R3 SEAL council 2026-05-18) — C6 IBPS empirical 3.04 + SegNet
    collapse IS empirical validation that 24-dim is WRONG operating point per
    Tishby I(T;Y) decomposition, NOT refutation of compression-as-intelligence
    framework;
  Atick & Redlich (1990) "Towards a theory of early visual processing";
  Rissanen (1978) "Modeling by shortest data description" Automatica 14:465-471;
  Alemi et al. (2017) "Deep Variational Information Bottleneck" ICLR.

source_supports: |
  Tishby-Zaslavsky 2015 IB framework establishes saturation curves with
  bottleneck capacity. 8x capacity (192 vs 24) tests the upper limit before
  per-pair latent dominates archive byte budget.

paper_claim_scope: |
  Source theorems establish bottleneck-width vs task-complexity relationship.
  Neither paper makes claims about latent_dim=192 being optimal for the Pact
  contest scorer. That surface IS the C6 IBPS latent192 sweep empirical anchor
  target via the 50ep Modal A10G smoke + paired CPU/CUDA auth-eval.

pact_must_prove: |
  C6 IBPS latent_dim=192 must empirically prove on paired CPU/CUDA: (a) the
  8x-wider bottleneck preserves SegNet-relevant features at the maximum
  reasonable capacity before archive cost dominates; (b) the rate increase
  from 115200 vs 14400 bytes/pair is recovered by segmentation gain
  (challenging — 8x rate increase needs proportional score reduction); (c)
  the smoke score IS lower than latent_96 — IF YES → linear-in-dim trend
  continues; consider 256-width or beyond; IF latent_192 ≈ latent_96 →
  diminishing returns confirmed; optimal width in [48, 96]; pivot to
  alternative reducers per Catalog #308 (β-IB sweep at fixed optimal width,
  chroma-priors per Atick-Redlich, per-class segmentation conditioning).

decode_complexity_evidence: |
  Inflate runtime: same vendored C6 IBPS substrate package. Per-pair int8
  latent grows 8x from 14400 → 115200 bytes/pair. T4 single-pair decode time
  marginally affected (decoder body identical; only input embedding width
  grows). Archive 400-550 KB approaches the practical contest-CPU budget
  limit; rate term penalty significant.

risk: |
  C6 IBPS latent_dim=192 sweep BUILD trainer extension IS complete (zero LOC
  delta). Recipe non-dispatchable (`research_only: true`, `dispatch_enabled:
  false`) pending R3 SEAL op-routable #2 operator sign-off + Catalog #167
  smoke-before-full gate + Catalog #324 post-training Tier-C re-measurement.

  Architectural risk:
  - Archive cost grows substantially (400-550 KB estimated). The rate term in
    the contest score IS proportional to archive bytes; this width must produce
    proportional score reduction OR the rate penalty dominates.
  - The IB bottleneck (192-dim) is approaching the encoder constraint
    (max 256 in IBEncoder validation). Wider widths require encoder refactor.
  - 8x per-pair latent storage may push smoke wall-clock beyond 50ep A10G
    budget. May need to reduce epoch count to 25 if Modal A10G times out.
  - If latent_192 STILL doesn't preserve SegNet, the IB bottleneck is NOT
    the dominant bottleneck — the SegNet collapse mechanism is architectural
    or loss-balancing rather than capacity-bound; alternative reducers per
    Catalog #308 are the next path forward.

  Modal A10G per baseline + canonical A10G minimum. Helper
  `tools/run_modal_smoke_before_full.py` honors `min_smoke_gpu: "A10G"`.

  Per CLAUDE.md "Auth eval EVERYWHERE" + "Submission auth eval — BOTH CPU AND
  CUDA": dispatch ends with CUDA auth eval + paired CPU eval before any
  frontier-claim language.

envelope_status: "FITS $0.75 smoke envelope at A10G p50 fallback ($0.50); paired CPU adds $0.25; total $0.75 per latent_192 dispatch (sequential AFTER latent_96 outcome). Higher cost reflects larger model + archive."

