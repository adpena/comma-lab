schema_version: 1
name: substrate_sabor_boundary_only_renderer_modal_t4_dispatch
lane_id: lane_sabor_boundary_only_renderer_substrate_20260513
summary: >-
  SABOR (Stable-Argmax Boundary-Only Renderer) first-anchor Modal T4 dispatch.
  Council F O1 first-principles substrate — consumes the 14.6-263 MB free-byte
  capacity proven by the φ1 SABOR audit (2026-05-13) by factoring each frame
  into a sparse boundary mask + high-fidelity boundary RGB + per-class mean +
  per-pair bias + FiLM refinement.

platform: modal
gpu: "${MODAL_GPU:-T4}"
min_vram_gb: 14
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - research_substrate
canary_status: independent_substrate

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 1.50
  platform_key: modal
  gpu_key: T4

predicted_score_target: 0.175
predicted_delta: >-
  Council F O1 derivation: by replacing dense renderer fidelity with sparse
  boundary fidelity + per-class interior fill, SABOR consumes the
  argmax-stable interior capacity at near-zero SegNet cost. Predicted band
  [0.165, 0.185] [contest-CPU prediction].
predicted_delta_basis: >-
  .omx/research/sabor_boundary_audit_20260513.md (φ1 empirical capacity
  proof: 99.27% argmax-stable @ ε=32; 14.6 MB free-byte capacity per
  video; interior fraction ≥ 0.97 of stable fraction).
literature_anchor: >-
  Mallat 1989 "A theory for multiresolution signal decomposition" (boundary
  vs interior factorization is a non-wavelet analog) +
  Yousfi/Fridrich 2014 UNIWARD steganography (textured-region undetectability
  is the dual of SegNet argmax-stable interior capacity).
council_verdicts:
  D1: >-
    O1 first-principles Council F design: boundary-only renderer with verbatim
    boundary RGB + per-class interior mean (operator-pre-approved 2026-05-13).
  D2: >-
    Archive grammar SBO1 monolithic 0.bin per HNeRV parity discipline L2/L3
    (operator-pre-approved); inflate.py ≤ 200 LOC (substrate_engineering opt-out
    per L7).
  D3: >-
    Independent substrate (no A1 base composition); standalone full RGB renderer
    per HNeRV parity L5.
  D4: >-
    SBO1 magic + version + parser_section_manifest declared at design time
    (Catalog #124).
  D5: >-
    Score-aware Lagrangian + boundary-consistency regularizer; pose-weight
    tilt opt-in at frontier operating points.
  D6: >-
    BOTH AXES contest-CPU + contest-CUDA (mandatory; CUDA inline, CPU
    dispatched separately via operator wrapper).

predicted_band: [0.165, 0.185]

risk: >-
  First-anchor SABOR dispatch on Modal T4. The φ1 audit empirically proved
  the free-byte capacity exists (14.6 MB per video at ε=32 conservative);
  this dispatch tests whether a learned boundary/interior renderer
  consumes that capacity at sub-0.20 contest-CPU. Predicted band
  [0.165, 0.185] is wider than capacity alone implies because the
  operating gap between capacity and achievable depends on boundary
  fraction (1-3% per audit) AND per-class mean fidelity.

  Smoke-before-full (Catalog #167): operator wrapper routes through
  tools/run_modal_smoke_before_full.py — 100-epoch ~$0.20 smoke validates
  rc=0 + auth-eval JSON + plausible band [0.10, 0.30], then fires the
  full 2000-epoch T4 dispatch only on smoke-green.

envelope_status: >-
  FITS $5 envelope at p50 fallback (smoke $0.20 + full $1.50).

