  ARCHIVE BYTES PREDICTION (entropy reduction):
    Per OVERNIGHT-TT empirical test (test_lower_lut_bits_smaller_brotli_output):
    lut_bits=5 brotli output is measurably smaller than lut_bits=8 on
    smooth natural-video grayscale (typical 30-40% reduction). On the
    canonical 600-pair x 96 x 128 grayscale field at lut_bits=8 the
    brotli-compressed output is ~2,200,000 bytes (per canonical recipe
    notes). At lut_bits=5 the predicted compressed bytes are
    ~1,400,000-1,500,000 (33% reduction). Total archive bytes savings
    ~700,000 -> rate-term reduction = 25 * 700,000 / 37,545,489 = ~0.0047
    [PREDICTED; per canonical formula per Catalog #344 equation
    procedural_codebook_from_seed_compression_savings_v1 IN-DOMAIN context].

