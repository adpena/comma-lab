  the canonical lut_bits=8 recipe) unblocks the STC residual sidecar paid
  Modal smoke per OVERNIGHT-W §5 reactivation criteria. STC sidecar
  requires the lut_bits=5 cover-signal granularity to bypass the AA HIGH
  verdict premise-failure that blocked STC v1 dispatch.

  Catalog #344 canonical equation reference:
  procedural_predictor_plus_residual_correction_savings_v1 IN-DOMAIN per
  Catalog #359 (downstream STC residual sidecar over this Selfcomp base
