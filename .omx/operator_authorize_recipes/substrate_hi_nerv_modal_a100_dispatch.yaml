risk: |
  WAVE-3-HNERV-C MEDIUM-target first-anchor research dispatch on Modal A100.
  Trainer _full_main wires 16 stages including auth eval at stage 12. Single-axis
  [contest-CUDA] acceptable for first anchor; CPU axis required separately
  before promotion. Architectural twist: hierarchical 3-scale latent pyramid
  (coarse + mid + fine) per Chen et al. NeurIPS 2023 HiNeRV. ~250K-param
  target vs sane_hnerv ~229K (+20K bytes for tripled latent tables).
  At PR106 r2 operating point, +20K bytes = +5e-4 score impact through rate
