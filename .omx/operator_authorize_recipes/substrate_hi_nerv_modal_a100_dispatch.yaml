notes: |
  WAVE-3-HNERV-C MEDIUM-target HNeRV-family substrate dispatch.

  Architectural twist vs sane_hnerv: 3-scale latent pyramid (coarse +
  mid + fine). Coarse latent seeds the initial spatial grid (sane_hnerv
  parity); mid latent injected after decoder block 2 (mid-resolution
  feature maps); fine latent injected after decoder block 4 (high-
  resolution feature maps). Each scale carries its own learnable
  injector. Chen et al. NeurIPS 2023 HiNeRV is the canonical reference;
  multi-scale latents let the decoder allocate capacity where each
  scale demands it (coarse = global pose; mid = mid-frequency texture;
  fine = high-frequency contest-relevant detail).

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py
  uses .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

  Cost band: tac.cost_band_calibration.predict('modal', 'A100', 2000) -
  current confidence: weak_posterior (N=1 anchor from sane_hnerv). The
  +1 USD over ds_nerv recipe accounts for +20K archive bytes overhead
  (3 latent tables vs 1) translating into marginally higher per-epoch
  cost on the rate-term computation.

