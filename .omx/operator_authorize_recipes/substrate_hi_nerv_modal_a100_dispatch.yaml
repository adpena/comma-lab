defer_reason: |
  MEDIUM-target HNeRV-family dispatch is intentionally held behind the
  HIGH-target substrate anchors (SIREN, Cool-Chic, VQ-VAE, self_compress_nn,
  balle_renderer). The trainer, wrapper, and remote driver exist, but this
