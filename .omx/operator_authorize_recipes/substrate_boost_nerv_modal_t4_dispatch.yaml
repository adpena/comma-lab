schema_version: 1
name: substrate_boost_nerv_modal_t4_dispatch
lane_id: lane_boost_nerv_l0_scaffold_20260520
summary: |
  boost_nerv L0 SCAFFOLD diagnostic recipe (Modal T4). Pairs with
  experiments/train_substrate_boost_nerv.py (WAVE-3-NERV-LITERATURE-L0-RESCOPED
  queue 2026-05-20). NOT DISPATCH-ELIGIBLE: substrate is research_only until
  the Phase 2 council symposium per CLAUDE.md "PER-SUBSTRATE OPTIMAL FORM via
  adversarial grand council symposium" (Catalog #325) lands.

  Literature: Liu et al. ECCV 2024 BoostNeRV (iterative residual refinement).
  Operator 5-tier fit ranking: HIGH FIT ⭐⭐⭐⭐⭐ - paradigm-orthogonal
  iterative residual chain sidecar; composes WITH any base substrate.

dispatch_enabled: false
research_only: true

dispatch_blockers:
  - per_substrate_council_symposium_pending_per_catalog_325
  - full_main_raises_NotImplementedError_per_catalog_240
  - phase_2_council_approval_required_to_lift_research_only_per_catalog_315
  - score_aware_lagrangian_wire_in_pending_for_full_path

platform: modal
gpu: "${MODAL_GPU:-T4}"
min_vram_gb: 16
# Catalog #215: T4 acceptable for boost_nerv L0 SCAFFOLD smoke (small base
# decoder + boosting heads fit comfortably). Full mode is gated.
min_smoke_gpu: "T4"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: ds_nerv

cost_band:
  epochs: 100
  all_flags_on: false
  hand_calibrated_fallback_p50_usd: 0.59
  platform_key: modal
  gpu_key: T4

# Catalog #324: predicted_band_validation_status MUST be declared for any
# recipe carrying predicted_band. L0 SCAFFOLD recipe omits predicted_band
# entirely because no measurement has been made.
predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: |
  Post-training Tier-C density re-measurement via
  tools/mdl_scorer_conditional_ablation.py --tier c on the landed archive
  after Phase 2 council symposium per Catalog #325 admits the substrate for
  full-mode training. Pre-training prediction is CARGO-CULTED per Catalog
  #324 + sister C6 IBPS 22x miss empirical anchor 2026-05-17.

predicted_score_target: "unknown_l0_scaffold_pending_council_symposium"
predicted_delta: "unknown_l0_scaffold_no_empirical_anchor"
literature_anchor: "Liu et al. ECCV 2024 BoostNeRV (iterative residual refinement for INR)"

risk: |
  L0 SCAFFOLD posture. The trainer experiments/train_substrate_boost_nerv.py
  raises NotImplementedError on the non-smoke path per Catalog #240
  (recipe-vs-trainer-state consistency). The recipe is dispatch_enabled:false
  + research_only:true so the operator-authorize harness refuses to fire a
  paid dispatch from this recipe per the recipe-state-consistency gate.

  Architectural distinction vs ds_nerv canonical sister: boost_nerv adds an
  iterative residual-refinement chain (NUM_BOOSTING_ROUNDS=2 default) on top
  of the DepthSep base decoder. Per-round residuals are clamped to [-0.1,
  +0.1] before addition. The boosting paradigm composes WITH any base
  substrate at L1+; the L0 SCAFFOLD uses DepthSep base for parity with
  ds_nerv reference.

  Phase 2 council symposium MUST evaluate:
    (a) cargo-cult audit per Catalog #303 (num_boosting_rounds=2 +
        boosting_gain_clamp=0.1 + shared latent across rounds all
        CARGO-CULTED at L0; require empirical sweep);
    (b) 9-dim success checklist evidence per Catalog #294;
    (c) observability surface declaration per Catalog #305;
    (d) Dykstra-feasibility predicted-band per Catalog #296;
    (e) horizon-class declaration per Catalog #309 (plateau_adjacent /
        frontier_pursuit / asymptotic_pursuit);
    (f) per-substrate symposium 6-step contract per Catalog #325.

envelope_status: |
  RESEARCH_ONLY: dispatch refused per recipe + trainer + 4 catalog gates
  (#220 + #240 + #315 + #325). Reactivation criteria documented in trainer
  _full_main docstring + this recipe's dispatch_blockers + lane registry
  notes.

remote_driver: scripts/remote_lane_substrate_boost_nerv.sh
timeout_hours: 1.5

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv
  - flag: --output-dir
    note: "required (no default); operator must thread"

modal:
  lane_script: scripts/remote_lane_substrate_boost_nerv.sh
  cost_band_trainer: experiments/train_substrate_boost_nerv.py
  cost_band_epochs: 100
  cost_band_batch_size: 2
  cost_band_all_flags_on: false

required_input_files_trainer: experiments/train_substrate_boost_nerv.py

env_overrides:
  # Catalog #326 driver-mode-hardcode-fix: this recipe explicitly forces
  # SMOKE_ONLY=1 because the trainer's full path raises NotImplementedError;
  # the only legitimate execution path is the smoke.
  BOOST_NERV_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  BOOST_NERV_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  BOOST_NERV_OUTPUT_DIR: /workspace/pact/lane_boost_nerv_l0_scaffold_results/output
  BOOST_NERV_EPOCHS: "2"
  BOOST_NERV_UPSTREAM_DIR: /workspace/pact/upstream
  BOOST_NERV_DEVICE: cpu
  BOOST_NERV_SMOKE: "1"
  SMOKE_ONLY: "1"
  LOCAL_CUDA_WORKER: "0"

dependencies:
  - scripts/remote_lane_substrate_boost_nerv.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_boost_nerv.py
  - src/tac/substrates/boost_nerv/__init__.py
  - src/tac/substrates/boost_nerv/architecture.py
  - src/tac/substrates/boost_nerv/archive.py
  - src/tac/substrates/boost_nerv/inflate.py
  - src/tac/substrates/boost_nerv/score_aware_loss.py
  - src/tac/substrates/_shared/trainer_skeleton.py
  - src/tac/differentiable_eval_roundtrip.py

sentinel_files:
  - src/tac/substrates/boost_nerv/architecture.py
  - src/tac/substrates/boost_nerv/archive.py
  - src/tac/substrates/_shared/trainer_skeleton.py
  - src/tac/differentiable_eval_roundtrip.py

reactivation_criteria: |
  1. Per-substrate adversarial grand council symposium per CLAUDE.md
     "PER-SUBSTRATE OPTIMAL FORM via adversarial grand council symposium"
     (Catalog #325) returns PROCEED or PROCEED_WITH_REVISIONS verdict
     for boost_nerv specifically. Symposium memo must satisfy the canonical
     6-step contract (cargo-cult audit per #303 + 9-dim checklist per #294
     + observability surface per #305 + sextet pact deliberation + per-substrate
     reactivation criteria + Catalog #324 post-training Tier-C validation
     discipline).
  2. Cargo-cult audit per Catalog #303 surfaces the 3 CARGO-CULTED choices
     documented in src/tac/substrates/boost_nerv/__init__.py
     (num_boosting_rounds=2; gain clamp [-0.1, 0.1]; shared latent across
     rounds). The audit MUST either (a) empirically validate each via
     sweep OR (b) reclassify as HARD-EARNED with citation.
  3. Trainer experiments/train_substrate_boost_nerv.py _full_main path
     replaces NotImplementedError with real score-aware Lagrangian + EMA
     + canonical auth-eval helper invocation per Catalog #226.
  4. Recipe research_only flips from true to false; dispatch_enabled
     flips from false to true; predicted_band declared with
     validation_status (post_training validated or pending_post_training
     with reactivation criterion) per Catalog #324.

