notes: |
  Z3-G1 entropy-coded v2 research-only smoke recipe.

  Architecture: v2 substrate REPLACES Z3 v2's empty-slot Z3HV2 packet with
  a NEW Z3G2 packet that ACTUALLY ships entropy-coded sigma table + class
  indices. The shipped archive packet differs from Z3 v2 by ~205B of
  distinguishing-feature bytes (sigma_table_blob ~300B + class_prior_cdf 10B
  + class_index_blob ~200B - residual_blob delta).

  Per CLAUDE.md "Substrate scaffolds MUST be COMPLETE or RESEARCH-ONLY":
  v2 remains research_only=true because the full trainer/export/auth-eval
  path is still council-gated. Its bytes are structurally live only at
  parser/intermediate scope because:
  (a) byte-mutation smoke PASSES locally per Catalog #139;
  (b) inflate consumer ACTUALLY processes the bytes (per-pair sigma lookup
      multiplies into latent reconstruction at line ~120 of inflate_consumer.py);
  (c) SubstrateContract remains RESEARCH_ONLY until full-frame proof lands.

  Dispatch remains BLOCKED until _full_main stops raising NotImplementedError,
  the remote driver exists and passes strict predeploy, and the archive
  promotion path emits paired CPU+CUDA auth-eval custody.

  Predicted contest-CPU band: 0.178-0.190 [prediction; first-principles-bound].
  Predicted contest-CUDA band: unknown until same-archive CUDA anchor exists.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py
  uses .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
