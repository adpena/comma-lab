summary: |
  Z3-G1 entropy-coded v2 substrate — operator-approved 2026-05-15
  reactivation of v1 (lane_z3_g1_scorer_softmax_hyperprior_gating_20260515,
  research_only=true, deferred per F1 codex finding empirical confirmation).

  v2 introduces a NEW magic + grammar (Z3G2) that REPLACES the empty Z3HV2
  `hyperprior_weights_int8` + `w_hat_int8` slots with TWO entropy-coded
  streams ACTUALLY shipped at the wire-byte level:

      sigma_table_blob:    brotli(sigma_table_int8) ~300B
      class_prior_cdf:     5*uint16 = 10B raw
      class_index_blob:    constriction-Huffman(class_indices) ~200B

  These bytes are parser/intermediate-consumed by the Z3G2 consumer (verified structurally by
  ``tools/verify_z3_g1_entropy_coded_v2_byte_mutation.py`` per Catalog
  #139; PASSED locally pre-dispatch). This is not a full-frame `inflate.sh`
  mutation proof and must not be promoted as semantic frame-output evidence.

  Score movement is unranked until a full-frame `inflate.sh` mutation proof
  and paired CPU+CUDA exact eval exist. The byte-side rate calculation remains
  a planning hypothesis only, not a dispatch-ranking claim.

  Per Catalog #240 dispatch_enabled=true requires implementation_complete.
  The current trainer full path is intentionally council-gated and raises
  NotImplementedError, so this recipe is fail-closed as research_only=true
  and dispatch_enabled=false until the real train/export/auth-eval path lands.

