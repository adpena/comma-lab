predicted_delta: "unranked; current scaffold is a lossy latent transform and requires full-frame mutation plus paired exact eval before score movement can be claimed"
predicted_delta_basis: |
  v1 was a research-substrate trap: hyperprior_weights_int8 + w_hat_int8
  shipped empty (b"") in the production-safe direct-residual mode, so
  v1 packets were byte-identical to Z3 v2 baseline (smoke 0.19869 EXACTLY
  matched Z3 v2 0.19869). v2 fixes this by introducing a new magic Z3G2
  with entropy-coded sigma table + class-index slots that ACTUALLY ship.

  Math sanity:
  - v2 section size estimate: 1986B (vs A1 latent_blob 15387B)
  - Bytes saved: ~13.4 KB
  - Rate term reduction: 25 * 13400 / 37545489 ≈ -0.0089 rate-axis
  - Distortion-axis impact: unknown until paired exact eval; the current
    implementation is a lossy latent transform because sigma affects the
    reconstructed latent at inflate time.
  - Predicted band [-0.005, -0.015] (haircut for distillation imperfection
    + non-stationary class statistics + sigma table quantization)

  Smoke section size verified locally: 479B for synthetic inputs (well
  within predicted band; full training will produce class-correlated
  sigma table → similar section size).

literature_anchor: |
  Wunderkind G1 SUBSTITUTION-1:1 spec
  (`feedback_wunderkind_visionary_scorer_as_cooperative_receiver_paradigm_shift_20260515.md`)
  + Ballé, Minnen, Singh, Hwang, Johnston (2018) "Variational image compression
  with a scale hyperprior" ICLR 2018 arXiv:1802.01436
  + Slepian-Wolf (1973) "Noiseless coding of correlated information sources"
  + Atick & Redlich (1990) "Towards a theory of early visual processing"
  + Hinton & Vinyals (2014) "Distilling the knowledge in a neural network"
  + Witten, Neal, Cleary (1987) "Arithmetic coding for data compression"

risk: |
  Z3-G1 v2 first paired Modal T4 dispatch. Predicted band [0.178, 0.190]
  is a first-principles synthesis (Wunderkind G1 spec + Ballé 2018 amortization
  + conservative class-entropy estimate), NOT measurement.

  Architectural risk:
  - At A1's 99.29% scorer-conditional MDL density (Z1 ablation EUREKA finding)
    the within-class encoder is structurally saturated. v2's across-class
    move depends on SegNet class actually disambiguating per-pair latent
    statistics. If class membership is uncorrelated with residual entropy,
    delta will be at the LOW end of the predicted band (~0).
  - The byte-mutation smoke per Catalog #139 PASSED LOCALLY on synthetic
    inputs at the parser/intermediate tensor layer. Full-frame `inflate.sh`
    byte-mutation and paired auth-eval custody are still required.
  - F1-class regression (v1's empty-slot trap) is structurally extincted
    by the Z3G2 wire grammar (sigma_table_blob_len > 0 enforced at encode
    time; distinguishing_feature_bytes > 0 reported in archive contract).

