schema_version: 1
name: substrate_hf_jobs_segnet_surrogate_distillation_per_pixel_t4_dispatch
lane_id: lane_hf_jobs_segnet_surrogate_distillation_per_pixel_20260519
summary: |
  HF Jobs SAM2-tiny per-pixel SegNet surrogate distillation - sister lane
  to slot 7's image-level distillation that honors the T1 symposium's
  Contrarian VETO on image-level-only distillation metric.

  Per the T1 symposium at
  `.omx/research/council_t1_hf_jobs_segnet_surrogate_distillation_per_pixel_symposium_20260519.md`:
  this lane is specifically designed to honor the IMAGE-LEVEL lane's
  Contrarian VETO (Section 4 of slot 7's symposium memo). Targets
  `facebook/sam2.1-hiera-tiny` (~38.9M params) trained via the
  `huggingface-skills:hugging-face-vision-trainer` plugin's canonical SAM
  segmentation template with DiceCE loss.

  3-metric reporting per Contrarian VETO + HNeRV parity L6 score-domain
  Lagrangian + Catalog #322 / #323 canonical Provenance:
  1. `eval_mean_iou` PRIMARY (mean IoU across classes)
  2. `eval_per_class_iou_*` DIAGNOSTIC (per-class IoU vector)
  3. `eval_argmax_disagreement_rate` CONTEST-AXIS PARITY (direct contest
     scorer signal `(argmax(pred) != gt).mean()`)

  Surrogate output is `[predicted]` per Catalog #287 / #323 canonical
  Provenance until paired Linux x86_64 contest-CPU anchor + NVIDIA T4
  contest-CUDA anchor land via the apples-to-apples evaluator.

# Platform = HF Jobs (canonical dispatcher: tools/dispatch_hf_jobs_segnet_surrogate_per_pixel.py)
platform: hf_jobs
dispatch_kind: tool
gpu: t4-small
flavor: t4-small

# Per Catalog #270 dispatch optimization protocol + Catalog #325 6-step
# per-substrate symposium contract:
min_vram_gb: 16
min_smoke_gpu: "T4"

video_input_strategy: shared_volume_no_contention_expected
pyav_decode_strategy: not_applicable
target_modes:
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: substrate_hf_jobs_segnet_surrogate_distillation

# Per Catalog #240 recipe-vs-trainer-state consistency: the trainer
# `experiments/hf_jobs_segnet_surrogate_distillation_per_pixel.py` has a
# complete main() (no NotImplementedError).

active_dispatch_contract: hf_jobs_surrogate_distillation_per_pixel
dispatch_contracts:
  - id: hf_jobs_surrogate_distillation_per_pixel
    archive_role: hf_hub_model_artifact_not_contest_archive
    builder_surface: experiments/hf_jobs_segnet_surrogate_distillation_per_pixel.py
    status: active_recipe_contract
    exact_eval_path: hub_model -> downstream substrate trainer per-pixel teacher -> substrate archive.zip -> contest_auth_eval.py

cost_band:
  epochs: 30
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 2.00
  platform_key: hf_jobs
  gpu_key: t4-small

# Per Catalog #324 predicted band requires post-training Tier-C validation
# discipline. The mIoU-distilled surrogate is predicted to track contest-CPU
# floor more tightly than the image-level surrogate because the surrogate
# gradient is closer to the actual scorer signal per HNeRV parity L6
# (score-domain Lagrangian).
predicted_band: [0.180, 0.190]
predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: |
  Per Catalog #324: dispatch remains research_only until BOTH
  (a) the landed SAM2-tiny surrogate weights AND
  (b) the first substrate trainer that consumes the surrogate as per-pixel
      teacher signal
  receive post-training Tier-C density validation via
  `tools/mdl_scorer_conditional_ablation.py --tier c` on the substrate
  trainer's archive sha after 100ep+ training. Current band is a
  DESIGN-TIME hypothesis with phantom_random_init provenance.

predicted_score_target: 0.185
smoke_score_band: [0.50, 0.85]  # eval_mean_iou; SAM2 per-pixel binary mIoU on 60-pair eval split

hub_dataset_repo: adpena/comma-video-segnet-image-level-600pairs
hub_model_repo: adpena/comma-segnet-surrogate-sam2-tiny-per-pixel

# Per Catalog #152 + #151 required input file validation
required_input_files:
  - flag: --hub-dataset-repo
    env: HF_JOBS_HUB_DATASET_REPO
    default: adpena/comma-video-segnet-image-level-600pairs
    description: "HF Hub source dataset (must exist; built via tools/build_comma_video_segnet_image_level_600pairs_hf_dataset.py)"
    required_input_file: false
  - flag: --hub-model-repo
    env: HF_JOBS_HUB_MODEL_REPO
    default: adpena/comma-segnet-surrogate-sam2-tiny-per-pixel
    description: "HF Hub destination model repo (created by dispatcher if absent)"
    required_input_file: false

# Per Catalog #325 per-substrate optimal form symposium evidence
council_symposium_memo: .omx/research/council_t1_hf_jobs_segnet_surrogate_distillation_per_pixel_symposium_20260519.md
council_symposium_verdict: PROCEED

# Per CLAUDE.md "Substrate scaffolds MUST be COMPLETE or RESEARCH-ONLY":
# operator-routable to flip dispatch_enabled=true after Tier-C anchor lands
# per Catalog #324.
research_only: true
dispatch_enabled: false
dispatch_blockers:
  - operator_review_of_council_symposium_required_before_first_paid_dispatch
  - sister_image_level_lane_smoke_recommended_first_for_apples_to_apples_comparison
  - hub_dataset_must_exist_before_dispatch_fires_run_build_comma_video_segnet_image_level_600pairs_hf_dataset_py_upload_first

# 6-hook wire-in per Catalog #125
solver_wire_in_hooks:
  sensitivity_map: "ACTIVE - per-class IoU vector IS the per-class sensitivity signal; consumable by downstream tac.sensitivity_map.* for substrate-design Pareto ranking"
  pareto_constraint: "N/A - surrogate output not in contest archive"
  bit_allocator: "N/A - no archive bytes"
  cathedral_autopilot_dispatch: "ACTIVE - operator can route to either image-level OR per-pixel surrogate via dispatch wrapper choice"
  continual_learning_posterior: "ACTIVE - every dispatch emits posterior anchor via tac.deploy.hf_jobs.job_id_ledger.register_dispatched_hf_jobs_id + per-class IoU posterior tracked"
  probe_disambiguator: "N/A - sister lane IS the disambiguator vs image-level (Contrarian VETO honored structurally)"

# Provenance + reproduction
build_first:
  description: "Build + upload the HF dataset BEFORE the first HF Jobs dispatch"
  command: |
    .venv/bin/python tools/build_comma_video_segnet_image_level_600pairs_hf_dataset.py \\
        --upload --hub-repo-id adpena/comma-video-segnet-image-level-600pairs

dispatch_command:
  description: "Canonical SAM2 per-pixel HF Jobs dispatch invocation (dry-run first; flip --dry-run to fire paid dispatch after operator review)"
  command: |
    .venv/bin/python tools/dispatch_hf_jobs_segnet_surrogate_per_pixel.py \\
        --hub-dataset-repo adpena/comma-video-segnet-image-level-600pairs \\
        --hub-model-repo adpena/comma-segnet-surrogate-sam2-tiny-per-pixel \\
        --model facebook/sam2.1-hiera-tiny \\
        --flavor t4-small \\
        --num-epochs 30 \\
        --lane-id lane_hf_jobs_segnet_surrogate_distillation_per_pixel_20260519 \\
        --recipe .omx/operator_authorize_recipes/substrate_hf_jobs_segnet_surrogate_distillation_per_pixel_t4_dispatch.yaml \\
        --label hf_jobs_segnet_surrogate_per_pixel_first_smoke \\
        --dry-run
