  - tools/validate_dispatch_required_inputs.py (Catalog #152)

notes: |
  WAVE-4-GRAYSCALE-LUT MEDIUM-target attack on PR101's 0.193 [contest-CUDA]
  gold via the analog-signal rate-axis substrate distinction.

  Grayscale-LUT architectural distinction vs sane_hnerv (continuous fp16
  latents) / vq_vae (discrete codebook + log2(K) bits/cell) / siren (zero
  latents, all-MLP) / cool_chic (continuous AR-coded latents):
    Per-pair rate is dominated by the grayscale field bytes:
      grayscale field bytes  = 600 pairs * 96 * 128 * 1B uint8 = 7,372,800 B raw
      after brotli (~70% compression on smooth natural-video grayscale)
                              ~ 2,200,000 B
      decoder bytes          = ~94K params * 2 (fp16) + brotli ~ 100,000 B
      pair_embedding bytes   = 600 * 16 * 2 (fp16)               = 19,200 B
      total per video        approximately 2.3 MB raw -> ~120 KB if we drop
                              spatial resolution to H/8 x W/8 (operator knob)
    The grayscale stream is the dominant rate term; council default
    grayscale_downsample=4 gives ~96 x 128 grid which is more aggressive
    than vq_vae's 48 x 64 codebook grid but with 1 channel instead of 9 bits
    per cell.

  Selfcomp PR #56 paradigm: Selfcomp's seat in the grand council is
  "architect of the grayscale-LUT analog mask paradigm + 1.017-bpw block-FP
  weight self-compression + 94K-param SegMap; PR #56's lead implementer".
  This substrate IS the contest-frontier replay of his PR #56 mechanism
  re-interpreted as a full-RGB renderer (not a mask-only codec; per HNeRV
  parity lesson L5 the renderer must be the FULL slot, not a single-component
  slot).

  TV regularizer note: the score-aware Lagrangian adds a per-pair
  total-variation term `tv_term = grayscale_tv_weight * (tv_x + tv_y)`
  on the grayscale parameter. Smoother grayscale -> smaller brotli output
  -> smaller archive bytes. The TV weight is operator-tunable; council
  default 0.01 is conservative.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

