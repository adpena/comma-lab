min_vram_gb: 40
# Catalog #215 (FIX-HARDEN-OPT 2026-05-14 P0): A100 full-run requires
# matching smoke-phase compute class. SIREN smoke timed out on T4 default
# (rc=124 at 3601s wall-clock 2026-05-13); coordinate-MLP / NeRV-family
# substrates won't complete 100-epoch smoke on T4 within timeout. Declaring
# min_smoke_gpu pins the smoke phase to A100 too; the CLI --smoke-gpu T4
# default is overridden. Backfilled by RECIPE-CANON-BACKFILL-SUBAGENT
# 2026-05-14 (lane_recipe_canon_backfill_sweep_20260514).
min_smoke_gpu: "A100"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: sane_hnerv
dispatch_enabled: false
research_only: false
defer_reason: |
  Grayscale-LUT is implemented, has a trainer, and has a canonical
  smoke-before-full wrapper, but it remains behind the canary/cost-calibration
  gate. Do not fan out MEDIUM/experimental substrates until sane_hnerv and
  balle_renderer canaries establish real Modal cost/runtime behavior and the
  HIGH-priority anchors are classified.
dispatch_blockers:
  - high_target_substrate_anchor_required
  - modal_cost_band_success_anchor_required
  - modal_smoke_not_yet_green

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 5.50
  platform_key: modal
  gpu_key: A100

predicted_score_target: 0.18
predicted_delta: "-0.013 vs PR101 0.193 [predicted; council Phase 5]"
predicted_delta_basis: ".omx/research/grand_council_fields_medal_substrate_design_20260512.md#grayscale_lut"
literature_anchor: "Selfcomp / szabolcs-cs PR #56 grayscale-LUT analog mask paradigm + Quantizr 0.33 anchor 2026-04-21"
council_phase_5_prediction: 0.18
substrate_tradition: TRADITION_1

risk: |
  WAVE-4 MEDIUM-target dispatch on Modal A100. Grayscale-LUT factors per-pair
  information into (a) a 1-channel grayscale field at H/4 x W/4 (the dominant
  rate term, exploiting AV1-like analog-signal compression via uint8 + brotli),
  plus (b) a tiny FiLM-conditioned RGB decoder (~94K params per Selfcomp's
  anchor) that maps grayscale + per-pair embedding -> RGB.

  Architectural risks:
  (a) GRAYSCALE-LUT EXPRESSIVITY CEILING - the colorization decoder may not
      have enough capacity to rescue arbitrary RGB content from luminance
      alone; mitigated by per-pair FiLM embedding (16-dim) which carries the
      missing chroma/identity information; council default decoder_hidden=48
      keeps the post-grayscale decoder large enough for natural-video
      diversity while staying under the ~94K param Selfcomp anchor.
  (b) TV REGULARIZER OVER-SMOOTHING - the grayscale_tv_weight (default 0.01)
      pulls the grayscale field toward smoother (= more compressible)
      configurations; too high collapses to mid-gray, too low forfeits
      brotli savings; council default is conservative (0.01) and trainer
      allows operator override via --grayscale-tv-weight.
  (c) GRAYSCALE BIT-DEPTH QUANTIZATION ARTIFACTS - uint8 grayscale at archive
      time loses ~0.4% of the precision the trainer sees; the trainer's
      eval-roundtrip simulation should make the model robust to this; if
      empirical anchor shows large train/auth-eval gap, consider int10
      quantization in a v2 (would change archive grammar -> bump GLV
      schema version to 2).

  Trainer _full_main wires 15 stages including auth eval at stage 12.
  Single-axis [contest-CUDA] acceptable for first anchor; CPU axis required
  separately before promotion.
envelope_status: "FITS $20 envelope at p50 fallback (~$5.50)"

remote_driver: scripts/remote_lane_substrate_grayscale_lut.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_grayscale_lut.sh
  cost_band_trainer: experiments/train_substrate_grayscale_lut.py
  cost_band_epochs: 2000
  cost_band_batch_size: 16
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_grayscale_lut.py

env_overrides:
  GRAYSCALE_LUT_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  GRAYSCALE_LUT_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  GRAYSCALE_LUT_OUTPUT_DIR: /workspace/pact/lane_substrate_grayscale_lut_results/output
  GRAYSCALE_LUT_EPOCHS: "2000"
  GRAYSCALE_LUT_BATCH_SIZE: "16"
  GRAYSCALE_LUT_UPSTREAM_DIR: /workspace/pact/upstream
  GRAYSCALE_LUT_DEVICE: cuda
  GRAYSCALE_LUT_EXPORT_ONLY_CHECKPOINT: "${GRAYSCALE_LUT_EXPORT_ONLY_CHECKPOINT:-}"
  # Leave 30 min inside the 4h provider envelope for checkpoint export + auth artifacts.
  GRAYSCALE_LUT_SOFT_TRAIN_DEADLINE_SECONDS: "12600"
  LOCAL_CUDA_WORKER: "1"

