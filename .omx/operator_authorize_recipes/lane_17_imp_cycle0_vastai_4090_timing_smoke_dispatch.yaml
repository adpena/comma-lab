risk: |
  The old 1.98 [contest-CUDA] cycle-0 result was a stub-loop artifact, but
  standalone Lane-G-v3 recovery is not frontier authority. The frontier-EV
  path is IMP plus Quantizr/FP4 composition after a legitimate cycle-0 smoke.

envelope_status: "FITS $1-2 timing-smoke envelope but dispatch is blocked pending symposium revisions"
