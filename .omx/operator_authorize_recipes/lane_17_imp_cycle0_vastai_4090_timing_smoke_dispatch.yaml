  evidence_axis: "[local-IMP-mask-byte-proxy advisory]"
  verdict: catalog308_disambiguator_landed_pending_cycle0_empirical_runs
  score_claim: false
  promotion_eligible: false
  ready_for_paid_dispatch: false
  observed_criteria:
    - l1_per_tensor_canonical_frankle
    - global_l1_canonical_frankle
    - hessian_trace_per_tensor_obd_proxy
    - score_gradient_saliency_catalog123
  byte_proxy_note: >
    No-spend local anchor measurement only: per-tensor L1 measured 154552 IMPS
    bytes at 89.3% sparsity vs global L1 177466 bytes on the same Lane G v3
    FP4A anchor. The Catalog #123 score-gradient branch is deliberately not
    measured until a real score-gradient saliency sidecar is supplied; the
    probe refuses a global-L1 surrogate for that branch. This is not scorer
    parity, not cycle-0 recovery, and not dispatch authority.

