  Frankle-Carbin 2019 Lottery Ticket Hypothesis; Renda-Frankle-Carbin 2020
  linear-mode connectivity; 2024-2026 pruning/distillation updates cited by
  the comprehensive research wave. These are hypothesis anchors, not score
  evidence for the contest renderer.

