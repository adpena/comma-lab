schema_version: 1
name: substrate_pretrained_driving_prior_modal_t4_dispatch
lane_id: lane_pretrained_driving_prior_lane_scaffold_20260513
summary: Pre-trained dashcam-prior side-lane (DP1) — MEDIUM-EV dual-purpose substrate. Contest-score + production-deployment alignment. Codebook distilled OFFLINE from Comma2k19 (MIT). Scaffold L0 — no GPU spend without explicit operator approval.

platform: modal
gpu: "${MODAL_GPU:-T4}"
smoke_only: true
smoke_validation_contract: training_artifact_v1
min_vram_gb: 16
min_smoke_gpu: "T4"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - production_generalized
  - production_edge_adaptive
  - research_substrate
canary_status: independent_substrate
active_dispatch_contract: dpp_scaffold_smoke_only
dispatch_contracts:
  - id: dpp_scaffold_smoke_only
    archive_role: replaces_hnerv_a1_substrate_with_dashcam_prior
    builder_surface: experiments/train_substrate_pretrained_driving_prior.py
    status: scaffold_only_no_full_dispatch
    exact_eval_path: blocked_until_full_training_and_byte_closed_runtime_land
  - id: dpp_residual_on_a1_base
    archive_role: residual_sidecar_on_hnerv_a1_base
    builder_surface: future composition with tac.substrates.time_traveler_l5_autonomy
    status: not_dispatched_by_this_recipe
    required_custody: old/new archive sha256, base runtime tree sha256, residual payload sha256, no-op proof

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 3.00
  platform_key: modal
  gpu_key: T4

predicted_score_target: null
predicted_band: [0.175, 0.190]
predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: "Replace this planning band only after harvested DP1 training artifacts and post-training Tier-C density / exact-score review."
smoke_score_band: [0.050, 5.000]
predicted_delta: "Δ contest-CPU [-0.005, -0.012] per pretrained_driving_prior literature-prediction; the contest scorer was ALREADY trained on driving data so the prior is partially redundant"
predicted_delta_basis: ".omx/research/expert_team_hardware_physics_future_alien_tech_20260513.md#L378 (rank 3 candidate)"
literature_anchor: "NASA Goddard PASS-AI prior (§2.3) + Time-Traveler pre-trained prior (§6 #2). Cross-ref: Comma2k19 MIT (github.com/commaai/comma2k19)."

risk: |
  Smoke-only recipe by default. The trainer's _full_main is now implemented,
  but full dispatch is still NOT enabled by this recipe unless the operator
  explicitly sets DPP_RUN_FULL=1 and supplies a deterministic dataset source
  (DPP_COMMA2K19_CHUNKS_DIR, DPP_CACHE_DIR, or DPP_USE_STREAMER=1). Promotion
  remains blocked until real codebook distillation, byte-closed runtime custody,
  no-op consumption proof, and paired contest-CPU / contest-CUDA auth eval land.

  STRATEGIC NOTE (operator 2026-05-13): the contest scorer (FastViT-T12 +
  EfficientNet-B2) was already trained on driving data so it implicitly
  contains the dashcam prior. Adding ANOTHER prior on top is partially
  redundant. Predicted Δ contest-CPU is -0.005 to -0.012 — MEDIUM-EV at the
  contest. HIGH-EV for production-deployment-shaped contest entry where the
  prior IS the architecture that scales (federated edge-device aggregation).

  LICENSE: Comma2k19 (MIT) is the default + commercial-OK; BDD100K dataset
  images are UC Berkeley research-only OPT-IN behind
  --allow-bdd100k-dataset-images; Waymo Open Dataset is SKIPPED per
  non-commercial restriction. License attribution is BAKED into the
  codebook metadata so any downstream consumer can audit provenance.

envelope_status: "FITS $20 envelope at p50 $3 fallback (scaffold smoke ~$0.50)"

remote_driver: scripts/remote_lane_substrate_pretrained_driving_prior.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_pretrained_driving_prior.sh
  cost_band_trainer: experiments/train_substrate_pretrained_driving_prior.py
  cost_band_epochs: 2000
  cost_band_batch_size: 1
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_pretrained_driving_prior.py

# Per Catalog #191 sentinel-file SHA-stability gate. The substrate's source
# files MUST remain byte-stable between dispatch-spawn and worker-start;
# a sibling-subagent edit triggers rc=13 BEFORE the GPU meter starts.
sentinel_files:
  - src/tac/substrates/pretrained_driving_prior/__init__.py
  - src/tac/substrates/pretrained_driving_prior/dataset_source.py
  - src/tac/substrates/pretrained_driving_prior/codebook.py
  - src/tac/substrates/pretrained_driving_prior/distillation.py
  - src/tac/substrates/pretrained_driving_prior/local_chunk_cache.py
  - src/tac/substrates/pretrained_driving_prior/local_chunk_streamer.py
  - src/tac/substrates/pretrained_driving_prior/log_incremental_feeder.py
  - src/tac/substrates/pretrained_driving_prior/prior_application.py
  - src/tac/substrates/pretrained_driving_prior/composition.py
  - src/tac/substrates/pretrained_driving_prior/archive.py
  - src/tac/substrates/pretrained_driving_prior/inflate.py
  - src/tac/substrates/pretrained_driving_prior/architecture.py
  - src/tac/substrates/pretrained_driving_prior/score_aware_loss.py
  - src/tac/substrates/_shared/trainer_skeleton.py
  - src/tac/substrates/score_aware_common.py

env_overrides:
  DPP_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  DPP_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  DPP_OUTPUT_DIR: /workspace/pact/lane_pretrained_driving_prior_results/output
  DPP_EPOCHS: "2000"
  DPP_BATCH_SIZE: "1"
  DPP_UPSTREAM_DIR: /workspace/pact/upstream
  DPP_DEVICE: cuda
  DPP_DATASET_NAME: comma2k19
  DPP_ENABLE_AUTOCAST_FP16: "1"
  DPP_ENABLE_GT_SCORER_CACHE: "1"
  DPP_ENABLE_TORCH_COMPILE: "0"
  DPP_USE_STREAMER: "0"
  DPP_MAX_DISTILLATION_FRAMES: "4096"
  DPP_MAX_DISTILLATION_CHUNKS: "8"
  DPP_MAX_PAIRS: "600"
  DPP_VAL_PAIR_COUNT: "64"
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_pretrained_driving_prior.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_pretrained_driving_prior.py
  - tools/validate_dispatch_required_inputs.py
  - src/tac/substrates/pretrained_driving_prior/

notes: |
  Pre-trained driving prior side-lane (DP1) — dual-purpose substrate.

  Composition with the time-traveler L5 substrate: both share the score-domain
  Lagrangian via Catalog #164 ``score_pair_components``; composition is a
  typed sum of archive grammars under a future wrapper (not in this recipe).

  Federated-learning architecture: ``aggregate_local_codebooks`` in
  ``distillation.py`` sketches the upstream merge rule. Future Comma edge
  devices can compute LOCAL deltas and contribute upstream via differential-
  privacy-protected aggregation (out of scope for this scaffold).

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": if Phase 2 fires this
  recipe, modal_train_lane.py uses .spawn(); harvest within 24h via
  tools/harvest_modal_calls.py --execute or experiments/modal_recover_lane.py.

  Cross-ref:
    .omx/research/expert_team_hardware_physics_future_alien_tech_20260513.md
    feedback_pretrained_driving_prior_lane_scaffold_LANDED_20260513.md (post-landing)
