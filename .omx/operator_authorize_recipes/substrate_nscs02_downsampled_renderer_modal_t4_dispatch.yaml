literature_anchor: "Audit math basis: SegNet stride-2 stem (upstream/modules.py:103-109) discards half resolution before scoring; PoseNet preprocess interpolates to (384, 512); rendering at (192, 256) is the SCORE-INVISIBLE downscale floor."

risk: |
  ASSUMPTIONS-CHALLENGE-AUDIT NSCS02 risk classification: LOW.

  The NSCS02 hypothesis: both contest scorers internally interpolate
  to (384, 512) inside `preprocess_input`. SegNet adds a stride-2
  EfficientNet-B2 stem on top, halving again to (192, 256) effective
  receptive field. Rendering at (192, 256) means EVERY pixel the
  scorer sees was directly produced; no info loss vs rendering at
  (384, 512) and letting SegNet stride-2 throw it away.

  PoseNet does NOT have the stride-2 stem; FastViT-T12 sees the full
  (384, 512) preprocessed input. NSCS02's risk is concentrated in the
  PoseNet axis: bicubic upsample (192, 256) -> (384, 512) may
  introduce anti-aliasing artifacts the FastViT pose head detects.
  The audit's reactivation criterion is "If d_pose regression > 5e-4,
  defer pending PoseNet sensitivity to upsampling-induced anti-aliasing".

  Per CLAUDE.md "Submission auth eval — BOTH CPU AND CUDA" non-negotiable,
  this lane requires BOTH `[contest-CUDA]` (inline) AND `[contest-CPU]`
  (Linux x86_64 separate dispatch) before promotion.

  Smoke-before-full pattern (Catalog #167): after the full path lands, the
  operator-authorize wrapper should route through `tools/run_modal_smoke_before_full.py`.
  This landing is fail-closed: the local `--smoke` path is parser/runtime
  evidence only and does not produce an auth-eval score claim.

envelope_status: "FITS $20 envelope at p50 fallback (smoke $0.30 + full $5-15)"

