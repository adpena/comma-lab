  reviewable in 30 seconds, mirroring the PR101 model).

  Catalog #220 OPERATIONAL declaration: `score_improvement_mechanism_status=OPERATIONAL`
  + `runtime_overlay_consumed=true` + `operational_overlay=true` —
  the inflate-time bicubic upsample is the score-relevant runtime
  consumption that converts the smaller archive bytes into score-
  relevant frame-pixels. Sister of A1's inflate-time upsample
  (which already exists at 384 -> 874); NSCS02 deepens the
  downsample to 192 to exploit SegNet's stride-2 invisibility.

  Catalog #240 (recipe-vs-trainer state consistency): trainer's
  `_full_main` raises `NotImplementedError` pending smoke-before-full
  validation and the real train/export/auth-eval path. This recipe is
  therefore fail-closed with `research_only: true` and
  `dispatch_enabled: false`; the local `--smoke` path remains useful as
  parser/runtime evidence, but it is not a contest-CUDA dispatch recipe.

