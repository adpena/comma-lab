  research-signal sweeps that feed `tac.optimization.mps_research_signal`
  (per CLAUDE.md 2026-05-07 refinement: tag MPS sweeps `MPS-research-signal`
  with `score_claim=false`, `promotion_eligible=false`).

  TIER manifest gap: as a library, no TIER manifest exists. Architecture
