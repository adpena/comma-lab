schema_version: 1
name: substrate_mlx_mask_renderer_local_apple_silicon_dispatch
lane_id: lane_substrate_mlx_mask_renderer_20260512
summary: MLX MaskRenderer TRADITION 2 substrate research-only dispatch on local Apple Silicon (PERMANENTLY non-promotable; pre-training only).

dispatch_enabled: false
research_only: true
substrate_tradition: TRADITION_2
defer_reason: |
  THREE structural blockers:

  (1) src/tac/mlx_renderer.py runs on Apple MLX (Metal). Per CLAUDE.md
      "MPS auth eval is NOISE — NON-NEGOTIABLE, HIGHEST EMPHASIS":
      LOCAL MPS/MLX IS NEVER TO BE USED AS SCORE TRUTH OR AS THE AUTHORITY
      FOR STRATEGY, PLANNING, OR ANALYSIS. Any score from MLX is
      `[MPS-PROXY]` / `[macOS-CPU advisory only]`, not `[contest-CUDA]` or
      `[contest-CPU]` (which requires Linux x86_64).

  (2) The module is LIBRARY-ONLY (no argparse, no `if __name__ == "__main__"`).
      It exposes `MaskRenderer`, `MotionPredictor`, `PairGenerator`, plus
      `pytorch_to_mlx()` / `mlx_to_pytorch()` weight conversion utilities.
      The intended use is: train Phase 1 in MLX (4.7x faster than PyTorch
      MPS for forward+backward on M-series) → convert to PyTorch → continue
      Phase 2 (scorer fine-tune) on CUDA.

  (3) NO trainer script exists. The MLX-side Phase 1 trainer would need to
      be authored before any operator_authorize dispatch, and the final
      [contest-CUDA] anchor MUST come from the PyTorch/CUDA Phase 2, not
      from MLX.

  Per CLAUDE.md non-negotiable, any "dispatch" of this substrate produces
  research-signal-only output. Promotion-grade evidence requires the
  PyTorch/CUDA Phase 2 follow-up on a separate lane.

dispatch_blockers:
  - mps_mlx_non_promotable_per_claude_md_non_negotiable
  - canonical_trainer_script_missing
  - phase_2_cuda_followup_required_for_score_truth
  - tier_manifest_required_for_catalog_151_compliance

