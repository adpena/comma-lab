summary: |
  L2 SAR coherent pose-pair integration substrate (SARC) — reverse-engineered
  from the alien-tech master synthesis Lincoln Lab L2 entry (rank #1 EV/$ in
  the floor-v3 commit 27a7950fd). Per Cook & Bernfeld 1967 *Radar Signals* +
  Carrara, Goodman, Majewski 1995 *Spotlight Synthetic Aperture Radar*: phase
  coherence across 600 contest pose-pairs synthesizes a √600 ≈ 24× coherent
  SNR gain → ~4.6 fewer bits per pose-symbol → predicted ΔS -0.0056 vs PR101
  0.193 anchor. Predicted band [0.187, 0.190] [first-principles-bound,
  literature-prediction]. Target archive: 50-70 KB.

