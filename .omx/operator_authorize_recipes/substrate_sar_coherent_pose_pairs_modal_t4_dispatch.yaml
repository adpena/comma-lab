notes: |
  L2 SAR coherent pose-pair integration substrate dispatch recipe.

  The substrate is a single-archive SARC packet at 50-70 KB target.
  Renderer (Stage 1, ~15-25 KB FP16 SIREN MLP) + sparse rFFT pose codec
  (Stage 2, ~3-5 KB) + per-pair int8 RGB residual (Stage 3, ~30-40 KB at
  50 B/pair × 600 pairs) + header/meta JSON (Stage 4, ~1 KB).

  Per the floor-v3 ranking commit 27a7950fd, L2 SAR is rank #1 EV/$ across
  the alien-tech short-list — $1 dispatch cost, 30-60 min wall-clock,
  predicted ΔS -0.0056. The cheap T4 dispatch makes this an ideal first-
  anchor for the SAR-coherent paradigm; success unlocks larger pose-axis
  composition surfaces.

  Predicted contest-CUDA score: 0.187-0.190 [first-principles-bound,
  literature-prediction] (NOT a score claim — score authority requires CUDA
  + CPU paired auth eval on 1:1 contest-CI hardware per CLAUDE.md
  "Submission auth eval — BOTH CPU AND CUDA").

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

