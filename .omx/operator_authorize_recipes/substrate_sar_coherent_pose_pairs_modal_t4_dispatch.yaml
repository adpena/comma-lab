  Atick & Redlich (1990) Neural Computation 2:308-320 (cooperative-receiver).
council_phase_5_prediction: 0.188

risk: |
  L2 SAR substrate first-anchor dispatch. The substrate is novel — the
  sparse rFFT pose codec + SIREN renderer + per-pair RGB residual composition
  has NOT been empirically anchored against the contest video. The predicted
  band [0.187, 0.190] is a literature-prediction synthesis (Cook & Bernfeld
  1967 + Carrara 1995 + L2 ledger §2.2 first-principles math), not measurement.

  Architectural risk:
  - L2 ledger §2.4 falsification: SAR coherence requires temporal smoothness
    of the pose trajectory. Empirical contest dashcam data shows ~80% energy
    in the lowest 10% of bins (sustained-velocity highway driving), but if
    the actual spectrum is uniform, sparse retention provides no compression
    gain. The score-aware loss includes a SAR temporal-smoothness aux term
    (delta_temporal=0.05) to actively encourage the precondition.
  - Renderer is sub-50K params with SIREN-style init; lr=5e-4 with grad-clip=1.0
    is conservative against omega=30 gradient amplification.
  - Per-pair residual budget is 50 B/pair (30 KB total); per codex's math
    correction (`feedback_codex_math_correction_pr95_lora_dora_landed_20260513.md`)
    30 KB rate penalty ≈ 0.020 score; must overcome via pose+seg reduction.

  Modal T4 training is diagnostic unless the auth-eval contract itself records
  score_axis=contest_cuda and score_claim_valid=true. CPU axis remains required
  separately on Linux x86_64 before any frontier-claim language.

envelope_status: "FITS $5 envelope at p50 fallback (cheap T4 dispatch)"

