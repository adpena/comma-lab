summary: |
  PACT-NeRV-IA3 paired CPU+CUDA dispatch recipe. Pairs with
  experiments/train_substrate_pact_nerv_ia3.py (the PyTorch sister; the MLX
  trainer at experiments/train_substrate_pact_nerv_ia3_mlx_local.py is for
  $0 MLX-LOCAL training only).

  The promotion path consumes:
    (a) MLX-trained .npsd state_dict (from MLX trainer)
    (b) MLX -> PyTorch .pt via tools/export_pact_nerv_ia3_mlx_to_pytorch_state_dict.py
    (c) PIA3 archive via tac.substrates.pact_nerv_ia3.archive.pack_archive
    (d) Catalog #1265 gate via tools/gate_mlx_candidate_contest_equivalence_pact_nerv_ia3.py
        (verdict OBSERVABILITY-ONLY per the gate's drift-vs-depth anchor;
        does NOT block paired dispatch)
    (e) THIS recipe via tools/operator_authorize.py paired CPU+CUDA

  Architecture: HNeRV-class implicit renderer with IA3 gamma-only ego-pose
  conditioned per-block modulation (Liu et al. 2022 arXiv:2205.05638). The
  distinguishing primitive vs full FiLM gamma+beta: ONLY the gamma multiplier
  projection from ego-pose is learned - there is NO beta bias projection.

  Predicted ΔS band [-0.003, +0.001] per ULTIMATE STAIRCASE Variant #1
  taxonomy (frontier-adjacent; Stage 1 of the canonical 21-step STAIRCASE).
  MLX-LOCAL 2000ep convergence anchor: loss 0.338 -> 0.0024 (140x reduction;
  log-log slope -1.10 = healthy power-law convergence) per landing memo
  `.omx/research/pact_nerv_long_run_mlx_local_closure_landed_20260528.md`.

  Stage 1 dispatch's empirical purpose per PACT-NERV symposium Section 13:
    (a) does IA3 ≈ FiLM (beta-noise hypothesis confirmed; proceed to A1)
    (b) does IA3 << FiLM (beta-signal hypothesis confirmed; FULL must include beta)
    (c) does IA3 >> FiLM (FiLM-overcapacity hypothesis; IA3 IS Pact-NeRV-A2)

