    status: active_recipe_contract
    exact_eval_path: archive.zip -> submission/inflate.sh -> experiments/contest_auth_eval.py --device cuda

cost_band:
  epochs: 100
  all_flags_on: false
  hand_calibrated_fallback_p50_usd: 0.50
  platform_key: modal
  gpu_key: T4

# Catalog #324: predicted_band_validation_status MUST be declared with non-
# placeholder reactivation criterion. The MLX-LOCAL 2000ep training-loss
# anchor (0.0024) does NOT directly project to contest score; the predicted
# band requires post-training Tier-C re-measurement on the landed PIA3 archive.
predicted_band: [-0.003, 0.001]
predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: |
  Post-training Tier-C density re-measurement via
  tools/mdl_scorer_conditional_ablation.py --tier c on the landed PIA3
  archive (post-paired CPU+CUDA dispatch). The current predicted band
  [-0.003, 0.001] is derived from ULTIMATE STAIRCASE Variant #1 taxonomy +
  the FILM-FAMILY-RESEARCH Section 10 Recommendation #5 rate-extremal
  prediction (IA3 halves conditioning bytes vs full FiLM); this is a
  literature-anchor prediction, NOT a Tier-C empirical anchor. Tier-C
  re-measurement on the landed archive is the reactivation criterion that
  flips predicted_band_validation_status to validated_post_training.

predicted_score_target: null
predicted_delta: "[-0.003, +0.001] band [ULTIMATE STAIRCASE Variant #1 + FILM-FAMILY-RESEARCH §10.5 literature-anchor; HIGH VARIANCE pending paired CPU+CUDA empirical anchor + Tier-C re-measurement per Catalog #324]"
predicted_delta_basis: ".omx/research/pact_nerv_ultimate_research_and_design_20260520T193443Z.md Section 8 STAIRCASE Step 1 + Section 4 Variant #1 + Liu 2022 IA3 paper §3.2 rate-extremal claim"

literature_anchor: |
  Liu et al. (2022) "IA3: Infused Adapter by Inhibiting and Amplifying Inner
    Activations" arXiv:2205.05638 (gamma-only rate-extremal modulation);
  Perez et al. (2017) "FiLM: Visual Reasoning with a General Conditioning Layer";
  Chen et al. (2023) "HNeRV: A Hybrid Neural Representation for Videos"
    arXiv:2304.02633 (HNeRV-class base decoder);
  Sitzmann et al. (2020) "Implicit Neural Representations with Periodic
    Activation Functions" arXiv:2006.09661 (SIREN init);
  ULTIMATE design memo:
    `.omx/research/pact_nerv_ultimate_research_and_design_20260520T193443Z.md`
  Bridge extension landing:
    `.omx/research/pact_nerv_long_run_mlx_local_closure_landed_20260528.md`

source_supports: |
  IA3 paper §3.2 empirically demonstrates ~6x parameter-efficiency vs full
  FiLM gamma+beta on language tasks (HARD-EARNED at language-conditioning
  surface). FiLM paper canonical for general per-channel modulation
  conditioning (HARD-EARNED at modulation surface). HNeRV paper canonical
  for implicit video decoder topology (HARD-EARNED at video-renderer
  surface). The empirical question this dispatch tests on OUR specific
  contest video: does the IA3 gamma-only halving of conditioning bytes
  preserve score on per-pair ego-motion-conditioned dashcam video?

paper_claim_scope: |
  IA3 paper claim: gamma-only modulation ~6x more parameter-efficient than
  full FiLM gamma+beta on language tasks. NOT a direct claim about video
  reconstruction OR contest score; pact-nerv-ia3 applies the gamma-only
  modulation primitive to per-pair ego-motion conditioning on a contest-
  specific HNeRV-class renderer. The Stage 1 dispatch's empirical purpose
  IS to verify whether the parameter-efficiency translates to score-axis
  improvement after the rate-distortion tradeoff (per PACT-NERV symposium
  Section 13 hypothesis branches a/b/c).

pact_must_prove: |
  (1) PIA3 archive bytes < FiLM-equivalent archive bytes (rate-axis claim).
  (2) Score delta vs sister boost_nerv baseline (distortion-axis claim).
  (3) Per-substrate symposium IA3-vs-FiLM hypothesis disambiguation per
      PACT-NERV symposium Section 13 (paradigm-axis claim).
  All three are empirically pending on this paired dispatch landing.

decode_complexity_evidence: |
  Inflate.py ≤150 LOC per HNeRV parity L4 (verified via src/tac/substrates/
  pact_nerv_ia3/inflate.py). Runtime dep closure: torch + brotli (≤2 deps
  per HNeRV parity L4). PIA3 grammar: monolithic 0.bin per HNeRV parity L3;
  26-byte fixed header + 5 sections (DECODER_BLOB + LATENT_BLOB +
  EGO_POSE_BLOB + META_BLOB) per src/tac/substrates/pact_nerv_ia3/archive.py.

horizon_class: frontier_pursuit
# Predicted CPU band [0.18, 0.20] per FRONTIER class (not asymptotic; not
# plateau-adjacent). PACT-NeRV-IA3 is a SHALLOW frontier-pursuit candidate
# per the ULTIMATE STAIRCASE Step 1 ranking.

