notes: |
  Wyner-Ziv cooperative-receiver substrate (alien-tech N3) first-anchor
  dispatch recipe.

  The substrate is a single-archive WZ1 packet at 50-70 KB target.
  Renderer (~30 KB FP16 SIREN-style MLP) + side-info predictor (~18 KB
  FP16 small MLP) + per-pair DISCUS coset indices (~6 KB at
  coset_index_bits=8 → 1 B/pair × 600 pairs) + header/meta JSON (~2 KB).

  Per the alien-tech master synthesis ranking, Wyner-Ziv is the #1
  technique by predicted ΔS (-0.05). The cheap A100 dispatch (~$7.50
  p50) makes this a strategic first-anchor for the cooperative-receiver
  paradigm; success unlocks larger composition surfaces with the
  Atick-Redlich sister primitive (`tac.codec.cooperative_receiver`).

  Predicted contest-CUDA score: 0.140-0.150 [wyner-ziv-prediction,
  first-principles-bound] (NOT a score claim — score authority requires
  CUDA + CPU paired auth eval on 1:1 contest-CI hardware per CLAUDE.md
  "Submission auth eval — BOTH CPU AND CUDA").

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py
  uses .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

