risk: |
  Wyner-Ziv substrate first-anchor dispatch. The substrate is novel — the
  renderer + side-info predictor + DISCUS coset coder + cooperative
  reconstruction has NOT been empirically anchored against the contest
  video. The predicted band [0.140, 0.150] is a literature-prediction
  synthesis (Slepian-Wolf-Wyner-Ziv 1973-1976 + DISCUS 2003 + alien-tech
  N3 ranking), not measurement.

  Architectural risk:
  - DISCUS coset binning relies on the side-info predictor Y being a good
    enough proxy for the contest-rounding-error-equivalence-class of the
    source. If Y mispredicts cosets for >25% of pairs, the
    `delta_wyner_ziv` term cannot reduce rate by its predicted -0.05
    score because the coset disambiguation step at inflate time falls
    back to the closest member regardless of side-info quality.
  - Per the floor-v3 commit `27a7950fd` the alien-tech N3 ΔS -0.05
    prediction assumes scorer-conditional entropy `H(X | Y)` is at least
    50% smaller than unconditional entropy `H(X)`. The contest scorer is
    fixed; this assumption holds for the SegNet/PoseNet pair per the
    expert team derivation, but empirical residual variance dominates at
    PR106 r2 frontier operating point so the realized ΔS may be smaller.
  - The renderer is sub-30K params; lr=5e-4 + grad-clip=1.0 are
    conservative against SIREN-style omega=30 gradient amplification.

  Modal A100 training is diagnostic unless the auth-eval contract itself
  records score_axis=contest_cuda and score_claim_valid=true. CPU axis
  remains required separately on Linux x86_64 before any frontier-claim
  language.

