summary: |
  Wyner-Ziv cooperative-receiver substrate (alien-tech N3) — top-ranked
  technique with predicted ΔS -0.05 vs PR101 0.193 anchor per the Bell
  Labs / NSA / Lincoln Lab / JPL alien-tech expert team master synthesis
  (`feedback_expert_team_signal_processing_alien_tech_landed_20260513.md`).
  Per Slepian-Wolf-Wyner-Ziv 1973-1976 + DISCUS 2003 (Pradhan-Ramchandran):
  the SegNet+PoseNet scorer IS the cooperative-receiver side-information
  Y; the encoder transmits only the conditional bits
  ``H(source | scorer_weights + architecture + preprocessing)`` via
  Slepian-Wolf coset binning. The renderer + side-info predictor compose
  through a `delta_wyner_ziv * ||X - Y||^2` term that is the
  differentiable proxy for the conditional rate ``R_WZ(D)``.

  Composition vs Atick-Redlich sister primitive (`tac.codec.cooperative_receiver`):
  Atick-Redlich = MI-max at scorer (forward-pass objective on encoder);
  Wyner-Ziv = lossy source coding with side-info at decoder (archive
  grammar + cooperative reconstruction). Both share the canonical
  `score_pair_components` scorer helper (Catalog #164) under the hood but
  are mathematically distinct primitives composing in different ways.
  Predicted band [0.140, 0.150] `[wyner-ziv-prediction, first-principles-bound]`.

