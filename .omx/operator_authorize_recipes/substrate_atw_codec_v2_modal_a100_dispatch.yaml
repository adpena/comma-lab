predicted_delta: |
  NULL pending H(latent|scorer_class) probe + Dykstra-feasibility check
  [prediction] per design memo §18. Conditional revisions:
    - MEANINGFUL_CONDITIONING (MI >= 0.5): predicted band [-0.015, -0.005] rate-axis
      [prediction; first-principles-bound via Tishby IB lower bound +
      Wyner-Ziv side-info savings * A1 rate-axis ~0.20]
    - WEAK_CONDITIONING (0.01 <= MI < 0.5): [-0.005, -0.002] rate-axis
      [prediction; scales linearly with MI ratio]
    - INDEPENDENT (MI < 0.01): DEFER-pending-research per CLAUDE.md
      "Forbidden premature KILL" — cite G2-PARTIAL alternative hypothesis
predicted_delta_basis: |
  .omx/research/atw_codec_v2_cooperative_receiver_full_stack_design_20260516.md §18
  + .omx/research/atw_codec_v1_cargo_cult_unwind_design_20260516.md (V1 unwind)
  + tools/probe_latent_conditional_entropy_h_latent_given_scorer_class.py (D4 probe)
  Dykstra-feasibility intersection of 4 polytopes:
    - Atick-Redlich rate constraint: R_AR >= H(X) - I(X; Y_cooperative)
    - IB constraint: I(X;T) - beta*I(T;Y) <= K_IB (Tao+Boyd Blahut-Arimoto floor)
    - Wyner-Ziv side-info constraint: R_WZ >= R(D) - I(X; Y_side)
    - Contest rate budget: 25 * archive_bytes / 37545489
  D4 probe MUST run first to disambiguate the WZ side-info constraint
  empirically; predicted band is NULL until verdict lands.

literature_anchor: |
  - Atick & Redlich (1990) "Towards a theory of early visual processing"
    Neural Computation 2(3):308-320 (cooperative-receiver theorem)
  - Tishby, Pereira & Bialek (1999) "The information bottleneck method"
    Proc. 37th Allerton Conf.
  - Wyner & Ziv (1976) "The rate-distortion function for source coding with
    side information at the decoder" IEEE Trans Info Theory 22(1):1-10
  - Tishby & Zaslavsky (2015) "Deep learning and the information bottleneck"
  - Wunderkind candidates G1 + B3 + G2-PARTIAL from
    feedback_wunderkind_visionary_scorer_as_cooperative_receiver_paradigm_shift_20260515.md
  - Grand reunion symposium 2026-05-15 Composite #1 (lines 727-770) — V1 design
  - V1 cargo-cult unwind 2026-05-16 — V1 reactivation criteria
  Source-supports: paper-grade information-theoretic + cooperative-receiver
  bounds; predicted band derived from each via first-principles arithmetic
  over the contest scorer's per-component cost function. PACT must prove:
  the scorer-class-conditional latent residual codec (WZ + G1 + B3
  composition) operationally produces the predicted band on the byte-closed
  ATW2 archive at the contest video, conditional on D4 probe verdict.

paper_claim_scope: |
  Atick-Redlich 1990 establishes cooperative-receiver loss is provably
  optimal for known downstream receiver R. Tishby IB 1999 establishes
  encoder p*(t|x) is closed-form modulo numerical tractability. Wyner-Ziv
  1976 establishes R_WZ(D) = R_X|S(D) <= R(D) for side-info at decoder.
  All three bounds are theoretical; PACT must prove them empirically on
  the contest scorer + contest video + ATW2 archive grammar.

pact_must_prove: |
  ATW V2 produces a contest-CUDA paired score in the predicted band
  conditional on D4 verdict, on the byte-closed ATW2 archive when
  dispatched to Modal A100 with the canonical contest auth eval helper.
  Variant A: $20-30 paired (3-knob regime sweep arbitrates corner regimes).
  Variant B: $10-15 paired (single mechanism direct measurement).

decode_complexity_evidence: |
  Inflate runtime ~200 LOC (substrate_engineering waiver per HNeRV L4 + L7).
  Dependencies: torch + brotli + numpy (3 total). Per-pair compute: 1
  forward through decoder (~ms per pair on A100) + WZ side-info head
  add (~us per pair) + range decode of z_residual via B3 CDF (~ms per
  600 pairs). Total inflate budget << contest 30-min runtime.

council_phase_5_prediction: null  # pending D4 probe verdict
substrate_tradition: ATW_CODEC_V2_DESIGN_MEMO_2026_05_16_VARIANT_B_DEFAULT

risk: |
  MEDIUM-VARIANCE substrate when dispatch_enabled is lifted. Architectural
  risks per design memo §16 cargo-cult audit:

  (a) WYNER-ZIV CONDITIONING ASSUMPTION - if D4 probe returns INDEPENDENT
      (MI < 0.01) the cooperative-receiver hypothesis is FALSIFIED for ATW v2
      and the predicted band is NULL. Mitigated by mandatory pre-dispatch D4
      gate.

  (b) G1 DISTILL HEAD QUALITY - G1's prediction accuracy on the rendered
      output bounds B3's CDF effectiveness. If distill cross-entropy fails
      to converge below 0.5 bits/class, B3 CDF gating provides marginal
      rate savings.

  (c) THREE-KNOB VARIANT A COMPLEXITY - if Variant A is selected the
      regime sweep adds $20-30 to dispatch cost; Variant B is the
      UNIQUE-AND-COMPLETE default per the standing directive.

  Modal A100 cost band: $5-10 smoke; $10-15 Variant B full + paired auth
  eval; $20-30 Variant A regime sweep. Per CLAUDE.md "Submission auth eval
  - BOTH CPU AND CUDA" the dispatch MUST end with paired CPU+CUDA auth
  eval when dispatch is lifted.

