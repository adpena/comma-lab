# RESEARCH-ONLY recipe per CLAUDE.md "Substrate scaffolds MUST be COMPLETE or
# RESEARCH-ONLY" + Catalog #220 + Catalog #240 cascade. The V2 trainer's
# _full_main IS IMPLEMENTED (lifts V1 NotImplementedError) but dispatch is
# gated on the D4 H(latent|scorer_class) probe returning MEANINGFUL_CONDITIONING
# + Dykstra-feasibility check + Variant A vs B council adjudication per
# design memo §19.
research_only: true
dispatch_enabled: false
smoke_only: false  # research-only opt-out covers smoke too at landing
smoke_validation_contract: contest_cuda_auth_eval_v1

# D4 probe gate + reactivation criteria documented in design memo §19.
# Until D4 probe returns MEANINGFUL_CONDITIONING the recipe is research-only
# by construction (dispatch_enabled:false + research_only:true).
#
# 2026-05-18 Codex V2-1 byte-closed probe:
# `.venv/bin/python tools/probe_atw_v2_1_byte_closed_side_info_channel.py`
# built decoder-recoverable ATW21SI side-info packets from the current richer
# reducer artifacts and measured them against A1 latent bytes. All packets fit
# the <=2KB side-info budget, so byte budget is not the blocker. Conditioning
# remains weak: best channel `per_region_histogram` is 323 bytes with
# I(latent; side_info)=0.047381530305 bits/symbol vs 1.0-bit meaningful
# threshold; verdict `WEAK_CONDITIONING`. No dispatch/spend authorized.

summary: |
  ATW codec V2 (Atick-Tishby-Wyner full-stack cooperative-receiver codec)
  per the 2026-05-16 V2 design memo. V2 lifts V1's _full_main
  NotImplementedError AND adds three structural primitives (G1 + B3 + WZ
  side-info head closed-form) that the V1 design memo named as
  reactivation criteria.

  Two variants per design memo §4:
    - Variant A: three-knob (kappa_IB / lambda_WZ / lambda_pixel) — preserves
      probe-disambiguator regime sweep arbitration; ~450-600 LOC bolt-on
    - Variant B: single-knob WZ-only — UNIQUE-AND-COMPLETE substrate-optimal
      engineering per the standing directive; ~250-350 LOC; DEFAULT

  Three Wunderkind primitives operationalized per
  ``feedback_wunderkind_visionary_scorer_as_cooperative_receiver_paradigm_shift_20260515.md``:
    - G1 scorer-class distill head: 1KB MLP replaces 50KB Ballé hyperprior
    - B3 scorer-conditional CDF table: precomputed empirical histogram
    - WZ side-info head closed-form: trained closed-form regression at compress

  Score movement: NULL pending D4 probe verdict + Dykstra-feasibility check
  per Catalog #296. If D4 = MEANINGFUL_CONDITIONING (MI >= 0.5 bits/symbol):
  predicted band [-0.015, -0.005] rate-axis [prediction; first-principles-
  bound]. If WEAK_CONDITIONING (0.01 <= MI < 0.5): revise band down to
  [-0.005, -0.002]. If INDEPENDENT (MI < 0.01): DEFER-pending-research
  per CLAUDE.md "Forbidden premature KILL" — cite G2-PARTIAL alternative
  hypothesis.

