    - --epochs (int, default=200)
    - --batch-size (int, default=8)
    - --learning-rate (float, default=1e-3)
    - --ema-decay (float, default=0.997)
    - --latent-dim (int, default=16)
    - --cond-dim (int, default=8)
    - --base-channels (int, default=36)
    - --n-pairs (int, default=600)
    - --lambda-seg (float, default=100.0)
    - --lambda-pose (float, default=288.6751345948129)
    - --video-path (Path, default=upstream/videos/0.mkv)
    - --seed (int, default=20260511)
    - --smoke (bool, default=False)
    - --auth-eval (bool, default=False)
    - --phase-b-auth-memo (str, default=None)

