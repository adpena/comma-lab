risk: |
  HIGH VARIANCE first-anchor dispatch. Architectural risks:

  (a) ANALYTICAL RENDERER UNDER-FIDELITY - the L1 SCAFFOLD inflate path uses
      grayscale-as-luma (Y replicated to RGB) + global-translation pose warp.
      Chroma is fundamentally not in the archive; if the contest scorer is
      chroma-sensitive (SegNet IS, on lane markings in particular), distortion
      can balloon. Mitigated by L1 -> L2 reactivation criterion: iterate the
      analytical renderer (chroma-from-class-prior, better warp model) BEFORE
      promoting beyond first-anchor.
  (b) CLOSED-FORM CDF MISMATCH - the compress side uses the ACTUAL SegNet
      argmax for class labels; the inflate side uses uniform class-prior
      (class=0 for all cells) for the L1 path. This breaks the entropy
      assumption and the arith decoder will see suboptimal codelengths.
      First-anchor empirical anchor will reveal whether the mismatch is fatal.
  (c) POSE-DELTA QUANTIZATION - uint8 pose at scale=10 gives ~0.01 precision
      in pose space. PoseNet distortion can be 23x sensitive to pose drift;
      smaller scale (larger range) may be needed in v2 (would bump CH06
      schema to v2).

  Total archive size: ~3-15 KB across 600 pairs (PALETTE ~16 B + CDF ~170 B
  + arith-coded grayscale ~2-10 KB + pose ~3.6 KB + meta ~100 B). This is
  2-3 ORDERS OF MAGNITUDE smaller than PR101's 179 KB; rate-axis contribution
  to score is effectively 25 * 15000 / 37545489 = 0.00001 (negligible).

