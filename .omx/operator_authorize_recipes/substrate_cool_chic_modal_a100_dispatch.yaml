  COOL_CHIC_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  COOL_CHIC_OUTPUT_DIR: /workspace/pact/lane_substrate_cool_chic_results/output
  COOL_CHIC_EPOCHS: "2000"
  COOL_CHIC_BATCH_SIZE: "8"
  COOL_CHIC_UPSTREAM_DIR: /workspace/pact/upstream
  COOL_CHIC_DEVICE: cuda
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_cool_chic.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_cool_chic.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)

notes: |
  PHASE-B2-BUILD HIGH-target attack on PR101's 0.193 [contest-CUDA] gold.

  Cool-Chic architectural distinction vs HNeRV: the rate budget shifts FROM
  network weights TO per-pair latent grids. Total ~200K params (~10K
  synthesis + ~10K AR prior + ~180K latents). The AR-prior conditional
  density network estimates p(z_t | z_{t-1}) and is the substrate's
  distinguishing differentiable rate primitive; bits proxy = -ar_log_prob /
  ln(2). The score-aware Lagrangian therefore sees TWO rate components: the
  closed-form archive_bytes_proxy (constant; gradient-free) AND the
  ar_log_prob term (gradient-flowing through latents).

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

