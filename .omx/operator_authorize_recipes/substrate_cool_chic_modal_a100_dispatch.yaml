schema_version: 1
name: substrate_cool_chic_modal_a100_dispatch
lane_id: lane_substrate_cool_chic_20260512
summary: Cool-Chic per-frame AR latent first-anchor dispatch on Modal A100 (PHASE-B2-BUILD HIGH-target attack on 0.193).

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
# Catalog #215 (FIX-HARDEN-OPT 2026-05-14 P0): A100 full-run requires
# matching smoke-phase compute class. SIREN smoke timed out on T4 default
# (rc=124 at 3601s wall-clock 2026-05-13); coordinate-MLP / NeRV-family
# substrates won't complete 100-epoch smoke on T4 within timeout. Declaring
# min_smoke_gpu pins the smoke phase to A100 too; the CLI --smoke-gpu T4
# default is overridden. Backfilled by RECIPE-CANON-BACKFILL-SUBAGENT
# 2026-05-14 (lane_recipe_canon_backfill_sweep_20260514).
min_smoke_gpu: "A100"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: sane_hnerv

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 9.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: 0.165
predicted_delta: "-0.028 vs PR101 0.193 [predicted; council Phase 5]"
predicted_delta_basis: ".omx/research/grand_council_fields_medal_substrate_design_20260512.md#cool_chic"
literature_anchor: "Ladune, Berraf, Bourgault, et al. — 'COOL-CHIC: Coordinate-based Low Complexity Hierarchical Image Codec' ICCV 2023"
council_phase_5_prediction: 0.165

risk: |
  PHASE-B2-BUILD HIGH-target dispatch on Modal A100. Cool-Chic flips the NeRV
  recipe: most parameters live in per-frame learnable latents at multi-scale
  spatial pyramids (H/16 + H/8); the synthesis MLP is tiny shared (~10K params);
  rate is paid via an autoregressive density estimate over latents (the
  distinguishing primitive). Architectural risk: AR-prior NLL is computed
  across ALL pairs each training step (not just batch slice — it's the rate
  cost of the full latent ensemble), adding non-trivial compute per epoch.
  A100 24GB tested at batch=8; T4 may need batch=4. Trainer _full_main wires
  16 stages including auth eval at stage 12. Single-axis [contest-CUDA]
  acceptable for first anchor; CPU axis required separately before promotion.
envelope_status: "FITS $20 envelope at p50 fallback"

remote_driver: scripts/remote_lane_substrate_cool_chic.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_cool_chic.sh
  cost_band_trainer: experiments/train_substrate_cool_chic.py
  cost_band_epochs: 2000
  cost_band_batch_size: 8
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_cool_chic.py

env_overrides:
