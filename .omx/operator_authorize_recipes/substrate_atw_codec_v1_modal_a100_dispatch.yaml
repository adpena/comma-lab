# Phase 2 council approval reactivation criteria documented in design memo §5.
# Until two of four criteria fire (Z4-V2 successful anchor, Tao+Boyd Blahut-
# Arimoto floor, WZ side-info empirical bit-savings, Z3-G1 anchor) the recipe
# is research-only by construction.

summary: |
  ATW codec V1 (Atick-Tishby-Wyner cooperative-receiver codec) substrate per
  the 2026-05-15 grand reunion symposium Phase D Composite #1
  (`feedback_grand_reunion_fields_grade_passion_full_council_debrief_*_20260515.md`
  lines 727-770). Composite of three foundational information-theoretic
  frameworks: Atick & Redlich 1990 cooperative-receiver theorem + Tishby IB
  Lagrangian + Wyner-Ziv source-coding-with-side-info-at-decoder.

  Three-knob composition (κ_IB, λ_WZ, λ_pixel). Defaults (0, 1, 0) recover
  the CLEAN ATW canonical mode. Knob-zero ablations recover four corner
  regimes (Atick-only / ATW canonical / Tishby IB / Z3 baseline) — the
  probe-disambiguator regime sweep (Catalog #125 hook #6) that arbitrates
  the four hypotheses.

  Predicted ΔS [-0.025, -0.050] vs A1 baseline 0.19285 [contest-CPU];
  predicted score band [0.18, 0.21] [prediction; first-principles-bound
  from IB+WZ theory]. CONSERVATIVE per typical 2-3x compression of
  analytical bounds.

  STACKS on Z4-V2 (β-only branch is Z4 verbatim) and on A1 substrate
  (encoder/decoder/latent architecture inherited). Per Boyd's convex-
  feasibility lens, ATW feasibility region is a SUBSET of Z3+A1 polytope —
  any ATW Pareto-optimal point dominates Z3+Z4 at the same operating point.

