notes: |
  ATW codec V1 design-time research-only recipe — Phase 2 council approval
  REQUIRED to lift research_only:true + dispatch_enabled:false flags.

  research_only=true per CLAUDE.md HNeRV parity discipline lesson 2 (export-
  first design opt-out) + Catalog #240 (recipe-vs-trainer-state consistency).

  lane_class=substrate_engineering per HNeRV parity discipline lesson 7
  (substrate engineering happens ONCE per architecture class; ATW codec is
  the new class composing Atick-Redlich + Tishby IB + Wyner-Ziv).

  Reactivation criteria (any TWO grant Phase 2 approval, per design memo §5):
  1. Z4-V2 returns successful contest-CUDA anchor (fc-01KRPJVEMQ5S7Q8EKGKQWKCS93)
     with ΔS in [-0.005, -0.010] vs A1.
  2. Tao+Boyd Blahut-Arimoto analytical floor shows ATW theoretical gain
     ≥ -0.020 vs A1 ($0, 2 hours CPU).
  3. WZ side-info bit-savings empirically measured on A1 latents
     ≥ 20% per-pair latent rate ($0, 1 hour CPU).
  4. Z3-G1 substitution (Wunderkind G1, $10) returns successful CUDA anchor.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE" non-negotiable: when
  dispatched, modal_train_lane.py uses .spawn(); harvest within 24h via
  tools/harvest_modal_calls.py.

  Per CLAUDE.md "Auth eval EVERYWHERE" + "Submission auth eval — BOTH CPU
  AND CUDA": when dispatched, ends with paired CPU+CUDA auth eval on EMA
  shadow. Use tools/dispatch_modal_paired_auth_eval.py with
  --skip-axis-if-promotable-anchor-exists per Catalog #246.

