# DESIGN-TIME RESEARCH-ONLY recipe per CLAUDE.md "Substrate scaffolds MUST be
# COMPLETE or RESEARCH-ONLY" + Catalog #220 + Catalog #240 cascade. The trainer's
# _full_main raises NotImplementedError until Phase 2 council approval lifts the
# pre-build substrate-engineering gate. dispatch_enabled:false ensures no Modal
# spend can fire from this recipe at landing.
