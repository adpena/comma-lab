predicted_delta_basis: ".omx/research/atw_codec_atick_tishby_wyner_v1_design_20260515.md §1 (3-paper math composition)"
literature_anchor: |
  Atick & Redlich (1990) "Towards a theory of early visual processing"
    Neural Computation 2(3):308-320 (cooperative-receiver theorem);
  Tishby, Pereira & Bialek (1999) "The information bottleneck method"
    Proc. 37th Allerton Conf.;
  Wyner & Ziv (1976) "The rate-distortion function for source coding with
    side information at the decoder" IEEE Trans Info Theory 22(1):1-10;
  Grand reunion symposium 2026-05-15: feedback_grand_reunion_fields_grade_passion_full_council_debrief_*_20260515.md
    Composite #1 (lines 727-770);
  Grand council evidence review 2026-05-15: feedback_grand_council_evidence_review_modal_failures_*_20260515.md
    Phase B top-3 score-lowering paths.

risk: |
  ATW codec V1 is an L1 SCAFFOLD per CLAUDE.md "Substrate scaffolds MUST be
  COMPLETE or RESEARCH-ONLY" + Catalog #220 cascade. The trainer's
  _full_main raises NotImplementedError pending Phase 2 council approval.

  When Phase 2 lifts the gate, the predicted [0.18, 0.21] band is verifiable
  in $5-15 of Modal A100 spend per the design memo §6 cycle:

  - $0 pre-smoke: WZ side-info bit-savings on A1 latents (Tao+Boyd 1hr CPU)
  - $5 Modal A100 smoke: 100ep synthetic-data path validation
  - $10 Modal A100 paired full anchor: 200ep real video + paired CPU+CUDA

  Architectural risk:
  - WZ side-info head is a TINY MLP placeholder at scaffold time; the
    closed-form computation (predict z from scorer class prior via
    Atick-Redlich whitening + ICA projection) lands at Phase 2 lift time.
  - κ_IB > 0 is computationally expensive (requires posterior approximation
    q(y|t)); scaffold supports the hyperparameter but ships κ_IB=0 default.
  - Composition with Z3 hyperprior is theoretical (not jointly trained yet);
    ATW V1 ships standalone; Z3+ATW joint training is V2.

  Modal A100 cost band: $5 smoke; $10-15 full + paired auth eval. Per
  CLAUDE.md "Auth eval EVERYWHERE" the dispatch MUST end with paired
  CPU+CUDA auth eval per "Submission auth eval — BOTH CPU AND CUDA"
  non-negotiable.

envelope_status: "research_only_design_time_at_landing; $5-15 envelope upon Phase 2 council approval"

