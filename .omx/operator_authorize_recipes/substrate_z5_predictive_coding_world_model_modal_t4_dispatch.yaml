literature_anchor: |
  Rao & Ballard (1999) "Predictive coding in the visual cortex: a functional
    interpretation of some extra-classical receptive-field effects"
    Nature Neuroscience 2(1):79-87;
  Friston (2010) "The free-energy principle: a unified brain theory?"
    Nature Reviews Neuroscience 11:127-138;
  Hinton (2022) "Forward-Forward Algorithm" (predictive-coding modern revival);
  Time-Traveler peer-seat council 2026-05-14: feedback_grand_council_maximize_value_landed_20260514.md.

risk: |
  Z5 first-anchor dispatch. The substrate is a NOVEL world-model on top of
  Z4 + Z3 v2 latent replacement. Predicted [0.155, 0.180] band is a mathematical derivation from
  the Rao-Ballard predictive-coding hypothesis + Time-Traveler asymptote
  estimate, not measurement.

  Architectural risk:
  - The hierarchical predictor adds ~50KB of FP4-quantized weights; if the
    residual savings DO NOT exceed the predictor overhead, total bytes
    grow (BAD for rate term). Smoke verifies grammar; full training tests
    the entropy-reduction hypothesis.
  - Autoregressive unroll across 600 pairs at training time multiplies
    wall-clock by ~5-10x vs Z4. T4 batch_size=4 is the empirical floor;
    A10G or 4090 reduce wall-clock but increase $/hr.
  - The probe-disambiguator (identity_predictor ablation) is the
    pre-promotion test. If full hierarchical does NOT beat identity by
    ΔS >= 0.005, Rao-Ballard predictive-coding is refuted on this scorer.
  - Ego-motion proxy quality matters: zeros (no ego-motion) reduces to
    identity-predictor-with-extra-params; PoseNet-projected ego-motion
    is the canonical signal.

  Modal T4 training cost band: $1 smoke (1-epoch + roundtrip); $10 full
  (300 epochs scorer-aware + autoregressive unroll). Per CLAUDE.md "Auth
  eval EVERYWHERE" the dispatch MUST end with CUDA auth eval on EMA shadow.

envelope_status: "FITS $10 envelope at p50 fallback for full ($1 smoke + $10 full = $11 total)"

