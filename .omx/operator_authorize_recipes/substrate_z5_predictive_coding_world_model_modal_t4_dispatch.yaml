summary: |
  Z5 predictive-coding world-model substrate (Time-Traveler L5 staircase Step 3)
  per `.omx/research/campaign_z5_predictive_coding_world_model_20260514.md` and
  `feedback_grand_council_maximize_value_landed_20260514.md`.

  Mechanism (Rao & Ballard 1999 predictive-coding hierarchy):

  Hierarchical recurrent predictor between successive per-pair latents.
  Forecasts z_t from z_{t-1} + ego-motion proxy (small projection from
  PoseNet output); stores only the RESIDUAL r_t = z_t - z_t_pred.

  For stationary-ergodic driving video, the asymptotic entropy is dominated
  by frame-to-frame surprise. A 2-3 layer hierarchical predictor learns an
  ego-motion-conditioned world-model; the residual entropy is substantially
  lower than the marginal latent entropy.

  Per Time-Traveler peer-seat council STAIRCASE recommendation: Step 3 is
  the staircase end-state; Time-Traveler asymptote ~0.03 requires class-shift
  beyond hyperprior + cooperative-receiver to a learned world-model.

  Predicted ΔS -0.025 to -0.038 vs Z4 baseline → predicted score band
  [0.155, 0.180] [mathematical-derivation; Time-Traveler-asymptote].

  Probe-disambiguator (Catalog #125 hook #6): identity_predictor ablation
  refutes/confirms Rao-Ballard. If full hierarchical beats identity by
  ΔS >= 0.005, predictive-coding hypothesis confirmed.

