schema_version: 1
name: substrate_wavelet_modal_a100_dispatch
lane_id: lane_substrate_wavelet_20260512
summary: Wavelet DWT-subband first-anchor dispatch on Modal A100 (PHASE-B2-BUILD HIGH-target attack on 0.193).
dispatch_enabled: false
research_only: true
defer_reason: Dense WLV1 full-grid subbands exceed contest byte-normalizer before compression; needs sparse/top-k/low-rank/codebook subband compiler or residual-over-champion redesign before Modal spend.

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
# Catalog #215 (FIX-HARDEN-OPT 2026-05-14 P0): A100 full-run requires
# matching smoke-phase compute class. SIREN smoke timed out on T4 default
# (rc=124 at 3601s wall-clock 2026-05-13); coordinate-MLP / NeRV-family
# substrates won't complete 100-epoch smoke on T4 within timeout. Declaring
# min_smoke_gpu pins the smoke phase to A100 too; the CLI --smoke-gpu T4
# default is overridden. Backfilled by RECIPE-CANON-BACKFILL-SUBAGENT
# 2026-05-14 (lane_recipe_canon_backfill_sweep_20260514).
min_smoke_gpu: "A100"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: sane_hnerv

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 10.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: 0.175
predicted_delta: "-0.018 vs PR101 0.193 [predicted; council Phase 5]"
predicted_delta_basis: ".omx/research/grand_council_fields_medal_substrate_design_20260512.md#wavelet"
literature_anchor: "Mallat — 'A theory for multiresolution signal decomposition: the wavelet representation' PAMI 1989 + Daubechies (1992) 'Ten Lectures on Wavelets'"
council_phase_5_prediction: 0.175

risk: |
  PHASE-B2-BUILD HIGH-target dispatch on Modal A100. Wavelet substrate stores
  per-pair DWT coefficients (LL, LH, HL, HH at depth-1) using FIXED Daubechies-4
  filters (preserving Mallat structure). Synthesis MLP (~10K params) consumes
  IDWT-reconstructed feature field plus frame-conditional FiLM modulation.

  Architectural risk: per-pair subband coefficient grids dominate memory at
  default coeff_channels=2 (4 subbands * 600 pairs * 2 ch * 192 * 256 = 590M
  elements). batch=4 default fits A100 24GB; T4 may need batch=2. The
  per-subband bit-proxy uses gradient-flowing soft-histogram Shannon entropy
  estimate — Mallat-hierarchy weights default to LL=1.0, detail=0.5 to
  encourage coarser quantization of high-freq detail per Yousfi UNIWARD
  intuition. Trainer _full_main wires 16 stages including auth eval at stage
  12. Single-axis [contest-CUDA] acceptable for first anchor.
envelope_status: "DEFERRED: byte-floor guard blocks dense full-grid WLV1 dispatch before GPU spend"

remote_driver: scripts/remote_lane_substrate_wavelet.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_wavelet.sh
  cost_band_trainer: experiments/train_substrate_wavelet.py
  cost_band_epochs: 2000
  cost_band_batch_size: 4
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_wavelet.py

env_overrides:
  WAVELET_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  WAVELET_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  WAVELET_OUTPUT_DIR: /workspace/pact/lane_substrate_wavelet_results/output
  WAVELET_EPOCHS: "2000"
  WAVELET_BATCH_SIZE: "4"
  WAVELET_MAX_RAW_SUBBAND_BYTES: "37545489"
  WAVELET_ALLOW_OVERSIZE_RESEARCH: "0"
  WAVELET_UPSTREAM_DIR: /workspace/pact/upstream
  WAVELET_DEVICE: cuda
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_wavelet.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_wavelet.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)

notes: |
  PHASE-B2-BUILD research scaffold for a future wavelet attack on PR101's
  0.193 [contest-CUDA] gold. This recipe is intentionally NOT dispatch-enabled:
  the dense full-grid WLV1 grammar is byte-floor blocked by default.

  Wavelet architectural distinction: per-pair Mallat-hierarchy subband
  coefficients (LL = approximation, LH/HL/HH = detail) with fixed Daubechies-4
  IDWT synthesis filters. Total ~50K params at coeff_channels=2 dominated by
  4 * 600 * 2 * 192 * 256 = 235,929,600 float-tensor elements (quantized to
  int16 in the archive — 471,859,200 raw subband bytes before ZIP). That byte
  term is not score-lowering; reactivation requires a sparse/top-k/low-rank/
  codebook subband compiler or residual-over-champion packet.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

  Cross-ref:
    feedback_phase_b2_build_3_high_target_trainers_LANDED_20260512.md
    feedback_modal_strategy_reevaluation_post_tier1_engineering_20260512.md
    feedback_substrate_sane_hnerv_full_main_wired_landed_20260512.md
