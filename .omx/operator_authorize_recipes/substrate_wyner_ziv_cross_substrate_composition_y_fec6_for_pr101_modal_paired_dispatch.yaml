summary: |
  Wyner-Ziv pipeline-stage codec with cross-substrate composition Y derivation
  (Wave N+9 Slot 3 op-routable; sister of per-pair-posenet-output-y recipe).
  This recipe scaffolds the OPERATOR-ATTENDED paired-CUDA reactivation path
  for the Wyner-Ziv substrate after the THIRD-SURFACE empirical falsification
  at the cross-substrate composition Y surface.

  Per Wave N+9 Slot 3 empirical anchor (2026-05-28; MLX-LOCAL $0.0 wall_clock
  0.52s on M5 Max): Y = canonical FEC6/FECA frontier ZIP-member 'x' payload
  (sha 18e3155f / 178430 B at experiments/results/feca_selector_reparameterized
  _scale64_alpha1_rebuilt_20260528Tlocal/submission_dir/archive.zip) vs
  X = PR101 fp16 decoder state_dict (sha 79b804d9 / 457916 B) yields
  Y-derivable-prefix density 0.000437% (x2290 below 1% threshold per
  op-routable #4). THIRD-SURFACE IMPLEMENTATION-LEVEL FALSIFICATION per
  Catalog #307 (sister of #15 prefix-Y falsification + #15.5 per-pair-pose-
  stand-in falsification). PARADIGM Wyner 1976 R(D|Y) + Atick-Tishby-Wyner
  triple per Catalog #311 STILL INTACT.

  Per Catalog #325 PER-SUBSTRATE OPTIMAL FORM via adversarial grand council
  symposium: this recipe is `dispatch_enabled: false` until the 6-step
  contract is satisfied via a fresh sextet pact deliberation that authorizes
  the appropriate reactivation path (the empirical MLX-LOCAL measurement
  ALREADY ran and is canonically logged; this recipe carries the operator-
  attended L2 paired-CUDA scaffold for the NEXT step in case of paradigm-
  RATIFY pivot — currently expected NEXT step is Wave N+10 path #1 real
  PoseNet pre-compute via the sister per-pair-posenet recipe).

  Per CLAUDE.md "Forbidden premature KILL without research exhaustion":
  the substrate is DEFERRED-PENDING-research with 3 priority-ordered
  reactivation paths (in order of expected EV after THIRD-surface failure):

  1. **Real PoseNet pre-compute Y (Wave N+10 path #1; FOURTH Y surface)**:
     CANONICAL NEXT STEP per anti-pattern #16 canonical_unwind_path. Pre-
     compute per-pair PoseNet output on contest video 0.mkv via CUDA
     dispatch (~$1-5 cost Modal-approved per blanket); ship per-pair pose
     tensor (~14400 bytes for 600 pairs * 6 dims * float32) as decoder-
     side side-info Y. Decoder reproduces Y at inflate WITHOUT loading
     PoseNet per Catalog #6 strict-scorer-rule + Catalog #320 (the per-
     pair pose IS in the archive; no scorer load required). This is the
     DETERMINISTIC-from-uncorrelated-sources-FAMILY-EXHAUSTED follow-up;
     uses ACTUAL PoseNet output (no stand-in) so Y bytes carry true
     contest-video-derived signal that may overlap PR101 weights at
     byte-prefix surface. Sister recipe at
     .omx/operator_authorize_recipes/substrate_wyner_ziv_pipeline_stage_codec_per_pair_posenet_output_y_modal_paired_dispatch.yaml
     is the canonical operator-attended scaffold.

  2. **Non-prefix Y-overlap detector (Hamming-distance / KL-divergence)**:
     extend the canonical primitive `_detect_y_derivable_prefix` beyond
     contiguous-prefix to Hamming/KL distance. The lzma ratio 0.4215 on
     PR101 fp16 bytes (vs sister prober anchor 0.217-0.228) suggests
     cross-byte STRUCTURE exists; the prefix-detector misses it because
     it only matches contiguous prefixes. ~$0 MLX-LOCAL + primitive
     extension cost. Lower EV than path #1 (Hamming-distance fp16 weights
     against compressed FECA bytes is still likely entropy-flat) but
     orthogonal evidence value if path #1 also fails.

  3. **CSC-style sparse-coding Y derivation**: derive Y as the
     reconstruction residual of PR101 weights against a sparse codebook
     trained on the contest video latents. Sister direction per Catalog
     #311 Atick-Tishby-Wyner (cooperative-receiver) at the latent-coding
     surface rather than the byte-prefix surface. Higher EV than path #2
     but requires substantial new infrastructure (sparse codebook trainer
     + CUDA dispatch); deferred until paths #1 + #2 evidence resolves.

