schema_version: 1
name: substrate_time_traveler_l5_autonomy_modal_a100_dispatch
lane_id: lane_time_traveler_l5_autonomy_substrate_20260513
summary: |
  Time-Traveler L5 Autonomy substrate (TT5L) — reverse-engineered architecture
  from the operator's "time traveler from the future who solved L5 self-driving
  on a single comma.ai unit" framing (PAIR T directive 2026-05-13). Composes
  five first-principles design moves: cooperative-receiver theorem
  (Atick-Redlich 1990), predictive-coding hierarchy (Rao-Ballard 1999),
  foveation matched to ego-motion (Gibson 1950, LAPose), differentiable world
  model, sub-100K params + Tikhonov regularization. Target archive: 95-110 KB.

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
# Catalog #215 (FIX-HARDEN-OPT 2026-05-14 P0): A100 full-run requires
# matching smoke-phase compute class. SIREN smoke timed out on T4 default
# (rc=124 at 3601s wall-clock 2026-05-13); coordinate-MLP / NeRV-family
# substrates won't complete 100-epoch smoke on T4 within timeout. Declaring
# min_smoke_gpu pins the smoke phase to A100 too; the CLI --smoke-gpu T4
# default is overridden. Backfilled by RECIPE-CANON-BACKFILL-SUBAGENT
# 2026-05-14 (lane_recipe_canon_backfill_sweep_20260514).
min_smoke_gpu: "A100"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_exact_eval
  - contest_one_video_replay
  - research_substrate
canary_status: independent_substrate
# canary_dependency removed 2026-05-13: time-traveler is architecturally
# INDEPENDENT of HNeRV-family (cooperative-receiver + predictive-coding +
# foveation; not a mask/renderer derivative). Catalog #173 canary discipline
# was designed to gate HNeRV-family-derivatives where pace-of-failure
# correlates across substrates. Time-traveler doesn't share that failure
# surface. Operator-approved 2026-05-13 per sub-0.188 gate prioritization +
# floor-v3 commit 27a7950fd identifying time-traveler as the only L1-READY
# substrate clearing the gate.
active_dispatch_contract: time_traveler_l5_autonomy_naked_substrate
dispatch_contracts:
  - id: time_traveler_l5_autonomy_naked_substrate
    archive_role: monolithic_tt5l_replaces_hnerv_a1_substrate
    builder_surface: experiments/train_substrate_time_traveler_l5_autonomy.py
    status: active_recipe_contract
    exact_eval_path: archive.zip -> submission/inflate.sh -> experiments/contest_auth_eval.py --device cuda

cost_band:
  epochs: 3000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 5.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: null
# 2026-05-16 CARGO-CULT-UNWIND: predicted_band REVISED from [0.150, 0.170] to null
# pending Dykstra-feasibility 5-move polytope. Per Boyd's convex-feasibility lens +
# Z1 within-class haircut (Catalog #219): 5-move composition is SUBADDITIVE in
# convex-intersection regime, NOT additive (old band was additive sum of per-move
# improvements; structural over-estimate).
predicted_band: null
smoke_score_band: [0.10, 0.30]
predicted_delta: "NULL pending Dykstra-feasibility 5-move polytope + Z1 within-class haircut application [prediction] per cargo-cult-unwind 2026-05-16; OLD band [0.150, 0.170] retired as additive-composition cargo-cult per Boyd's convex-feasibility lens"
predicted_delta_basis: ".omx/research/time_traveler_l5_cargo_cult_unwind_design_20260516.md (CARGO-CULT-UNWIND) + .omx/research/time_traveler_architecture_reverse_engineered_20260513.md + .omx/research/high_risk_substrate_cargo_cult_unwind_audit_20260516.md §1.4 + Catalog #219 Z1 ablation"
# CARGO-CULT-UNWIND reactivation criteria (per design memo §Reactivation criteria):
dispatch_blockers:
  - tools_check_substrate_dykstra_feasibility_polytope_emitted_at_omx_state_dykstra_feasibility_time_traveler_l5_json
  - predicted_target_revised_to_polytope_intersection_lower_bound_not_5_move_sum_in_both_unwind_memo_and_this_recipe
  - z1_within_class_haircut_applied_per_catalog_219_if_tier_c_classifies_within_class
  - sextet_pact_council_consensus_on_revised_composition_arithmetic_per_CLAUDE_md_design_decisions_non_negotiable
literature_anchor: |
  Atick & Redlich (1990) Neural Computation 2:308-320 (cooperative-receiver);
  Rao & Ballard (1999) Nature Neuroscience 2:79-87 (predictive coding);
  Gibson (1950) The Perception of the Visual World (foveation-FOE);
  Lee (1976) Perception 5:437-459 (time-to-collision);
  Sitzmann et al. NeurIPS 2020 (SIREN init for renderer MLP).
council_phase_5_prediction: 0.160

risk: |
  PAIR T directive 2026-05-13 dispatch recipe. The substrate is novel —
  the differentiable-physics renderer + foveation grid + Markov-1 ego-pose
  prior have NOT been empirically anchored against the contest video. The old
  additive [0.150, 0.170] band is retired cargo-cult context, not an active
  prediction or measurement.

  Architectural risk:
  - First-anchor risk: the predicted_band may be off by 0.05+ in either
    direction. Operator should treat any contest-CUDA result as new
    information regardless of whether it lands in the predicted band.
  - Renderer is sub-60K params with SIREN-style init; lr=5e-4 with
    grad-clip=1.0 is conservative against omega=30 gradient amplification.
  - Per-pair side info budget is 45 B/pair (27 KB trailer); per codex's
    math correction (`feedback_codex_math_correction_pr95_lora_dora_landed_20260513.md`)
    27 KB rate penalty ≈ 0.018 score; must overcome via pose+seg reduction.

  Modal A100 training is diagnostic unless the auth-eval contract itself
  records score_axis=contest_cuda and score_claim_valid=true. CPU axis remains
  required separately on Linux x86_64 before any frontier-claim language.

envelope_status: "FITS $20 envelope at p50 fallback"

remote_driver: scripts/remote_lane_substrate_time_traveler_l5_autonomy.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
