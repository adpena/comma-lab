schema_version: 1
name: substrate_time_traveler_l5_autonomy_modal_a100_dispatch
lane_id: lane_time_traveler_l5_autonomy_substrate_20260513
summary: |
  Time-Traveler L5 Autonomy substrate (TT5L) — reverse-engineered architecture
  from the operator's "time traveler from the future who solved L5 self-driving
  on a single comma.ai unit" framing (PAIR T directive 2026-05-13). Composes
  five first-principles design moves: cooperative-receiver theorem
  (Atick-Redlich 1990), predictive-coding hierarchy (Rao-Ballard 1999),
  foveation matched to ego-motion (Gibson 1950, LAPose), differentiable world
  model, sub-100K params + Tikhonov regularization. Target archive: 95-110 KB.

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_exact_eval
  - contest_one_video_replay
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: sane_hnerv
active_dispatch_contract: time_traveler_l5_autonomy_naked_substrate
dispatch_contracts:
  - id: time_traveler_l5_autonomy_naked_substrate
    archive_role: monolithic_tt5l_replaces_hnerv_a1_substrate
    builder_surface: experiments/train_substrate_time_traveler_l5_autonomy.py
    status: active_recipe_contract
    exact_eval_path: archive.zip -> submission/inflate.sh -> experiments/contest_auth_eval.py --device cuda

cost_band:
  epochs: 3000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 5.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: null
predicted_band: [0.150, 0.170]
smoke_score_band: [0.050, 5.000]
predicted_delta: "time-traveler-prediction only; no score claim until paired CPU/CUDA auth eval lands"
predicted_delta_basis: ".omx/research/time_traveler_architecture_reverse_engineered_20260513.md"
literature_anchor: |
  Atick & Redlich (1990) Neural Computation 2:308-320 (cooperative-receiver);
  Rao & Ballard (1999) Nature Neuroscience 2:79-87 (predictive coding);
  Gibson (1950) The Perception of the Visual World (foveation-FOE);
  Lee (1976) Perception 5:437-459 (time-to-collision);
  Sitzmann et al. NeurIPS 2020 (SIREN init for renderer MLP).
council_phase_5_prediction: 0.160

risk: |
  PAIR T directive 2026-05-13 dispatch recipe. The substrate is novel —
  the differentiable-physics renderer + foveation grid + Markov-1 ego-pose
  prior have NOT been empirically anchored against the contest video. The
  predicted band [0.150, 0.170] is a literature-prediction synthesis, not
  measurement.

  Architectural risk:
  - First-anchor risk: the predicted_band may be off by 0.05+ in either
    direction. Operator should treat any contest-CUDA result as new
    information regardless of whether it lands in the predicted band.
  - Renderer is sub-60K params with SIREN-style init; lr=5e-4 with
    grad-clip=1.0 is conservative against omega=30 gradient amplification.
  - Per-pair side info budget is 45 B/pair (27 KB trailer); per codex's
    math correction (`feedback_codex_math_correction_pr95_lora_dora_landed_20260513.md`)
    27 KB rate penalty ≈ 0.018 score; must overcome via pose+seg reduction.

  Modal A100 training is diagnostic unless the auth-eval contract itself
  records score_axis=contest_cuda and score_claim_valid=true. CPU axis remains
  required separately on Linux x86_64 before any frontier-claim language.

envelope_status: "FITS $20 envelope at p50 fallback"

remote_driver: scripts/remote_lane_substrate_time_traveler_l5_autonomy.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_time_traveler_l5_autonomy.sh
  cost_band_trainer: experiments/train_substrate_time_traveler_l5_autonomy.py
  cost_band_epochs: 3000
  cost_band_batch_size: 1
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_time_traveler_l5_autonomy.py

# Per Catalog #191 (sentinel-files-per-Catalog-#166), declare substrate-
# specific source files whose SHAs must remain stable across the Modal upload
# window. operator_authorize.py auto-discovers the dispatcher / lane_script /
# cost_band_trainer / trainer / recipe path; this list extends the set to
# Time-Traveler-specific modules.
sentinel_files:
  - src/tac/substrates/time_traveler_l5_autonomy/__init__.py
  - src/tac/substrates/time_traveler_l5_autonomy/architecture.py
  - src/tac/substrates/time_traveler_l5_autonomy/archive.py
  - src/tac/substrates/time_traveler_l5_autonomy/inflate.py
  - src/tac/substrates/time_traveler_l5_autonomy/score_aware_loss.py
  - src/tac/substrates/_shared/trainer_skeleton.py
  - src/tac/substrates/_shared/inflate_runtime.py
  - src/tac/substrates/score_aware_common.py

env_overrides:
  TT5L_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  TT5L_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  TT5L_OUTPUT_DIR: /workspace/pact/lane_substrate_time_traveler_l5_autonomy_results/output
  TT5L_EPOCHS: "3000"
  TT5L_UPSTREAM_DIR: /workspace/pact/upstream
  TT5L_DEVICE: cuda
  TT5L_PER_PAIR_BYTES: "45"
  TT5L_HIDDEN_DIM: "64"
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_time_traveler_l5_autonomy.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_time_traveler_l5_autonomy.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)

notes: |
  PAIR T Time-Traveler L5 Autonomy substrate dispatch recipe.

  The substrate is a single-archive TT5L packet at 95-110 KB target. World
  model (Stage 1, ~55-70 KB encoded once) + per-pair side info (Stage 2,
  ~25-35 KB at 45 B/pair) + AC state (Stage 3, ~10 KB) + header (Stage 4,
  ~2 KB).

  Predicted contest-CPU score: 0.150-0.170 [time-traveler-prediction]
  (NOT a score claim — score authority requires CUDA + CPU paired auth eval
  on 1:1 contest-CI hardware per CLAUDE.md "Submission auth eval — BOTH CPU
  AND CUDA").

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

  Cross-ref:
    .omx/research/time_traveler_architecture_reverse_engineered_20260513.md
    feedback_codex_math_correction_pr95_lora_dora_landed_20260513.md
    feedback_substrate_sane_hnerv_full_main_wired_landed_20260512.md
