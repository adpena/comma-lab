schema_version: 1
name: substrate_c6_e4_mdl_ibps_latent96_modal_t4_smoke_dispatch
lane_id: lane_c6_ibps_reactivation_path_b_latent_dim_sweep_build_20260518
# C6 IBPS reactivation path (b) — latent_dim=96 (4x baseline) Wave 2 BUILD
# recipe per R3 SEAL council (`feedback_recursive_adversarial_review_r3_council_rotation_c_seal_gate_post_r2_clean_landed_20260517.md`)
# op-routable #2 + C6 IBPS first-asymptotic dispatch empirical falsification
# anchor (`feedback_c6_ibps_first_asymptotic_dispatch_smoke_before_full_paired_landed_20260517.md`).
#
# Architecture: same C6 IBPS substrate as baseline; ONLY change is latent_dim=96
# vs baseline 24. Parameter counts: encoder=45024 + decoder=106466 + latents=57600
# = 209090 total (+62% vs baseline 128882). Per-pair int8 latent: 57600 bytes
# (vs baseline 14400 bytes).
#
# Cargo-cult unwound per the IBPS empirical falsification:
#   - CC-1 (latent_dim=24 sufficient): 50ep smoke produced 3.04 with SegNet
#     collapse (score_seg_contribution=2.60 dominates); 24-dim IB bottleneck
#     compresses pose well but DESTROYS segmentation. 4x capacity tests
#     stronger SegNet preservation operating point.
#
# Empirical hypothesis (per Tishby I(T;Y) information-bottleneck framework):
#   - IF latent_96 smoke → score significantly < latent_48 smoke → linear-in-
#     dim positive trend (more capacity helps); confirms 24-dim was structural
#     bottleneck
#   - IF latent_96 smoke ≈ latent_48 smoke → diminishing returns; sweet spot
#     is somewhere in (24, 96]; consider intermediate widths (e.g. 64)
#
# Per CLAUDE.md "Substrate scaffolds MUST be COMPLETE or RESEARCH-ONLY"
# (Catalog #240) the recipe remains `research_only: true` + `dispatch_enabled:
# false` at THIS landing pending operator sign-off.
research_only: true
dispatch_enabled: false
dispatch_blockers:
  - r3_seal_op_routable_2_requires_operator_sign_off_for_reactivation_path_b_dispatch
  - catalog_167_smoke_before_full_pattern_required_at_dispatch_time
  - catalog_324_predicted_band_validation_status_pending_post_training_tier_c_required_before_promotion
  - paired_cpu_cuda_empirical_anchor_required_before_promotion_eligible_per_catalog_220
  - latent_48_smoke_outcome_required_before_latent_96_fire_per_cost_band_ladder
summary: |
  C6 IBPS reactivation path (b) — latent_dim=96 (4x baseline) Wave 2 BUILD
  recipe per R3 SEAL council op-routable #2 (Schmidhuber rationale).

  Architecture: same C6 IBPS substrate (IBEncoder + IBDecoder + per-pair
  latents) as baseline; ONLY change is latent_dim=96 vs baseline 24.

  Hypothesis: per Tishby I(T;Y) framework, 4x capacity provides substantial
  SegNet feature preservation headroom. Tests the linear-in-dim positive
  trend hypothesis vs the diminishing-returns alternative.

  Predicted ΔS band: TBD_post_training_tier_c_re_measurement per Catalog #324.
  This recipe declares predicted_band_validation_status: pending_post_training
  and requires a 50ep smoke + post-training Tier-C re-measurement BEFORE any
  predictive band is committed.

  Param breakdown (verified empirically):
    encoder = 45,024 params
    decoder = 106,466 params
    latents = 57,600 params (600 pairs x 96 latent_dim)
    TOTAL   = 209,090 params (+62% vs baseline 128,882)
    per-pair int8 = 57,600 bytes (vs baseline 14,400)
    archive estimate: ~300-400 KB (vs baseline 225 KB)

