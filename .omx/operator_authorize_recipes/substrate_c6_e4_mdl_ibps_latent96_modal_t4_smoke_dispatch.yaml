predicted_band_reactivation_criteria: "Catalog #324 + R3 SEAL op-routable #2: dispatch remains disabled until (a) 50ep Modal A10G smoke lands with archive + auth-eval evidence, (b) post-training Tier-C density measurement replaces random-init basis, (c) revised predicted band is committed based on empirical evidence. If latent_48 sweep already improved over baseline 3.04, the latent_96 width tests the linear-in-dim trend OR diminishing returns hypothesis."
smoke_score_band: [0.10, 0.50]
predicted_delta: "pending_post_training_tier_c_re_measurement per Catalog #324; baseline C6 IBPS at latent_dim=24 produced 3.04 [contest-CPU advisory]; latent_48 sweep is sequential canary; latent_96 reactivation path (b) hypothesis is 4x capacity provides substantial SegNet preservation headroom"
predicted_delta_basis: "R3 SEAL council op-routable #2 (Schmidhuber rationale; rotation C 2026-05-18) + C6 IBPS first-asymptotic dispatch empirical falsification + Catalog #324 META-FIX (pending post-training Tier-C validation required for any predicted_band)"
provenance_kind: empirical_anchor_pending_smoke
literature_anchor: |
  Tishby & Zaslavsky (2015) "Deep Learning and the Information Bottleneck Principle"
    IEEE Info. Theory Workshop DOI 10.1109/ITW.2015.7133169;
  Schmidhuber (R3 SEAL council 2026-05-18) — C6 IBPS empirical 3.04 + SegNet
    collapse IS empirical validation that 24-dim is WRONG operating point per
    Tishby I(T;Y) decomposition, NOT refutation of compression-as-intelligence
    framework;
  Atick & Redlich (1990) "Towards a theory of early visual processing";
  Rissanen (1978) "Modeling by shortest data description" Automatica 14:465-471;
  Alemi et al. (2017) "Deep Variational Information Bottleneck" ICLR.

source_supports: |
  Tishby-Zaslavsky 2015 IB framework establishes that I(T;Y) saturation depends
  on bottleneck capacity vs task complexity (HARD-EARNED at information-theory
  level). 4x capacity (96 vs 24) provides substantial information channel
  for SegNet + PoseNet joint feature preservation.

paper_claim_scope: |
  Source theorems establish bottleneck-width vs task-complexity relationship.
  Neither paper makes claims about latent_dim=96 being optimal for the Pact
  contest scorer. That surface IS the C6 IBPS latent96 sweep empirical anchor
  target via the 50ep Modal A10G smoke + paired CPU/CUDA auth-eval.

pact_must_prove: |
  C6 IBPS latent_dim=96 must empirically prove on paired CPU/CUDA: (a) the
  4x-wider bottleneck preserves SegNet-relevant features substantially better
  than 24-dim baseline AND 48-dim variant; (b) score_seg_contribution
  approaches pose_contribution (the operating point where both signals
  preserved); (c) the rate increase from 57600 vs 14400 bytes/pair is
  recovered by segmentation gain; (d) the smoke score IS lower than both
  baseline 3.04 and latent_48 smoke — IF YES → linear-in-dim trend
  confirmed; advance to latent_192 + paired-CPU; IF latent_96 ≈ latent_48 →
  diminishing returns; sweet spot in (24, 96]; DEFER latent_192 dispatch +
  pivot to alternative reducers per Catalog #308.

decode_complexity_evidence: |
  Inflate runtime: same vendored C6 IBPS substrate package. Per-pair int8
  latent grows 4x from 14400 → 57600 bytes/pair. T4 single-pair decode time
  marginally affected (decoder body identical; only input embedding width
  grows). Total per-video inflate well within 30 min contest budget.

risk: |
  C6 IBPS latent_dim=96 sweep BUILD trainer extension IS complete (zero LOC
  delta). Recipe non-dispatchable (`research_only: true`, `dispatch_enabled:
  false`) pending R3 SEAL op-routable #2 operator sign-off + Catalog #167
  smoke-before-full gate + Catalog #324 post-training Tier-C re-measurement.

  Architectural risk:
  - If 4x capacity STILL doesn't unlock SegNet preservation, the IB bottleneck
    is NOT the dominant bottleneck — the SegNet collapse mechanism may be
    architectural (decoder body) or loss-balancing (β_IB Lagrangian) rather
    than capacity-bound. The latent_192 sweep variant is the next test.
  - Encoder + decoder grow modestly (+62% total params); per-pair latent grows
    4x (57600 bytes). Archive estimate 300-400 KB; rate term penalty grows
    with archive size.
  - β_IB default 0.01 may be sub-optimal for 4x wider bottleneck. β-sweep
    deferred to follow-up wave.

  Modal A10G per baseline + canonical A10G minimum. Helper
  `tools/run_modal_smoke_before_full.py` honors `min_smoke_gpu: "A10G"`.

  Per CLAUDE.md "Auth eval EVERYWHERE" + "Submission auth eval — BOTH CPU AND
  CUDA": dispatch ends with CUDA auth eval + paired CPU eval before any
  frontier-claim language.

envelope_status: "FITS $0.50 smoke envelope at A10G p50 fallback ($0.30); paired CPU adds $0.20; total $0.50 per latent_96 dispatch (sequential AFTER latent_48 outcome)"

