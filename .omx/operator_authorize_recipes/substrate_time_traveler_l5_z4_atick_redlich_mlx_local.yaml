summary: |
  Z4 Atick-Redlich cooperative-receiver substrate (time_traveler_l5_z4) —
  L1 SCAFFOLD landed 2026-05-30 per task #1490 PARTIAL crash-recovery.

  Distinguishing primitive (per Catalog #272): the Atick-Redlich 1990
  spatial decorrelation filter ``W_AR`` (latent_dim x latent_dim) applied
  at the per-pair latent surface BEFORE decoder forward. This is the
  per-substrate distinguishing-feature payload that the inflate runtime
  consumes operationally — mutate any byte of the decorrelator_blob ⇒
  rendered RGB frames change byte-for-byte (verified empirically via
  `test_archive_decorrelator_bytes_are_consumed_at_inflate`).

  Per CLAUDE.md "Grand Council" Atick + Redlich seats + canonical
  equation #344 entries `atick_redlich_*` + per-substrate symposium #850
  ATW V2 reactivation: this substrate operationalizes Atick & Redlich 1990
  "Towards a Theory of Early Visual Processing" + "Convergent algorithm
  for sensory receptive field development" — the canonical retinal
  mutual-information whitening primitive — as a per-pair-latent
  decorrelation filter that minimizes ``I(X; T) - beta * I(T; Y)``
  where T is the latent encoding, X is the input frame, Y is the
  scorer-derived signal.

  Per Catalog #311 spatial-Atick-Redlich amendment: this substrate is
  ADMISSIBLE without temporal ego-motion conditioning because the 1990
  paper's canonical claim is SPATIAL retinal MI (NOT temporal predictive
  coding which is Z6's territory).

