    bottleneck principle" (IB framework T = latent encoding; Y = scorer
    output; cooperative-receiver canonical formulation);
  Wyner & Ziv (1976) "The rate-distortion function for source coding with
    side information at the decoder" (sister scorer-as-side-information);
  Catalog #311 spatial-Atick-Redlich amendment (admissibility without
    temporal ego-motion conditioning);
  Per-substrate symposium memo #850 ATW V2 reactivation + Catalog #344
