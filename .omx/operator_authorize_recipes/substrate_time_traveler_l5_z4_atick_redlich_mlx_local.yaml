literature_anchor: |
  Atick & Redlich (1990) "Towards a Theory of Early Visual Processing"
    Neural Computation 2(3):308-320 (cooperative-receiver decorrelation
    theorem);
  Atick & Redlich (1993) "Convergent algorithm for sensory receptive
