source_supports: |
  Atick & Redlich 1990 + 1993 derive the cooperative-receiver
  decorrelation theorem for the retinal layer as an OPTIMAL information-
  preserving primitive under a fixed coding budget. Tishby-Zaslavsky
  2015 formalizes the IB framework that this substrate operationalizes
  as a score-aware Lagrangian.

paper_claim_scope: |
  The canonical Atick-Redlich claim is about RETINAL receptive-field
  development under SPATIAL mutual-information constraints. The 1990
  paper does NOT make a contest-archive-byte-savings claim; the
  derivation from "decorrelation primitive" to "byte savings on
  Pact contest scorer" is OUR proof obligation (per Pact-must-prove
  below).

pact_must_prove: |
  Empirical paired-CUDA + paired-CPU auth-eval on the Z4 Atick-Redlich
  trained archive vs PR101 0.1933 baseline. Specifically:
  (a) byte-mutation smoke per Catalog #272 (verified empirically at L1);
  (b) Tier-C density post-training measurement per Catalog #324 + #319;
  (c) paired CPU + CUDA score per Catalog #246 + "Submission auth eval —
      BOTH CPU AND CUDA" non-negotiable;
  (d) probe-disambiguator: ablation `apply_decorrelator=True` vs `False`
      arbitrates cooperative-receiver vs vanilla-latent-decoder
      hypotheses.

decode_complexity_evidence: |
  Inflate runtime is contest-compliant per Catalog #146 + Catalog #205
  (CPU/CUDA only; no MPS); the decorrelator load + apply is a single
  Linear projection of latent_dim x latent_dim (32x32 fp16 = 2KB), and
  the decoder is 5 PixelShuffle blocks at canonical PR95-family
  architecture per L18.

