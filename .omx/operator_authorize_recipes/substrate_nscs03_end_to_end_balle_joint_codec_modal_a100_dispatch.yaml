schema_version: 1
name: substrate_nscs03_end_to_end_balle_joint_codec_modal_a100_dispatch
lane_id: lane_nscs03_end_to_end_balle_joint_codec_20260515
summary: |
  NSCS03 end-to-end Ballé joint codec — substrate-engineering scaffold.

  Per CLAUDE.md "Substrate scaffolds MUST be COMPLETE or RESEARCH-ONLY"
  non-negotiable + assumptions-challenge-audit NSCS03: this recipe declares
  ``research_only: true`` because the trainer's ``_full_main`` raises
  ``NotImplementedError`` (council-gated; Phase 2 follow-up subagent must
  adjudicate the λ_R sweep + σ-floor calibration before any $1+ Modal
  dispatch can fire). Catalog #220 acceptance cascade #3 (substrate
  engineering with pre-build council gate) is honored.

  The smoke phase IS dispatchable for integration validation purposes;
  the FULL phase is structurally blocked at the trainer level.

# Per Catalog #240 + CLAUDE.md "Substrate scaffolds MUST be COMPLETE or RESEARCH-ONLY":
# this top-level flag declares the substrate is in RESEARCH_ONLY_TRANSPARENT state;
# the trainer's _full_main raises NotImplementedError; no contest-CUDA
# dispatch can fire; bytes do not enter exact-eval custody. Reactivation
# criteria documented in __init__.py docstring.
research_only: true
smoke_only: true
dispatch_enabled: false
dispatch_blockers:
  - phase_2_council_approval_required_to_lift_full_main_NotImplementedError
  - lambda_R_sweep_calibration_pending_first_smoke_anchor
  - sigma_floor_sensitivity_pending_low_rate_op_point_validation

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
# Catalog #215 (FIX-HARDEN-OPT 2026-05-14 P0): A100 full-run requires
# matching smoke-phase compute class. End-to-end joint codec at 384x512
# resolution + 64-channel main latent + entropy bottleneck is too memory-
# intensive for T4; A100 smoke is required to avoid 1h timeouts.
min_smoke_gpu: "A100"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - research_substrate
canary_status: independent_substrate

cost_band:
  epochs: 100
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 80.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: null
predicted_delta: |
  -0.020 to -0.050 vs A1 0.19285 [contest-CPU]
  [prediction; first-principles-bound from Ballé 2018 5-15% rate savings
  empirical anchor + cooperative-receiver loss compounding through the
  end-to-end gradient path]
predicted_delta_basis: |
  .omx/research/assumptions_challenge_audit_shared_assumptions_matrix_20260515.json#NSCS03_END_TO_END_DIFFERENTIABLE_CODEC
literature_anchor: |
  Ballé, Minnen, Singh, Hwang, Johnston — "Variational Image Compression with
  a Scale Hyperprior" ICLR 2018

risk: |
  RESEARCH_ONLY substrate-engineering scaffold. NSCS03 is structurally
  DIFFERENT from sister `balle_renderer` (β) and Z3 v2 (Ballé bolt-on):
  end-to-end joint codec where the encoder/decoder/hyperprior/entropy-model
  are ALL trained jointly and gradient flows from scorer THROUGH bottleneck
  THROUGH encoder.

  Smoke-before-full pattern (Catalog #167): the operator-authorize wrapper
  routes through `tools/run_modal_smoke_before_full.py`. Smoke is permitted
  (research-substrate validation); FULL is blocked at the trainer level
  via `NotImplementedError`. The `_full_main` will be wired in the
  council-approved Phase 2 subagent following the canonical
  smoke-then-calibrate-then-full pattern.

  Per CLAUDE.md "Forbidden representation-without-archive-grammar (the
  research-substrate trap)": NSCS03 honors this rule by tagging
  `research_only=true` AND simultaneously landing the archive grammar
  (NS03 monolithic 0.bin) + inflate.py + parser-section manifest BEFORE
  the trainer ever runs. The substrate is research-only because of the
  λ_R sweep gating; the BYTES are export-first-design-compliant.

envelope_status: |
  $80 p50 fallback at full + $5-15 smoke. RESEARCH_ONLY blocks full
  dispatch until Phase 2 council adjudicates.

remote_driver: scripts/remote_lane_substrate_nscs03_end_to_end_balle_joint_codec.sh
timeout_hours: 12.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_nscs03_end_to_end_balle_joint_codec.sh
  cost_band_trainer: experiments/train_substrate_nscs03_end_to_end_balle_joint_codec.py
  cost_band_epochs: 100
  cost_band_batch_size: 16
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_nscs03_end_to_end_balle_joint_codec.py

