  NSCS03_HYPER_LATENT_CHANNELS: "32"
  NSCS03_LAMBDA_R: "0.5"
  NSCS03_GDN_EPS: "1e-6"
  NSCS03_SIGMA_FLOOR: "1e-4"
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_nscs03_end_to_end_balle_joint_codec.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_nscs03_end_to_end_balle_joint_codec.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)
  - tools/run_modal_smoke_before_full.py (Catalog #167)

notes: |
  Per CLAUDE.md HNeRV parity discipline lessons L1-L13 + Catalog #124
  (representation_lane_has_archive_grammar_at_design_time) all 8 fields
  declared in __init__.py docstring + lane_class=substrate_engineering +
  research_only=true + dispatch_blockers=[phase_2_council_approval_required].

  Substrate is structurally DIFFERENT from sister `balle_renderer` and Z3 v2:
  - balle_renderer: per-pair flat learned latents + MLP hyperprior + MLP+upsample decoder
  - Z3 v2: Ballé hyperprior bolt-on over A1 latent stream
  - NSCS03: TRUE Ballé 2018 end-to-end — convolutional g_a + entropy bottleneck +
    scale hyperprior + convolutional g_s — joint trained with score-aware loss

  Reactivation criteria (per CLAUDE.md "KILL is LAST RESORT"):
    - operator approves NSCS03 _full_main follow-up subagent
    - smoke phase passes integration validation (rc=0 + parseable stats)
    - Phase 2 council adjudicates λ_R sweep + σ-floor calibration

