predicted_delta_basis: ".omx/research/campaign_c1_world_model_foveation_20260514.md §3 + §4"
literature_anchor: |
  Ha & Schmidhuber (2018) "World Models" arXiv:1803.10122 DOI 10.48550/arXiv.1803.10122;
  Hafner et al. (2023) "DreamerV3" arXiv:2301.04104 (mastering diverse domains);
  Atick & Redlich (1990) "Towards a theory of early visual processing"
    Neural Computation 2:308-320 DOI 10.1162/neco.1990.2.3.308;
  Shannon (1948) "A Mathematical Theory of Communication" -- predictive coding bound;
  Rao & Ballard (1999) "Predictive coding in the visual cortex" Nature Neuroscience 2;
  Tishby & Zaslavsky (2015) "Deep learning and the information bottleneck principle"
    arXiv:1503.02406 (rate-distortion bottleneck framing).
council_phase_5_prediction: 0.145

risk: |
  C1 substrate first-anchor dispatch. The substrate is NOVEL across-class --
  world-model + foveation has NOT been empirically anchored against the
  contest video. Predicted band [0.13, 0.16] is a literature-prediction
  synthesis (Ha-Schmidhuber 2018 + Atick-Redlich 1990 + Z1 across-class
  predictions), NOT measurement.

  Architectural risk:
  - World-model recurrence has 3 design tensions (gru/lstm/transformer) and
    the choice affects the world_model_blob byte budget. GRU is cheapest
    forward but may underfit non-periodic ego-motion (lane changes).
  - Foveation strategy has 3 design tensions; EGO_MOTION_RADIAL is the
    default but is geometric (not learned). LEARNED_PER_PIXEL pays a small
    foveation_meta_blob byte cost but may outperform.
  - The world-model is small (~12K params for GRU at latent_dim=64) but
    its training stability depends on the seed -- vanishing/exploding
    gradient through 1200 unroll steps is a known LSTM/GRU pitfall;
    council deferred Transformer mode as a fallback.
  - Residual surprise codec is V1 (int8 + brotli at coarse resolution);
    a future revision could swap to learned arithmetic coding (sister
    of Z3 Ballé hyperprior).

  Modal T4 smoke is DIAGNOSTIC ONLY (validates substrate plumbing).
  The score_claim_valid=false + result_review_blockers cascade per
  Catalog #221 prevents promotion to autopilot ranking from smoke alone.
  Full-anchor dispatch requires Phase 3 council approval (operator-routable).

