summary: |
  C1 world-model + foveation substrate (long-term campaign L1 scaffold).
  ACROSS-CLASS substrate-shift from A1/PR101/HNeRV-family class-saturated
  baselines (Z1 MDL density 97-99%). Predicted ΔS -0.04 to -0.06 vs A1
  0.1928 ``[mathematical-derivation; first-principles-bound]`` -- predicted
  band ``[0.13, 0.16]`` (staircase Step 4-5 territory).

  Two orthogonal innovations vs HNeRV-class:

  A. World-model (recurrent latent dynamics) per Ha-Schmidhuber 2018
     (arXiv:1803.10122) + Hafner DreamerV3 2023 (arXiv:2301.04104). Per-frame
     residual surprise asymptotes to <100 bytes/frame for predictable
     ego-motion (stationary-ergodic driving).

  B. Foveation (camera-geometry-aware bit allocation) per Atick & Redlich
     1990 (Neural Computation 2). Center 96x128 NEAR-FOV carries full-detail
     bits; periphery heavily quantized. Matched to ego-motion trajectory.

  V1 SCOPE: SMOKE-only dispatch validates substrate plumbing (~$1 on Modal T4
  smoke before any full-budget commit). Full multi-stage training schedule
  ($30-50 over 3-4 weeks, 6-8 stages) requires Phase 3 council approval
  (inner-quintet: Shannon LEAD + Dykstra CO-LEAD + Yousfi + Fridrich +
  Contrarian).

  Probe-disambiguator (Catalog #125 hook #6): two design tensions ship as
  callable alternatives -- world-model recurrence (gru/lstm/transformer) +
  foveation strategy (uniform/ego_motion_radial/learned_per_pixel). Probes
  at tools/probe_c1_world_model_vs_independent_frames_disambiguator.py +
  tools/probe_c1_foveation_vs_uniform_quantization_disambiguator.py.

  Predicted band [0.13, 0.16] ``[mathematical-derivation; first-principles-bound]``
  is NOT a score claim -- score authority requires CUDA + CPU paired auth eval
  on 1:1 contest-CI hardware per CLAUDE.md "Submission auth eval".

