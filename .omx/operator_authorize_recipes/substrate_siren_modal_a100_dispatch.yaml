schema_version: 1
name: substrate_siren_modal_a100_dispatch
lane_id: lane_substrate_siren_20260512
summary: SIREN coordinate-MLP naked replacement dispatch on Modal A100; residual/hybrid contracts are named but not fired by this recipe.

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_exact_eval
  - contest_one_video_replay
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: sane_hnerv
active_dispatch_contract: naked_siren_replacement
dispatch_contracts:
  - id: naked_siren_replacement
    archive_role: replaces_hnerv_a1_substrate
    builder_surface: experiments/train_substrate_siren.py
    status: active_recipe_contract
    exact_eval_path: archive.zip -> submission/inflate.sh -> experiments/contest_auth_eval.py --device cuda
  - id: siren_residual_on_hnerv_a1
    archive_role: residual_sidecar_on_hnerv_a1_base
    builder_surface: future SIREN residual materializer over byte-verified HNeRV/A1 custody
    status: not_dispatched_by_this_recipe
    required_custody: old/new archive sha256, base runtime tree sha256, residual payload sha256, no-op proof
  - id: hybrid_siren_domain_prior
    archive_role: hybrid_replacement_with_domain_prior
    builder_surface: future hybrid SIREN+domain-prior packet builder
    status: not_dispatched_by_this_recipe
    required_custody: parser manifest for prior payload, one scored archive, no scorer at inflate

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 6.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: null
predicted_band: [0.180, 0.250]
smoke_score_band: [0.050, 5.000]
predicted_delta: "naked_siren_replacement literature-prediction only; no score claim"
predicted_delta_basis: ".omx/research/siren_literature_review_20260513.md#recommendations"
literature_anchor: "Sitzmann, Martel, Bergman, Lindell, Wetzstein — 'Implicit Neural Representations with Periodic Activation Functions' NeurIPS 2020"
council_phase_5_prediction: 0.145

risk: |
  PHASE-B2-BUILD Modal A100 recipe for the naked_siren_replacement contract.
  SIREN is the purely-coordinate-based counterpart to NeRV/HNeRV/A1 and
  replaces that substrate with ZERO bytes in latents; all per-frame variation
  must be encoded in MLP weights via the t-axis input.
  Architectural risk: first-layer omega=30 (Sitzmann signature) is high-frequency
  by design — gradients can explode if LR is too aggressive. Council default
  lr=5e-4 with cosine annealing is conservative; grad-clip=1.0 enforced.
  Trainer _full_main wires 16 stages including auth eval at stage 12. T4 smoke
  may produce [contest-CUDA] infrastructure evidence. Modal A100 full dispatch
  is a training/build substrate and any A100 auth-eval JSON is diagnostic unless
  the auth-eval contract itself records score_axis=contest_cuda and
  score_claim_valid=true; CPU axis remains required separately before promotion.
envelope_status: "FITS $20 envelope at p50 fallback"

remote_driver: scripts/remote_lane_substrate_siren.sh
readiness_gate: tools/audit_siren_substrate_readiness.py --fail-if-not-ready
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_siren.sh
  cost_band_trainer: experiments/train_substrate_siren.py
  cost_band_epochs: 2000
  cost_band_batch_size: 1
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_siren.py

# Per CLAUDE.md SIREN audit 2026-05-13 CRITICAL #2 + Catalog #191
# (`check_modal_dispatch_threads_sentinel_files_per_catalog_166`): declare
# substrate-specific source files whose SHAs must remain stable across the
# Modal upload window. operator_authorize.py auto-discovers the dispatcher /
# lane_script / cost_band_trainer / trainer / recipe path; this list extends
# the set to SIREN-specific modules. A sibling-subagent edit to any of these
# between dispatch-spawn and worker-start triggers rc=13 BEFORE the GPU
# meter starts (modal_train_lane.py:327-342).
sentinel_files:
  - src/tac/substrates/siren/architecture.py
  - src/tac/substrates/siren/archive.py
  - src/tac/substrates/siren/inflate.py
  - src/tac/substrates/siren/score_aware_loss.py
  - src/tac/substrates/_shared/trainer_skeleton.py
  - src/tac/substrates/score_aware_common.py

env_overrides:
  SIREN_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  SIREN_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  SIREN_OUTPUT_DIR: /workspace/pact/lane_substrate_siren_results/output
  SIREN_EPOCHS: "2000"
  SIREN_BATCH_SIZE: "1"
  SIREN_UPSTREAM_DIR: /workspace/pact/upstream
  SIREN_DEVICE: cuda
  SIREN_DISPATCH_CONTRACT: naked_siren_replacement
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - tools/audit_siren_substrate_readiness.py
  - scripts/remote_lane_substrate_siren.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_siren.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)

notes: |
  PHASE-B2-BUILD SIREN/INR naked replacement attack. Do not promote an A100
  diagnostic score; exact score claims require a claimed contest-CUDA auth-eval
  artifact plus the usual CPU/CUDA policy review. The recipe also names the
  residual-on-HNeRV/A1 and hybrid-domain-prior SIREN contracts so they cannot
  silently reuse this naked replacement archive builder.

  SIREN architectural distinction vs HNeRV: ZERO bytes in latents — all per-pair
  variation flows through the (x, y, t) coordinate input where t = pair_idx /
  num_pairs. This puts ALL ~150K param budget into MLP weights (highly
  compressible via FP16 + brotli). The hypothesis: a sufficiently-expressive
  6-layer SIREN MLP at hidden=128 with first_omega=30 can memorize the
  contest video's 600 pair signatures, producing a smaller archive than HNeRV
  while the score-aware Lagrangian shapes the implicit representation toward
  PoseNet/SegNet preferences.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

