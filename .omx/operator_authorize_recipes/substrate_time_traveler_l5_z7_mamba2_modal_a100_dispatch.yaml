predicted_band_reactivation_criteria: |
  Z7-Mamba-2's [0.167, 0.184] score band is a research prior from the
  Z7-Mamba-2 design memo + deep-research wave TOP-5 #2, not empirical
  evidence. It may rank Wave-N+1 planning only while research_only=true
  and dispatch_enabled=false. Spend/promotion requires: (1) Z7-GRU Wave 2
  paired exact-eval lands; (2) C6 IBPS Phase 2 empirical beta-IB anchor
  lands; (3) Wave N+1 council PROCEED-unconditional on the built Z7MCM2
  archive path; (4) same-bytes identity-disambiguator paired
  exact-eval confirms Z7-Mamba-2-WIN at ΔS >= 0.005 on contest-CUDA;
  (5) post-training paired exact-eval evidence harvested under lane claim
  custody per Catalog #226 + #245 modal_call_id_ledger.

predicted_delta_s_band: [-0.025, -0.008]
predicted_delta_s_axis: contest-CPU
predicted_delta_s_basis: |
  Per .omx/research/comprehensive_research_wave_20260518.md TOP-5 row #2.
  Research-wave prediction only; score_claim=false. Dykstra-feasibility
  intersection of (a) Mamba-2 selective state-space bit-savings ~10-20% vs
  GRU baseline, (b) Atick-Redlich cooperative-receiver MI reduction ~5-10%,
  (c) cross-substrate sister Z6-v1 + Z6-v2 + Z7-GRU predicted bands. See
  design memo §8 for full Dykstra-feasibility derivation per Catalog #296.

smoke_score_band: [0.17, 0.20]
predicted_delta: |
  Z7-Mamba-2 predicted score band [0.167, 0.184] and predicted delta-S
  band [-0.025, -0.008] [contest-CPU prediction], not a score claim.
predicted_delta_basis: |
  Derived from .omx/research/z7_mamba2_substrate_design_memo_20260518.md
  and .omx/research/council_per_substrate_symposium_z7_lstm_predictive_coding_20260517.md
  and .omx/research/comprehensive_research_wave_20260518.md TOP-5 #2.
  The band is a research prior only. It is not contest-CUDA evidence and
  must not be used for ranking, promotion, or kill decisions without
  paired exact-eval harvest per Catalog #226 + Catalog #324 post-training
  Tier-C validation discipline.

literature_anchor: |
  Mamba (Gu-Dao 2023, arxiv 2312.00752); Mamba-2 (Dao-Gu 2024, arxiv
  2405.21060); Hafner DreamerV3 RSSM (arxiv 2301.04104; deterministic-GRU
  lineage from Z7 symposium Revision #3 binding; Mamba is the sister
  selective-state-space alternative); Rao-Ballard 1999 predictive coding;
  Atick-Redlich 1990 cooperative receiver; Wyner-Ziv 1976 source coding
  with side information.

source_supports: |
  The design memo binds Z7-Mamba-2 as the Catalog #308 N>=3
  alternative-probe-methodology to Z7-GRU within the predictive-coding-
  recurrent substrate class. Mamba-2's continuous-time SSM formulation
  may match ego-motion-continuity prior more naturally than GRU's
  discrete-step recurrence; empirically untested at sequence length 600.
  Runtime-configurable ego-source per Revision #4; beta-IB initialization
  from C6 Phase 2 per Revision #5.

pact_must_prove: |
  Before paid full dispatch, Z7-Mamba-2 must prove at least: (1) Z7MCM2
  archive grammar emits byte-closed archive bytes; (2) inflate runtime
  consumes Mamba-2 recurrent predictor bytes and changes output
  (Catalog #220 + #272 byte-mutation smoke); (3) identity/static-capacity
  disambiguator at same archive bytes shows Z7-Mamba-2-WIN at score
  delta >= 0.005 on contest-CUDA; (4) paired CPU/CUDA exact eval is
  harvested under lane claim custody per Catalog #226 + #245; (5) mamba_ssm
  PyPI package installs successfully in Modal A100 image per Catalog #244
  NVML env block + Catalog #270 Tier 1/2/3 protocol.

decode_complexity_evidence: |
  Planned inflate runtime is <=200 LOC with deterministic Mamba-2 selective
  state-space unroll across 600 pairs (substrate-engineering HNeRV parity
  L4 waiver). Runtime deps: torch + brotli + mamba_ssm (3 deps; exceeds
  default L4 budget of <=2 per HNeRV parity L4; substrate-engineering L7
  waiver applies). No runtime exists yet; this is a blocker, not evidence.

envelope_status: |
  Non-dispatchable. If all gates are later ratified, the symposium cost
  path is $22-30 total: trainer build $0 GPU, Wave 2 smoke/disambiguator
  $5-10, full dispatch $20-30 Modal A100 + paired CPU/CUDA $1.50-2.

