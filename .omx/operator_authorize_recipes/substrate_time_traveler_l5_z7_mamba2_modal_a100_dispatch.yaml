summary: |
  Z7-Mamba-2 is the canonical Catalog #308 N>=3 alternative-probe-methodology
  to Z7-GRU (Hafner Revision #3 binding) within the predictive-coding-recurrent
  substrate class. Mamba-2 (Dao-Gu 2024, arxiv 2405.21060) is a selective
  state-space sequence model. The Z7MCM2 trainer/runtime is built as an L1
  research-only substrate; paid dispatch is explicitly deferred until
  (a) Z7-GRU Wave 2 disambiguator outcome lands AND ratifies via Wave N+1
  council OR (b) operator explicit-frontier-override per Catalog #300
  with verbatim quote in council_override_rationale.

platform: modal
gpu: A100
min_smoke_gpu: A100
min_vram_gb: 40
target_modes:
  - research_substrate

horizon_class: asymptotic_pursuit
active_dispatch_contract: z7_mamba2_built_research_gate
