risk: |
  PR95++ enhanced curriculum first-anchor dispatch on Modal A100. The trainer
  wraps the PR101 LC v2 clone substrate (228K-param HNeRV decoder) in the
  pr95_enhanced curriculum mode: 11 engineering enhancements composed over
  PR95's 29,650-epoch 8-stage protocol. Each enhancement is opt-in via an
  explicit --enable-<feature> / --disable-<feature> flag pair; the default
  pr95_enhanced enables 9 of 11 (composition E10/E11 SABOR + S2SBS are
  explicit opt-in).

  Smoke-only scaffold guard (Catalog #167): the operator-authorize wrapper
  routes through tools/run_modal_smoke_before_full.py which fires a
  100-epoch ~$0.30 Modal T4 smoke, validates rc=0 + current-run
  training_artifact_v1 manifest/archive proof with score_claim=false, and
  then STOPS. The full 29,650-epoch A100 dispatch is intentionally refused
  until `_full_main` is implemented against real contest-video batches and a
  byte-closed archive export.

  Engineering wins (compounding speedup vs PR95 baseline):
  * E1 Muon at every stage (vs only Stage 8): ~2-4x convergence on hidden
    weights.
  * E3 stage-aware ternary QAT (Stage 8 binary {-1, 0, +1}): rate-byte win.
  * E4 WSD LR schedule (vs cosine): 1-3% wall-clock cost; floor at 0.1*peak.
  * E5 logit softcap (30*tanh(x/30)): no zero-grad boundary, preserves grad.
  * E9 DP1 bootstrap: starts from frozen Comma2k19 codebook; shrinks
    Stage 1 random-init variance.

  Predicted cost: $0.30 for the current smoke-only first anchor. Full-run
  cost remains estimated at $50-100 for the 29,650-epoch A100 path, but
  that path is not dispatchable from this recipe until full training/export
  implementation lands.

envelope_status: "SMOKE-ONLY; fits $1 envelope now. Full A100 spend blocked until implemented."

