schema_version: 1
name: substrate_ego_nerv_modal_a10g_diagnostic_dispatch
lane_id: lane_ego_nerv_l0_scaffold_20260520
summary: |
  ego_nerv L0 SCAFFOLD diagnostic recipe (Modal A10G). This recipe pairs with
  experiments/train_substrate_ego_nerv.py (BUILD-1 NeRV-trio queue fill
  2026-05-20). NOT DISPATCH-ELIGIBLE: substrate is research_only until the
  Phase 2 council symposium per CLAUDE.md "PER-SUBSTRATE OPTIMAL FORM via
  adversarial grand council symposium" (Catalog #325) lands AND the canonical
  src/tac/substrates/ego_nerv/ package migration completes (currently the
  substrate library lives at src/tac/ego_nerv_as_renderer.py in legacy
  monolithic format).

  Sister recipe substrate_ego_nerv_modal_a100_dispatch.yaml (legacy 2026-05-13)
  pairs with the OLD experiments/train_ego_nerv_as_renderer.py scaffold-only
  trainer and is preserved per CLAUDE.md HISTORICAL_PROVENANCE Catalog #110/#113.

dispatch_enabled: false
research_only: true

dispatch_blockers:
  - per_substrate_council_symposium_pending_per_catalog_325
  - canonical_substrate_package_migration_pending
  - full_main_raises_NotImplementedError_per_catalog_240
  - phase_2_council_approval_required_to_lift_research_only_per_catalog_315

platform: modal
gpu: "${MODAL_GPU:-A10G}"
min_vram_gb: 22
# Catalog #215: A10G smoke-phase pinning. NeRV-family substrates won't complete
# 100-epoch smoke on T4 within timeout (SIREN smoke timed out on T4 default
# rc=124 at 3601s wall-clock 2026-05-13).
min_smoke_gpu: "A10G"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: sane_hnerv

cost_band:
  epochs: 100
  all_flags_on: false
  hand_calibrated_fallback_p50_usd: 1.10
  platform_key: modal
  gpu_key: A10G

# Catalog #324: predicted_band_validation_status MUST be declared for any
# recipe carrying predicted_band. L0 SCAFFOLD recipe omits predicted_band
# entirely because no measurement has been made; predicted_score_target is
# placeholder for symposium-time calibration only.
predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: |
  Post-training Tier-C density re-measurement via
  tools/mdl_scorer_conditional_ablation.py --tier c on the landed archive
  after Phase 2 council symposium per Catalog #325 admits the substrate for
  full-mode training. Pre-training prediction is CARGO-CULTED per Catalog
  #324 + sister C6 IBPS 22x miss empirical anchor 2026-05-17.

predicted_score_target: "unknown_l0_scaffold_pending_council_symposium"
predicted_delta: "unknown_l0_scaffold_no_empirical_anchor"
literature_anchor: "Wang 2024 Ego-NeRV / Park 2023 driving-NeRF (egocentric pose-conditioned NeRV)"

risk: |
  L0 SCAFFOLD posture. The trainer experiments/train_substrate_ego_nerv.py
  raises NotImplementedError on the non-smoke path per Catalog #240
  (recipe-vs-trainer-state consistency). The recipe is dispatch_enabled:false
  + research_only:true so the operator-authorize harness refuses to fire a
  paid dispatch from this recipe per the recipe-state-consistency gate.

  Architectural distinction vs sane_hnerv canary: ego_nerv adds a
  FiLM-modulated egocentric pose table on top of the latent table. The pose
  table is shipped in the archive as fp16 (~7 KB for 600 pairs). Hypothesis:
  driving video is egomotion-dominated, so pose-conditioning enables ~1.25x
  param efficiency at fixed bytes (Wang 2024 Ego-NeRV).

  Phase 2 council symposium MUST evaluate:
    (a) cargo-cult audit per Catalog #303 (which assumptions are
        HARD-EARNED vs CARGO-CULTED for ego_nerv specifically);
    (b) 9-dim success checklist evidence per Catalog #294;
    (c) observability surface declaration per Catalog #305;
    (d) Dykstra-feasibility predicted-band per Catalog #296;
    (e) horizon-class declaration per Catalog #309 (plateau_adjacent /
        frontier_pursuit / asymptotic_pursuit);
    (f) per-substrate symposium 6-step contract per Catalog #325.

envelope_status: |
  RESEARCH_ONLY: dispatch refused per recipe + trainer + 4 catalog gates
  (#220 + #240 + #315 + #325). Reactivation criteria documented in trainer
  _full_main docstring + this recipe's dispatch_blockers + lane registry
  notes.

remote_driver: scripts/remote_lane_substrate_ego_nerv_l0_scaffold.sh
timeout_hours: 1.5

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv
  - flag: --output-dir
    note: "required (no default); operator must thread"

modal:
  lane_script: scripts/remote_lane_substrate_ego_nerv_l0_scaffold.sh
  cost_band_trainer: experiments/train_substrate_ego_nerv.py
  cost_band_epochs: 100
  cost_band_batch_size: 2
  cost_band_all_flags_on: false

required_input_files_trainer: experiments/train_substrate_ego_nerv.py

env_overrides:
  # Catalog #326 driver-mode-hardcode-fix: drivers consuming a smoke/full
  # mode env var with smoke-default MUST receive explicit recipe-side
  # opt-out for the full path. This recipe explicitly forces SMOKE_ONLY=1
  # because the trainer's full path raises NotImplementedError; the only
  # legitimate execution path is the smoke.
  EGO_NERV_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  EGO_NERV_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  EGO_NERV_OUTPUT_DIR: /workspace/pact/lane_ego_nerv_l0_scaffold_results/output
  EGO_NERV_EPOCHS: "2"
  EGO_NERV_UPSTREAM_DIR: /workspace/pact/upstream
  EGO_NERV_DEVICE: cpu
  EGO_NERV_SMOKE: "1"
  SMOKE_ONLY: "1"
  LOCAL_CUDA_WORKER: "0"

dependencies:
  - scripts/remote_lane_substrate_ego_nerv_l0_scaffold.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_ego_nerv.py
  - src/tac/ego_nerv_as_renderer.py
  - src/tac/substrates/_shared/trainer_skeleton.py
  - src/tac/differentiable_eval_roundtrip.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)

sentinel_files:
  - src/tac/ego_nerv_as_renderer.py
  - src/tac/substrates/_shared/trainer_skeleton.py
  - src/tac/differentiable_eval_roundtrip.py

reactivation_criteria: |
  1. Per-substrate adversarial grand council symposium per CLAUDE.md
     "PER-SUBSTRATE OPTIMAL FORM via adversarial grand council symposium"
     (Catalog #325) returns PROCEED or PROCEED_WITH_REVISIONS verdict
     for ego_nerv specifically. Symposium memo must satisfy the canonical
     6-step contract (cargo-cult audit per #303 + 9-dim checklist per #294
     + observability surface per #305 + sextet pact deliberation + per-substrate
     reactivation criteria + Catalog #324 post-training Tier-C validation
     discipline).
  2. Canonical src/tac/substrates/ego_nerv/ package migration lands with
     architecture.py + archive.py + inflate.py + score_aware_loss.py
     matching tc_nerv structure.
  3. submissions/ego_nerv_substrate/inflate.{py,sh} smoke proves a
     contest-compliant 3-positional-arg runtime per Catalog #146.
  4. Trainer experiments/train_substrate_ego_nerv.py _full_main path
     replaces NotImplementedError with real score-aware Lagrangian + EMA
     + canonical auth-eval helper invocation per Catalog #226.
  5. Recipe research_only flips from true to false; dispatch_enabled
     flips from false to true; predicted_band declared with
     validation_status (post_training validated or pending_post_training
     with reactivation criterion) per Catalog #324.

notes: |
  This is the L0 SCAFFOLD recipe. Per CLAUDE.md "Substrate scaffolds MUST be
  COMPLETE or RESEARCH-ONLY" non-negotiable: scaffolds may exist with
  research_only:true tagged honestly + no paid dispatch eligibility. The
  canonical sister recipe substrate_ego_nerv_modal_a100_dispatch.yaml
  predates this BUILD-1 wave and references the legacy
  experiments/train_ego_nerv_as_renderer.py trainer.

  6-hook wire-in declaration per Catalog #125:
  - hook #1 sensitivity-map: N/A (L0 SCAFFOLD; no sensitivity signal until
    Phase 2 + full path)
  - hook #2 Pareto constraint: rate_distortion_v1 (per SubstrateContract)
  - hook #3 bit-allocator: N/A (fp16 brotli on weight blocks; no per-tensor
    bit allocator at scaffold posture)
  - hook #4 cathedral autopilot dispatch: N/A (research_only; not dispatch-
    eligible)
  - hook #5 continual-learning posterior: N/A (no anchor until [contest-CUDA]
    measurement)
  - hook #6 probe-disambiguator: N/A (single mechanism: egocentric pose FiLM)

