risk: |
  Tier-2 paid Modal A100 first-anchor dispatch for Selfcomp paradigm at lut_bits=5.

  Architectural risks (inherited from canonical sister recipe + AA HIGH verdict):
  (a) GRAYSCALE-LUT EXPRESSIVITY CEILING at lut_bits=5 (32 levels): colorization
      decoder may not have enough capacity to rescue arbitrary RGB content from
      32-level luminance alone; mitigated by per-pair FiLM embedding (16-dim)
      which carries the missing chroma/identity information; council default
      decoder_hidden=48 keeps the post-grayscale decoder large enough.
  (b) TV REGULARIZER INTERACTION at lower lut_bits: lut_bits=5 quantizes more
      aggressively than lut_bits=8, so grayscale_tv_weight=0.01 (council default)
      may over-smooth post-quantization; trainer allows operator override via
      --grayscale-tv-weight if needed in v2 if v1 anchor shows train/auth-eval gap.
  (c) AA HIGH VERDICT PREMISE: lut_bits=5 matches STC residual sidecar required
      cover-signal granularity per design-time + premise-verified (Catalog #229),
      but the verdict is NOT YET empirically anchored against contest scorer.
      THIS DISPATCH IS THE EMPIRICAL ANCHOR MECHANISM that validates AA HIGH
      verdict vs cargo-cult lut_bits=4 + canonical lut_bits=8.
  (d) FIRST CONTEST-AXIS ANCHOR FOR SELFCOMP PARADIGM: no prior [contest-CUDA]
      Modal A100 dispatch exists for Selfcomp grayscale_lut substrate (verified
      via Modal call_id ledger 2026-05-21: 0 prior rows). Cost band $5.50 p50
      fallback per canonical recipe; envelope_status FITS $10 operator-authorized
      session budget (1.8x slack).

  Trainer _full_main wires 15 stages including auth eval at stage 12; canonical
  inflate runtime emits 0.bin + inflate.py + inflate.sh contest-grammar packet.
  Single-axis [contest-CUDA] acceptable for first anchor; paired [contest-CPU]
  sister required separately before medal-band promotion per "Submission auth
  eval — BOTH CPU AND CUDA" non-negotiable.
envelope_status: |
  FITS $10 operator-authorized session budget (1.8x slack on $5.50 p50 fallback);
  paired-env: OPERATOR_AUTHORIZE_CONFIRMED_VIA_SESSION_DIRECTIVE=1 +
  OPERATOR_AUTHORIZE_SESSION_BUDGET_USD=10.00.

