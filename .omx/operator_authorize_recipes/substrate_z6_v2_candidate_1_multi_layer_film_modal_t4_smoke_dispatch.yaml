summary: |
  Z6-v2 Candidate 1 Wave 2 BUILD recipe — multi-layer FiLM (depth=3,
  hidden_dim=96, ~300K total substrate params) per Phase 3 council §9
  binding spec. Addresses Rao's capacity critique from the Z6 Phase 3
  sextet council 2026-05-17 (12/12 quorum + PROCEED_WITH_REVISIONS verdict
  + 6 binding revisions).

  Architecture per Path B BUILD design memo §4.1: 3-layer FiLM stack where
  each layer has its own (γ_t, β_t) MLP_ego conditioning. Per Rao-Ballard
  1999 hierarchical predictive coding: depth=3 approximates 3-level
  hierarchy at single spatial resolution. Layer 1 captures coarse motion;
  Layer 2 mid-scale structure; Layer 3 fine-scale residuals. Per Tishby IB
  framework: I(T;Y) increases with capacity until saturation; ~300K params
  sits at the typical saturation range for similar conditional-image-
  prediction tasks per Perez 2017 FiLM ablations on CLEVR.

  Distinction from Z6-v1: Z6-v1 used single-layer FiLM (~75K total); Z6-v2
  Candidate 1 uses depth=3 FiLM stack (~300K total). All other canonical
  wiring preserved byte-identically: trainer skeleton + scorer-loss helper
  + archive grammar + autoregressive unroll + EMA + eval_roundtrip +
  PoseNet-projected ego-motion + paired-control marker per Catalog #229 +
  identity-predictor disambiguator at SAME archive bytes per Council
  Revision #2.

  Predicted ΔS band [0.13, 0.17] [planning-prior; Dykstra-feasibility-
  validated per Path B design memo §5 UNANIMOUS PASS; HIGH VARIANCE pending
  paired CPU/CUDA empirical anchor]. Sister Z6-v1 baseline predicted band
  [0.13, 0.16]; Candidate 1 widens upper bound to 0.17 to reflect capacity
  overhead.

  Probe-disambiguator (Council Revision #2 binding): identity-predictor
  archive emitted at SAME archive bytes. Decision criterion per Revision #3:
  full-FiLM-WIN at ΔS ≥ 0.005 at contest-CUDA → Wave 4 Phase council
  recommended; ΔS < 0.005 OR identity-WIN → DEFER branch → pivot to
  Candidate 2 (LSTM $25) OR Candidate 4c (scorer-logit $13 per Atick).

