notes: |
  Z6-v2 Candidate 1 Wave 2 BUILD recipe — the trainer extension + recipe IS
  complete; the recipe remains non-dispatchable until operator sign-off on
  Phase 3 council §17 op-routable #1 + C6 IBPS outcome + the Catalog #167
  smoke-before-full pattern clears the declared dispatch blockers.

  Per Catalog #240 recipe-vs-trainer-state consistency, this is no longer a
  NotImplementedError protection path. The trainer's _full_main IS lifted
  (Z6-v1 sister landing 2026-05-16) and the Wave 2 BUILD argparse + resolver
  + archive emission paths ARE all wired. The protection now lives in
  recipe dispatchability: `research_only: true`, `dispatch_enabled: false`,
  and the explicit `dispatch_blockers` list. `operator_authorize.py`
  correctly refuses this recipe before claim/provider setup.

  Stage 0B smoke ($1.50 Modal T4) is the gating empirical test (post-operator
  sign-off):
  - Archive bytes in [120_000, 250_000] AND smoke roundtrip passes AND
    autoregressive recurrence test passes → smoke green
  - Otherwise → DEFERRED-pending-research per CLAUDE.md (NOT KILL)

  Disambiguator probe (Council Revision #2 binding): the trainer emits
  BOTH the full-predictor archive AND an identity-predictor archive at the
  SAME archive bytes (same encoder + decoder + latent_init + residuals +
  ego_motion buffers; ONLY identity_predictor=True changes). The probe
  computes ΔS = full_FiLM_score - identity_predictor_score. If ΔS ≥ 0.005,
  Rao's capacity-unwind hypothesis CONFIRMED on this scorer; advance to Wave
  3 (Wave 4 Phase council). If ΔS < 0.005 OR identity-WIN, Wave 3b DEFER
  branch → pivot to Candidate 2 LSTM ($25 envelope) or Candidate 4c
  scorer-logit ($13 envelope per Atick Revision #6).

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py.

  Per CLAUDE.md "Submission auth eval — BOTH CPU AND CUDA": dispatch ends
  with paired CPU/CUDA auth eval on EMA shadow before any frontier-claim
  language.

  Reactivation criteria per Phase 3 council §17:
    1. Operator sign-off on Phase 3 council PROCEED_WITH_REVISIONS verdict
    2. C6 IBPS outcome lands (parallel sister dispatch)
    3. Catalog #167 smoke-before-full pattern confirms Z6-v2 smoke green
    4. Disambiguator probe lands ΔS ≥ 0.005 at contest-CUDA OR explicit
       Wave 3b DEFER branch with Candidate 4c pivot
    5. Wave 4 Phase council convenes per Revision #5 (NO carry-forward
       authorization from Phase 3)

