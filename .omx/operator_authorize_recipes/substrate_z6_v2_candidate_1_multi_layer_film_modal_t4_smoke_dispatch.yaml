source_supports: |
  Source theorems Rao-Ballard 1999 (predictive coding hierarchy; HARD-EARNED at
  neuroscience level) + Atick-Redlich 1990 (cooperative-receiver theorem; HARD-EARNED at
  theorem level) + Perez 2017 (FiLM depth ablations at CLEVR; HARD-EARNED at
  vision-arch level) + Tishby IB capacity saturation framework empirically
  demonstrate predictive-coding paradigm + FiLM capacity scaling at
  neuroscience + theorem + vision-arch + information-theoretic surfaces.
  Z6-v2 Candidate 1 applies depth=3 FiLM stack to per-pair latent forecasting
  for contest video archive bytes.

paper_claim_scope: |
  Source papers establish: (a) the predictive-coding paradigm IS architecturally
  distinct from non-predictive baselines (Rao-Ballard); (b) the cooperative-
  receiver theorem proves the rate bound shrinks from H(X) to H(X|f_R(X))
  (Atick-Redlich); (c) FiLM depth scaling produces capacity-saturation curves on
  conditional-image-prediction tasks (Perez 2017). NONE of these papers makes
  claims about contest-CUDA archive byte savings on the Pact scorer; that
  surface is the Z6-v2 Candidate 1 Wave 2 empirical anchor target via the
  identity-predictor disambiguator at SAME archive bytes.

pact_must_prove: |
  Z6-v2 Candidate 1 must empirically prove on paired CPU/CUDA: (a) the depth=3
  FiLM stack's residual encoding produces lower H(residual) than depth=1
  baseline on contest video; (b) the bit-savings exceed the +50 KB predictor
  overhead from increased capacity; (c) the score-aware Lagrangian convergence
  lands within the predicted [0.13, 0.17] band; (d) the identity-predictor
  disambiguator probe shows full-FiLM beats identity by ΔS ≥ 0.005 at
  contest-CUDA (refutes Atick's CC-5 alternative-source hypothesis; confirms
  Rao's CC-1 capacity-unwind hypothesis).

decode_complexity_evidence: |
  Inflate runtime is ~135 LOC substrate-engineering waiver per HNeRV parity L4
  (Z6-v1 baseline ~120 LOC + ~15 LOC for the depth=3 autoregressive unroll
  per Path B design memo §4.1). Per-pair autoregressive unroll: 600 pair
  iterations × (3 × FiLM modulation + 3 × conv + 1×1 projection + decoder
  PixelShuffle blocks). T4 single-pair decode estimated <75ms per pair → <45s
  total per video on T4; well within the 30 min contest inflate wall-clock
  budget. Disambiguator probe is one additional inflate.sh + evaluate.py
  invocation at the same archive bytes; total disambiguator runtime ~60s.

risk: |
  Z6-v2 Candidate 1 Wave 2 BUILD trainer extension + recipe IS complete; this
  recipe is intentionally non-dispatchable (`research_only: true`,
  `dispatch_enabled: false`) pending Phase 3 council §17 op-routable #1
  operator sign-off + C6 IBPS outcome + Catalog #167 smoke-before-full gate.

  Architectural risk per Path B design memo §4.1:
  - The depth=3 FiLM stack adds ~150 KB of FP4-quantized weights vs Z6-v1
    ~95 KB; if the residual savings DO NOT exceed the +55 KB overhead, total
    bytes grow (BAD for rate term). Smoke verifies grammar; full training
    tests the entropy-reduction hypothesis.
  - Per-pair autoregressive unroll across 600 pairs at training time
    multiplies wall-clock by ~1.5× vs Z6-v1 baseline (3-layer stack vs 1-layer).
    T4 batch_size=4 is the empirical floor; A10G/4090/A100 reduce wall-clock
    but increase $/hr.
  - The identity-predictor disambiguator at SAME archive bytes per Council
    Revision #2 is the pre-promotion test. If full FiLM does NOT beat identity
    by ΔS >= 0.005 at contest-CUDA, Rao's capacity-unwind hypothesis is
    REFUTED on this scorer (Atick's CC-5 alternative-source hypothesis becomes
    the binding pivot per Revision #6).
  - The PoseNet-projected ego-motion proxy quality matters — Candidate 1
    PRESERVES Z6-v1's ego signal; if PoseNet projection IS the bottleneck per
    Atick critique, depth=3 capacity DOES NOT rescue the substrate.

  Modal T4 Wave 2 cost band:
  - $1.50 smoke (100 epochs + roundtrip + 1-layer FiLM at smoke config)
  - $1.00 disambiguator probe (one additional inflate.sh + evaluate.py at
    SAME archive bytes; identity-predictor archive vs full-predictor archive)
  - $0.50 GHA Linux x86_64 paired CPU eval
  - TOTAL: $3.00

  Per CLAUDE.md "Auth eval EVERYWHERE" the dispatch MUST end with CUDA auth
  eval on EMA shadow + paired CPU eval per "Submission auth eval — BOTH CPU
  AND CUDA".

