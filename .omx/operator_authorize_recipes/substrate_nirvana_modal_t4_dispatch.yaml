reactivation_criteria: |
  1. Per-substrate adversarial grand council symposium per Catalog #325
     returns PROCEED or PROCEED_WITH_REVISIONS for nirvana specifically.
  2. Cargo-cult audit surfaces PATCH_GRID 4x4 + shared per-patch decoder
     CARGO-CULTED choices and either empirically validates via sweep
     OR reclassifies as HARD-EARNED with citation.
  3. Adaptive per-patch scheduler lands in trainer with per-patch loss EMA.
  4. Trainer _full_main path replaces NotImplementedError with real
     score-aware Lagrangian + EMA + canonical auth-eval per Catalog #226.
  5. Recipe research_only flips to false; dispatch_enabled flips to true;
     predicted_band declared per Catalog #324.

