schema_version: 1
name: substrate_nirvana_modal_t4_dispatch
lane_id: lane_nirvana_l0_scaffold_20260520
summary: |
  nirvana L0 SCAFFOLD diagnostic recipe (Modal T4). Pairs with
  experiments/train_substrate_nirvana.py (WAVE-3-NERV-LITERATURE-L0-RESCOPED
  queue 2026-05-20). NOT DISPATCH-ELIGIBLE: substrate is research_only until
  the Phase 2 council symposium per CLAUDE.md "PER-SUBSTRATE OPTIMAL FORM via
  adversarial grand council symposium" (Catalog #325) lands.

  Literature: Maiya et al. CVPR 2024 NIRVANA (patch-wise + adaptive scheduling).
  Operator 5-tier fit ranking: MODERATE-HIGH FIT ⭐⭐⭐⭐ - patch-wise
  specialization stacks orthogonally with global NeRV substrates.

dispatch_enabled: false
research_only: true

dispatch_blockers:
  - per_substrate_council_symposium_pending_per_catalog_325
  - full_main_raises_NotImplementedError_per_catalog_240
  - phase_2_council_approval_required_to_lift_research_only_per_catalog_315
  - adaptive_per_patch_scheduler_wire_in_pending_for_full_path

platform: modal
gpu: "${MODAL_GPU:-T4}"
min_vram_gb: 16
min_smoke_gpu: "T4"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: ds_nerv

cost_band:
  epochs: 100
  all_flags_on: false
  hand_calibrated_fallback_p50_usd: 0.59
  platform_key: modal
  gpu_key: T4

predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: |
  Post-training Tier-C density re-measurement via
  tools/mdl_scorer_conditional_ablation.py --tier c on the landed archive
  after Phase 2 council symposium per Catalog #325 admits the substrate for
  full-mode training.

predicted_score_target: "unknown_l0_scaffold_pending_council_symposium"
predicted_delta: "unknown_l0_scaffold_no_empirical_anchor"
literature_anchor: "Maiya et al. CVPR 2024 NIRVANA (patch-wise + adaptive scheduling for INR)"

risk: |
  L0 SCAFFOLD posture. Trainer _full_main raises NotImplementedError.
  Recipe is dispatch_enabled:false + research_only:true.

  Architectural distinction vs ds_nerv: nirvana decodes per-patch
  (PATCH_GRID_H x PATCH_GRID_W = 4x4 = 16 patches by default) using a
  SHARED per-patch decoder + learned per-patch embeddings. The adaptive
  scheduler (training-time only; the NIRVANA distinctive contribution)
  allocates more compute to high-error patches based on per-patch loss
  EMA. The L0 SCAFFOLD does NOT include the adaptive scheduler.

  Phase 2 council symposium MUST evaluate:
    (a) cargo-cult audit per Catalog #303 (PATCH_GRID 4x4 + shared
        per-patch decoder weights both CARGO-CULTED);
    (b) 9-dim success checklist evidence per Catalog #294;
    (c) observability surface declaration per Catalog #305;
    (d) Dykstra-feasibility predicted-band per Catalog #296;
    (e) horizon-class declaration per Catalog #309;
    (f) per-substrate symposium 6-step contract per Catalog #325;
    (g) adaptive scheduler design + per-patch loss EMA invariants.

envelope_status: |
  RESEARCH_ONLY: dispatch refused per recipe + trainer + 4 catalog gates
  (#220 + #240 + #315 + #325).

remote_driver: scripts/remote_lane_substrate_nirvana.sh
timeout_hours: 1.5

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv
  - flag: --output-dir
    note: "required (no default); operator must thread"

modal:
  lane_script: scripts/remote_lane_substrate_nirvana.sh
  cost_band_trainer: experiments/train_substrate_nirvana.py
  cost_band_epochs: 100
  cost_band_batch_size: 2
  cost_band_all_flags_on: false

required_input_files_trainer: experiments/train_substrate_nirvana.py

env_overrides:
  NIRVANA_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  NIRVANA_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  NIRVANA_OUTPUT_DIR: /workspace/pact/lane_nirvana_l0_scaffold_results/output
  NIRVANA_EPOCHS: "2"
  NIRVANA_UPSTREAM_DIR: /workspace/pact/upstream
  NIRVANA_DEVICE: cpu
  NIRVANA_SMOKE: "1"
  SMOKE_ONLY: "1"
  LOCAL_CUDA_WORKER: "0"

dependencies:
  - scripts/remote_lane_substrate_nirvana.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_nirvana.py
  - src/tac/substrates/nirvana/__init__.py
