  path (per design memo §1 cost path + §7 reactivation paths a-e):
    - Design $0 + ~6h editor (this scaffold)
    - Wave N+1 council $0 + ~90 min
    - Dykstra-feasibility check $0 analytical
    - Per-section MI probes on V1 25ep state $12-20 CPU
    - Wave 2 single-primitive smoke $1 Modal T4 ~30 min
    - Wave 3 2-primitive smoke (CONDITIONAL): $3-5 Modal A100 ~60 min
    - Wave 4 3-primitive smoke (CONDITIONAL): $10-15 Modal A100 ~120 min
    - Wave 5 4-primitive smoke (CONDITIONAL): $15-25 Modal A100 ~150 min
    - Wave 6 100-300 ep full training (CONDITIONAL): $30-50 Modal A100
    - Wave 7 cross-substrate composition (CONDITIONAL): $40-80 per composition
  Total path-(a)-budget if full 4-primitive composition selected after all
  gates pass: $45-75. Per Catalog #322 anti-phantom: composition α must be
  measured before composition cost is justified.

