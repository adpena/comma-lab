summary: |
  TT5L V2 is the canonical Pattern G + H + I PRIMARY substrate response to
  parent #866's REFUSE verdict on TT5L V1 (empirical 25ep CUDA 3.9007;
  19x worse than 0.20533 contest-CUDA frontier). V1 was empirically
  falsified at the IMPLEMENTATION level (NOT paradigm; per Catalog #307);
  cargo-cult-unwind methodology applied + this scaffold lands the 4-primitive
  redesign per DEEP-RESEARCH-WAVE TOP-5 #1:
    1. VGGT (Wang CVPR 2025; arxiv 2503.11651) - compress-time teacher
       (0 archive bytes; Atick-Redlich cooperative-receiver)
    2. DreamerV3 RSSM categorical (Hafner arxiv 2301.04104) - archive-shipped
       predict_residual section (12 KB GRU + 32-one-hot categorical-stochastic)
    3. NVIDIA VRSS 2 principle (cooperative-receiver-derived foveation map;
       0 archive bytes)
    4. DUSt3R/MASt3R (Wang ECCV 2024; arxiv 2312.14132 + 2406.09756) -
       optional distilled prior (0-10 KB)
  Total V2 archive: ~35-55 KB. Per Boyd Dykstra-feasibility-revised
  predicted band: [0.16, 0.26] [contest-CPU prediction; HIGH VARIANCE];
  parent prompt's hypothetical [0.172, 0.184] sits in lower-region.

