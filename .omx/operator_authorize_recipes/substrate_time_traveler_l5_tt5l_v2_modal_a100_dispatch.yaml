literature_anchor: |
  VGGT (Wang et al. CVPR 2025 Best Paper; arxiv 2503.11651) - feedforward
  3D scene understanding; DreamerV3 RSSM categorical (Hafner et al. arxiv
  2301.04104) - GRU-deterministic + 32-one-hot categorical-stochastic
  latent dynamics; NVIDIA VRSS 2 (Variable Rate Shading 2; production
  NVIDIA Driver R465+) - hardware foveation principle; DUSt3R (Wang et al.
  ECCV 2024; arxiv 2312.14132) + MASt3R (Wang et al. ECCV 2024; arxiv
  2406.09756) - feedforward dense stereo + metric 3D reconstruction;
  Atick-Redlich 1990 - cooperative-receiver theorem; Rao-Ballard 1999 -
  hierarchical predictive coding; Gibson 1950 - ecological-optics
  foveation-FoE; Tishby-Zaslavsky 2015 - information-bottleneck;
  Wyner-Ziv 1976 - source coding with side information; Mallat 1989 -
  wavelet hierarchical decomposition.

source_supports: |
  The design memo binds TT5L V2 as the canonical Pattern G F-asymptote-
  class-shift-not-bolt-on response (Catalog #310) to parent #866 REFUSE
  on V1. Each of the 4 primitives' PRINCIPLE has empirical canonical-theory
  citation. The COMPOSITION of all 4 primitives at substrate architectural
  core IS structurally distinct from V1 + all sister substrates (Z6 Multi-
  layer FiLM / Z7-Mamba-2 selective state-space / Z8 hierarchical-
  quadruple / A1 frontier / PR101 frontier).

pact_must_prove: |
  Before paid full dispatch, TT5L V2 must prove at least: (1) trainer
  _full_main implemented per Wave N+1 council PROCEED-unconditional;
  (2) TT5LV2 archive grammar emits byte-closed archive bytes; (3) inflate
  runtime consumes RSSM categorical predict_residual section bytes + SE(3)
  se3_lie + per-pixel SegNet logits seg_boundary + (optionally) DUSt3R
  distilled dust3r_prior and changes output (Catalog #220 + #272 byte-
  mutation smoke per primitive); (4) cooperative-receiver-derived foveation
  map derivation AT INFLATE TIME from scorer weights produces consistent
  output across runs (Catalog #166 Modal HEAD-parity ledger); (5) per-
  primitive ablation isolates contribution (Catalog #322 anti-phantom);
  (6) Boyd Dykstra-feasibility polytope projection confirms achievable
  region intersects predicted band; (7) per-section MI probes on V1 25ep
  state vs V2 100ep state show > 0.5 bits/symbol on >= 2 of 4 sections
  (per Assumption-Adversary hypothesis); (8) paired CPU/CUDA exact eval
  harvested under lane claim custody per Catalog #226 + #245.

decode_complexity_evidence: |
  Planned inflate runtime is ~250 LOC with VGGT NOT loaded (compress-time
  teacher only; 0 archive bytes) + DreamerV3 RSSM categorical deterministic
  unroll across 600 pairs + cooperative-receiver foveation map derived at
  inflate time from scorer weights + per-pixel SegNet logits product-
  quantized decoder + optional DUSt3R distilled prior decoder + SE(3) Lie
  algebra ego-pose (substrate-engineering HNeRV parity L4 waiver explicit).
  Runtime deps: torch + brotli + numpy + (faiss for product-quantization)
  (4 deps; exceeds default L4 budget of <=2 per HNeRV parity L4; substrate-
  engineering L7 waiver applies). No runtime exists yet; this is a
  blocker, not evidence.

