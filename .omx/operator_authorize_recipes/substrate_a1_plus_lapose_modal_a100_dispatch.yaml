risk: |
  First-anchor D1.D composition dispatch.  A1 substrate is FROZEN (loaded
  verbatim from archive.zip); only the LAPose foveal residual head is
  trained (rank-4 outer product, ~4K params, ~3-5 KB int8+Brotli sidecar).
  Score-aware Lagrangian end-to-end (D3.B) means the head sees scorer
  gradient through SegNet + PoseNet on the contest video; D2 bounded
  budget (5 KB hard cap; 2 KB target) prevents the FiLM hijack failure
  mode Contrarian identified in council §3.1.

  D4 mode is operator-routable PENDING COUNCIL-D4-DEEPER verdict.  The
  trainer ships D4.B (single-stage with new archive section appended to
  A1's `x` blob) as the primary path per council lean.  D4.A two-stage
  swap surface is documented in `tac.substrates.a1_plus_lapose.archive`
  (`split_composition_archive` helper); D4.C no-grammar-change is
  research-only until sister subagent verdict lands.

  Per CLAUDE.md "Submission auth eval — BOTH CPU AND CUDA" non-negotiable,
  this lane requires BOTH `[contest-CUDA]` (inline) AND `[contest-CPU]`
  (Linux x86_64 separate dispatch) before promotion.  First-anchor dispatch
  is CUDA-only; the CPU axis follow-up is a separate operator decision.

  Smoke-before-full pattern (Catalog #167): the operator-authorize wrapper
  routes through `tools/run_modal_smoke_before_full.py` which fires a
  100-epoch ~$0.30 Modal T4 smoke FIRST, validates rc=0 + auth-eval JSON
  present + score in plausible band [0.15, 0.25], then fires the full
  3000-epoch A100 dispatch only on smoke-green.

envelope_status: "FITS $20 envelope at p50 fallback (smoke $0.30 + full $4.50)"

