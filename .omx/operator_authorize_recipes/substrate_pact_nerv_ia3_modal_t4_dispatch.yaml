reactivation_criteria: |
  1. PACT-NERV-DESIGN-SYMPOSIUM Stage 1 dispatch operator-gated approval
     per CLAUDE.md "PER-SUBSTRATE OPTIMAL FORM via adversarial grand council
     symposium" (Catalog #325). The symposium memo at
     .omx/research/council_per_substrate_symposium_pact_nerv_*_20260520T185500Z.md
     already returned PROCEED_WITH_REVISIONS with HYBRID Stage 1 = Pact-NeRV-IA3
     ~$0.30 Modal T4 50-LOC γ-only rate-extremal smoke as the cheapest
     empirical experiment (op-routable #1).
  2. Cargo-cult audit per Catalog #303 surfaces the 2 CARGO-CULTED choices
     documented in src/tac/substrates/pact_nerv_ia3/__init__.py
     (per-block modulation; shared γ_proj across frame_0/frame_1). The
     audit MUST either (a) empirically validate each via sweep at Stage 1
     dispatch OR (b) reclassify as HARD-EARNED with citation.
  3. Trainer experiments/train_substrate_pact_nerv_ia3.py _full_main path
     replaces NotImplementedError with real score-aware Lagrangian + EMA
     + canonical auth-eval helper invocation per Catalog #226. The
     PactNervIa3ScoreAwareLoss helper provides the loss surface; the
     trainer's full path must wire it in.
  4. Recipe research_only flips from true to false; dispatch_enabled
     flips from false to true; predicted_band declared with
     validation_status (post_training validated or pending_post_training
     with reactivation criterion) per Catalog #324.

