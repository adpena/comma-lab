schema_version: 1
name: substrate_hybrid_renderer_residual_modal_a100_dispatch
lane_id: lane_substrate_hybrid_renderer_residual_20260512
summary: |
  WAVE-1-C gamma hybrid_renderer_residual first-anchor dispatch on Modal A100
  (composite alpha-renderer + beta-style sparse residual; PRE-PROMOTION BLOCKED
  until alpha and beta each have a verified [contest-CUDA] anchor).

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
# Catalog #215 (FIX-HARDEN-OPT 2026-05-14 P0): A100 full-run requires
# matching smoke-phase compute class. SIREN smoke timed out on T4 default
# (rc=124 at 3601s wall-clock 2026-05-13); coordinate-MLP / NeRV-family
# substrates won't complete 100-epoch smoke on T4 within timeout. Declaring
# min_smoke_gpu pins the smoke phase to A100 too; the CLI --smoke-gpu T4
# default is overridden. Backfilled by RECIPE-CANON-BACKFILL-SUBAGENT
# 2026-05-14 (lane_recipe_canon_backfill_sweep_20260514).
min_smoke_gpu: "A100"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: sane_hnerv

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 9.50
  platform_key: modal
  gpu_key: A100

# WAVE-1-C HIGH-target prediction per council Phase 5 SUBSTRATE design memo.
# gamma adds a sparse residual basis decoder atop the alpha HNeRV-class renderer; the
# residual targets the score-affecting pose-axis at the PR106 r2 operating
# point (2.71× pose-marginal). Council estimate ~0.17 [contest-CUDA] HIGH
# target conditional on (a) alpha first-anchor scoring as expected and (b) the
# residual basis dimension/sparsity being well-tuned in this first dispatch.
predicted_score_target: 0.17
predicted_delta: "-0.025 vs alpha (sane_hnerv) standalone [predicted; council Phase 5]"
predicted_delta_basis: ".omx/research/grand_council_fields_medal_substrate_design_20260512.md#hybrid_renderer_residual"
literature_anchor: |
  Composite per CLAUDE.md "Substrate vs Codec composition meta-pattern" +
  Ballé 2018 hyperprior (rate-axis side-info) + sparse-coding residual basis
  (analog of OMP / dictionary learning for the residual stream). The
  gamma-specific "sparse residual basis decoder" is the pose-axis attack vector
  identified by Dykstra at the PR106 r2 operating point.
council_phase_5_prediction: 0.17

# CRITICAL: composition substrate carries pre-promotion blockers per CLAUDE.md
# "HNeRV / leaderboard-implementation parity discipline" + the
# "Substrate vs codec composition meta-pattern" memory:
#
#   The hybrid lane MUST clear these blockers (i.e., alpha and beta each have a
#   verified [contest-CUDA] anchor) BEFORE this trainer dispatches to a paid
#   GPU. The trainer can be BUILT and SMOKE-TESTED prior to clearance.
#
# Without the base substrates measured first, hybrid composition produces
# false-positive ranking signals (kitchen_sink anti-pattern). PR105 (1776
# LOC, 21 files) lost to PR103 (241 LOC) silver in May 4 race for exactly
# this reason.
pre_promotion_blockers:
  - sane_hnerv_first_anchor_required
  - balle_renderer_first_anchor_required

risk: |
  PHASE-WAVE-1-C HIGH-target dispatch on Modal A100. Composite gamma substrate:
  alpha-renderer (HNeRV-class PixelShuffle decoder; mirrors sane_hnerv) +
  beta-style sparse residual basis decoder. Substrate-vs-codec composition
  RISK CLASS - this dispatch SHOULD NOT FIRE until both base substrate
  anchors land. Recipe declares pre_promotion_blockers; operator_authorize
  wrapper enforces.

  Trainer _full_main wires 16 stages including auth eval at stage 12.
  Single-axis [contest-CUDA] acceptable for first anchor; CPU axis required
  separately before promotion.

  --freeze-alpha flag (default False): when True the alpha renderer is frozen
  and only beta-style residual trains. Useful for layering gamma-residual onto a
  strong pre-trained alpha checkpoint without disturbing it. Set
  HYBRID_RES_FREEZE_ALPHA=1 in env to flip default to True.

  --alpha-pretrained-checkpoint flag (default None): path to a pre-trained
  alpha (sane_hnerv-class) checkpoint to warm-start the renderer from. Set
  HYBRID_RES_ALPHA_PRETRAINED_CHECKPOINT in env.
envelope_status: "FITS $20 envelope at p50 fallback"

remote_driver: scripts/remote_lane_substrate_hybrid_renderer_residual.sh
timeout_hours: 4.5

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_hybrid_renderer_residual.sh
  cost_band_trainer: experiments/train_substrate_hybrid_renderer_residual.py
  cost_band_epochs: 2000
  cost_band_batch_size: 32
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_hybrid_renderer_residual.py

env_overrides:
  HYBRID_RES_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  HYBRID_RES_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  HYBRID_RES_OUTPUT_DIR: /workspace/pact/lane_substrate_hybrid_renderer_residual_results/output
  HYBRID_RES_EPOCHS: "2000"
  HYBRID_RES_UPSTREAM_DIR: /workspace/pact/upstream
  HYBRID_RES_DEVICE: cuda
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_hybrid_renderer_residual.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_hybrid_renderer_residual.py
  - tools/claim_lane_dispatch.py
  - tools/append_cost_band_anchor.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)
  - lane_substrate_sane_hnerv_20260512 (PRE-PROMOTION BLOCKER - first anchor required)
  - lane_substrate_balle_renderer_20260512 (PRE-PROMOTION BLOCKER - first anchor required)

notes: |
  WAVE-1-C parallel deployment subagent landing 2026-05-12.

  Composition-risk discipline:
    * The composite substrate IS a renderer (full RGB; HNeRV parity lesson L5).
    * The residual basis decoder corrects per-pair score-affecting deltas;
      at archive-time the top-k coefficients (by absolute magnitude) are
      stored as (u16 index, i16 value) pairs in the HRR1 0.bin section.
    * Inflate.py is <= 200 LOC (<= 100 LOC waiver per HNeRV parity L4
      NEEDS-WORK explicit tag for residual decode).
    * The score-domain Lagrangian wires 4 terms:
          L = alpha·B/N + beta·d_seg + gamma·sqrt(d_pose) + λ_res·||c||_1
      where ||c||_1 is the sparse residual coefficient magnitudes.

  Phase-2 dispatch readiness path:
    1. WAVE-1-A + WAVE-1-B + WAVE-1-C (this) build trainers + recipes + drivers
       at L0 SKETCH (this landing).
    2. PRIMARY alpha (sane_hnerv) first anchor lands -> operator approves.
    3. PARALLEL beta (balle_renderer) first anchor lands -> operator approves.
    4. Both blockers clear -> recipe authorize fires this hybrid dispatch.
    5. Result auth-eval [contest-CUDA] feeds back into council Phase 5.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

  Cost band: tac.cost_band_calibration.predict('modal', 'A100', 2000) - current
  confidence: weak_posterior (gamma-specific N=0). p50 fallback $9.50 reflects
  gamma's slightly higher per-batch cost vs alpha (residual decoder forward pass adds
  ~5-8% overhead on A100 vs alpha-only).

