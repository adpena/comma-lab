schema_version: 1
name: substrate_tc_nerv_modal_a100_dispatch
lane_id: lane_substrate_tc_nerv_20260512
summary: tc_nerv first-anchor dispatch on Modal A100 (DEFERRED - MEDIUM-target HNeRV-family architectural twist).

dispatch_enabled: false
research_only: false
defer_reason: |
  MEDIUM-target HNeRV-family dispatch is intentionally held behind the
  HIGH-target substrate anchors (SIREN, Cool-Chic, VQ-VAE, self_compress_nn,
  balle_renderer). The trainer, wrapper, and remote driver exist, but this
  lane should not consume paid GPU before at least one HIGH-target substrate
  lands a smoke-green exact-eval path or the operator explicitly reroutes the
  priority queue. This is a routing defer, not an infrastructure gap.
dispatch_blockers:
  - high_target_substrate_anchor_required
  - modal_smoke_not_yet_green

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
# Catalog #215 (FIX-HARDEN-OPT 2026-05-14 P0): A100 full-run requires
# matching smoke-phase compute class. SIREN smoke timed out on T4 default
# (rc=124 at 3601s wall-clock 2026-05-13); coordinate-MLP / NeRV-family
# substrates won't complete 100-epoch smoke on T4 within timeout. Declaring
# min_smoke_gpu pins the smoke phase to A100 too; the CLI --smoke-gpu T4
# default is overridden. Backfilled by RECIPE-CANON-BACKFILL-SUBAGENT
# 2026-05-14 (lane_recipe_canon_backfill_sweep_20260514).
min_smoke_gpu: "A100"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: sane_hnerv

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 7.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: 0.19
predicted_delta: "-0.003 to +0.007 vs PR101 0.193 [predicted; council Phase 5 MEDIUM]"
predicted_delta_basis: ".omx/research/grand_council_fields_medal_substrate_design_20260512.md#tc_nerv"
literature_anchor: "Chen et al. - 'HNeRV: A Hybrid Neural Representation for Videos' NeurIPS 2023 + temporal-consistency regularizer hypothesis (council Phase 5)"
council_phase_5_prediction: 0.19

risk: |
  WAVE-3-A MEDIUM-target dispatch on Modal A100. tc_nerv is the LOWEST-RISK
  of the WAVE-3 trio: same SIREN+PixelShuffle+per-pair-latents backbone as
  sane_hnerv, only delta is the additive temporal-consistency regularizer
  ``lambda_tc * mean((rgb_1 - rgb_0)^2)`` in the Lagrangian. Council default
  lambda_tc=0.5 is small enough not to dominate score-domain terms; large
  enough to bias adjacency. Decoder channel ladder is smaller than sane_hnerv
  (~121K params vs ~229K) per L0 SKETCH design; this trades capacity for
  byte budget. Architectural risk: lambda_tc may need calibration if the
  tc gradient SNR is too high relative to the score gradient (PoseNet has
  noisier gradients than the rgb-delta term); first-anchor dispatch will
  reveal whether lambda_tc=0.5 is conservative enough. Trainer _full_main
  wires 15 stages including auth eval at stage 12. Single-axis [contest-CUDA]
  acceptable for first anchor; CPU axis required separately before promotion.
envelope_status: "DEFERRED: MEDIUM-target routing holds dispatch until HIGH-target anchors land"

remote_driver: scripts/remote_lane_substrate_tc_nerv.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_tc_nerv.sh
  cost_band_trainer: experiments/train_substrate_tc_nerv.py
  cost_band_epochs: 2000
  cost_band_batch_size: 32
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_tc_nerv.py

env_overrides:
  TC_NERV_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  TC_NERV_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  TC_NERV_OUTPUT_DIR: /workspace/pact/lane_substrate_tc_nerv_results/output
  TC_NERV_EPOCHS: "2000"
  TC_NERV_UPSTREAM_DIR: /workspace/pact/upstream
  TC_NERV_DEVICE: cuda
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_tc_nerv.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_tc_nerv.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)

notes: |
  WAVE-3-A MEDIUM-target HNeRV-family architectural twist. This recipe is
  intentionally fail-closed until HIGH-target substrate anchors land or the
  operator explicitly reroutes MEDIUM-target HNeRV-family work ahead of them.
  Tests whether
  HNeRV-family has architectural ceiling at gold (0.193) or whether the
  temporal-consistency regularizer can push lower at the PR106 r2 operating
  point (pose_avg ~ 3.4e-5, pose marginal 2.71x SegNet's per CLAUDE.md
  'SegNet vs PoseNet - operating-point dependent').

  Architectural distinction vs sane_hnerv: identical SIREN+PixelShuffle
  backbone, only addition is the score-aware Lagrangian's lambda_tc *
  (rgb_1 - rgb_0)^2 term. The hypothesis: PoseNet's 12-channel YUV6 input
  (two adjacent frames) rewards temporal smoothness at the pose-distortion
  level, so a renderer that explicitly trains to keep adjacent frames close
  should reduce pose_avg faster than the un-regularized HNeRV variant.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

