schema_version: 1
name: substrate_ff_nerv_modal_a100_dispatch
lane_id: lane_substrate_ff_nerv_20260512
summary: ff_nerv first-anchor dispatch on Modal A100 (DEFERRED - MEDIUM-target HNeRV-family architectural twist).

dispatch_enabled: false
research_only: false
defer_reason: |
  MEDIUM-target HNeRV-family dispatch is intentionally held behind the
  HIGH-target substrate anchors (SIREN, Cool-Chic, VQ-VAE, self_compress_nn,
  balle_renderer). The trainer, wrapper, and remote driver exist, but this
  lane should not consume paid GPU before at least one HIGH-target substrate
  lands a smoke-green exact-eval path or the operator explicitly reroutes the
  priority queue. This is a routing defer, not an infrastructure gap.
dispatch_blockers:
  - high_target_substrate_anchor_required
  - modal_smoke_not_yet_green

platform: modal
gpu: "${MODAL_GPU:-A100}"

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 9.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: 0.19
predicted_delta: "-0.003 to +0.010 vs PR101 0.193 [predicted; council Phase 5 MEDIUM]"
predicted_delta_basis: ".omx/research/grand_council_fields_medal_substrate_design_20260512.md#ff_nerv"
literature_anchor: "Chen et al. - 'HNeRV: A Hybrid Neural Representation for Videos' NeurIPS 2023 + DCT-domain rendering hypothesis (council Phase 5 + Ahmed-Natarajan-Rao 1974 'Discrete Cosine Transform')"
council_phase_5_prediction: 0.19

risk: |
  WAVE-3-C MEDIUM-target dispatch on Modal A100. ff_nerv is the HIGHEST-RISK
  of the WAVE-3 trio. The IDCT2 basis is a deterministic einsum reconstructed
  at inflate-time (rebuilt from config, so NOT counted in archive bytes).
  Training memory footprint is high: at batch=32, the (B, 3, 384, 64)
  intermediate is 96MB. A100 (40GB) handles batch=32; T4 (16GB) needs
  batch=8-16. Default batch=16 fits both substrates.

  Architectural risk: the 64x64 freq-band cutoff is a HARD prior. If the
  contest video has significant high-frequency content (sharp edges, fine
  textures) that PoseNet rewards, this prior is wrong and ff_nerv will
  saturate. The council Phase 5 prediction acknowledges this; L1 promotion
  may sweep freq_grid_h/w over {32, 48, 64, 96, 128}. Trainer _full_main
  wires 15 stages including auth eval at stage 12. Single-axis [contest-CUDA]
  acceptable for first anchor; CPU axis required separately before promotion.
envelope_status: "FITS $20 envelope at p50 fallback"

remote_driver: scripts/remote_lane_substrate_ff_nerv.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_ff_nerv.sh
  cost_band_trainer: experiments/train_substrate_ff_nerv.py
  cost_band_epochs: 2000
  cost_band_batch_size: 16
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_ff_nerv.py

env_overrides:
  FF_NERV_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  FF_NERV_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  FF_NERV_OUTPUT_DIR: /workspace/pact/lane_substrate_ff_nerv_results/output
  FF_NERV_EPOCHS: "2000"
  FF_NERV_BATCH_SIZE: "16"
  FF_NERV_UPSTREAM_DIR: /workspace/pact/upstream
  FF_NERV_DEVICE: cuda
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_ff_nerv.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_ff_nerv.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)

notes: |
  WAVE-3-C MEDIUM-target HNeRV-family architectural twist (frequency-domain
  DCT). Tests whether explicit low-frequency band-limit constraint moves the
  HNeRV-family ceiling lower than the un-constrained sane_hnerv variant at
  the PR106 r2 operating point (pose_avg ~ 3.4e-5, pose marginal 2.71x
  SegNet's per CLAUDE.md 'SegNet vs PoseNet - operating-point dependent').

  Architectural distinction vs sane_hnerv: the decoder predicts 64x64 DCT
  coefficient grids (3 channels per frame, 2 frames per pair); the IDCT2
  basis (rebuilt deterministically at inflate-time from cfg) reconstructs
  the 384x512 RGB output. The 64x64 cutoff is a structural inductive bias
  on which frequency content the renderer can generate. Score-aware loss
  shape unchanged from sane_hnerv.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

  Cross-ref:
    feedback_wave3_hnerv_3_trainers_LANDED_20260512.md
    feedback_phase_b2_build_3_high_target_trainers_LANDED_20260512.md
    feedback_substrate_sane_hnerv_full_main_wired_landed_20260512.md
    .omx/research/grand_council_fields_medal_substrate_design_20260512.md
