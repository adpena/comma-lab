  - experiments/results/pr101_frame_exploit_selector_fec6_fixed_huffman_k16_clean_20260515_codex/archive.zip
  - tools/validate_dispatch_required_inputs.py
  - tools/dispatch_modal_paired_auth_eval.py

notes: |
  Ext 5 of fec6 stacking wave (lane_fec6_stacking_wave_5_grammar_extensions_20260517).
  Design memo: .omx/research/fec6_plus_haar_residual_design_20260517.md

  PHASE 1 (this recipe): scaffold builder + tests + byte-deterministic packet.
  Generated inflate.py is scaffold-only (raises NotImplementedError before
  producing output). DO NOT FIRE this dispatch until Phase 2 base-inflate
  wiring + offline residual computation pipeline land.

  PHASE 2 (queued for operator approval):
  - Sister tools/compute_fec6_plus_haar_residual_offline.py to:
    * Inflate fec6 archive offline on macOS-CPU
    * Compare to GT frames from upstream/videos/0.mkv
    * Downsample residual to (96, 128) or similar
    * Emit per_frame_residuals.npz
  - Wire generated inflate.py to call fec6 base inflate, then apply Haar
    residual additive correction at full camera resolution.
  - Land a canonical fec6 base inflate helper at tac.fec6_base_inflate.
  - Add a per-band byte-mutation smoke per Catalog #139 + #272 to prove the
    Haar bytes are operationally consumed.

  Per HNeRV parity L7: 1-level Haar IS bolt-on scope. Daubechies-4 multi-level
  variant + per-band variable bit-width + wavelet hyperprior are DEFERRED to
  substrate-engineering scope per the design memo's "Future work" section.

  Per CLAUDE.md "Apples-to-apples evidence discipline" + Catalog #287: every
  predicted-ΔS claim above carries [predicted, theoretical] tag. No
  contest-CPU / contest-CUDA claims until paired-axis dispatch lands.

  Per Catalog #313 predecessor probe outcome: no prior probe of this specific
  (fec6 + Haar residual) composition exists.
