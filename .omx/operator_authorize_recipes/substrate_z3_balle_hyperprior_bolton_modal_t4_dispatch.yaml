notes: |
  Z3 Ballé hyperprior bolt-on first-anchor SMOKE dispatch recipe.

  Architecture: 1,764-param Ballé-2018 scale-hyperprior MLP (h_a: 28→16→8;
  h_s: 8→16→28) with int8 weight quantization and brotli-compressed sidecar.
  Sidecar overhead ~14,055B vs A1 latent_blob 15,387B → amortization budget
  ~1,300B for the conditional-Gaussian rate-y term. Per the Ballé 2018
  amortization principle, the sidecar is OMITTED when bytes_saved < overhead
  (the archive is then byte-identical-to-A1 and the trainer reports
  research_only=true).

  Per the long-term campaign C5 ranking, Z3 is the cheapest across-class
  validation that a literature-anchored class-shift mechanism reduces A1
  bytes without distortion regression. The smoke is the canonical empirical
  test; full training (gated behind _full_main NotImplementedError) requires
  Phase 2 council approval.

  PHASE 2 COUNCIL APPROVED 6/6 unanimous 2026-05-14 per
  `.omx/research/z3_phase_2_council_20260514.md`
  (Shannon LEAD + Dykstra CO-LEAD + Yousfi + Fridrich + Contrarian +
  MacKay). Full dispatch (`--epochs 200+`) is authorized via this recipe;
  `_full_main` implementation landed at commit 1aaa258dc.

  Predicted contest-CUDA score: 0.183-0.190 [prediction; first-principles-bound]
  (NOT a score claim — score authority requires CUDA + CPU paired auth eval
  on 1:1 contest-CI hardware per CLAUDE.md "Submission auth eval — BOTH CPU
  AND CUDA").

