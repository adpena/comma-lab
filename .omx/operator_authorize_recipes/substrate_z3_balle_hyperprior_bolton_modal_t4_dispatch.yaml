summary: |
  Z3 Ballé 2018 scale-hyperprior bolt-on on the FROZEN A1 base — across-class
  staircase Step 1 per zen-floor band v2 council
  (`feedback_zen_floor_band_v2_post_z1_ablation_20260514.md`) and the
  long-term campaign roadmap
  (`feedback_long_term_multi_year_campaigns_landed_20260514.md` Campaign C5
  cooperative-receiver Step 1).

  Mechanism (Ballé 2018 ICLR scale-hyperprior, tiny per-pair variant):

  A1's existing latent_blob (15,387 bytes) is arithmetic-coded under a
  FACTORIZED prior (mean=0, fixed scale). The hyperprior replaces this
  with a CONDITIONAL Gaussian prior whose per-dim scale σ_p is predicted
  per-pair via a tiny MLP h_s(w_hat_p) where w_hat_p is an 8-dim
  side-info hyper-latent. Per Ballé 2018:

      R_total = R_y (conditional Gaussian) + R_w (factorized side-info)
              = -log p_y(y_hat | σ(w_hat)) + -log p_z(w_hat)

  When |y stream rate saving| > |w side-info + MLP weights|, bytes drop.
  At A1's 99.29% scorer-conditional MDL density (Z1 ablation; saturated
  within-class) the predicted byte savings is ~5-15% of latent_blob with
  zero distortion change.

  Predicted ΔS = −0.005 to −0.010 vs A1 0.1928 [contest-CPU 1to1]
  ``[prediction; first-principles-bound]``. Cost $2 (Modal T4 smoke).

  This is the cheapest across-class validation that a recognized class-shift
  literature anchor (Ballé hyperprior; Catalog #219 ranker reward -0.01 for
  literature-anchor + -0.02 for class_shift lane_class) reduces A1 bytes
  without distortion regression.

