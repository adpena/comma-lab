predicted_delta: "-0.005 to -0.010 vs A1 0.1928 [contest-CPU 1to1] [prediction; first-principles-bound]"
predicted_delta_basis: |
  Ballé (2018) ICLR 2018 "Variational image compression with a scale
  hyperprior" — empirical 10-20% rate savings vs factorized prior on
  natural images. For A1 latent_blob (15387B) the conservative 5-15%
  savings = ~770-2300 bytes shaved off the rate term. At contest rate
  weight α=25 / N_normalizer=37,545,489: ΔS = 25 * 1000 / 37.5M = -0.000666
  per 1000B saved. Predicted -0.005 to -0.010 implies 7500-15000 bytes
  saved which is OPTIMISTIC — realistic is closer to -0.001 to -0.003.
  The smoke is the canonical empirical test (Z1 council Decision Z3).
literature_anchor: |
  Ballé, Minnen, Singh, Hwang, Johnston (2018) "Variational image compression
  with a scale hyperprior" ICLR 2018 arXiv:1802.01436
  DOI 10.48550/arXiv.1802.01436;
  Ballé, Laparra, Simoncelli (2017) "End-to-end optimized image compression"
  ICLR 2017 arXiv:1611.01704;
  MacKay (2003) "Information Theory, Inference, and Learning Algorithms"
  § 6.7 (arithmetic coding ideal rate);
  Bauer & Cover (1991) Elements of Information Theory § 5.5 (factorized
  vs conditional priors).
council_phase_5_prediction: 0.190

risk: |
  Z3 hyperprior bolt-on smoke. Predicted band [0.183, 0.190] is a literature-
  prediction synthesis (Ballé 2018 + Z1 MDL ablation at 99.29% density), NOT
  measurement.

  Architectural risk:
  - At A1's 99.29% scorer-conditional MDL density the realistic delta is at
    the LOW end of the predicted band (-0.001 to -0.003 more likely than
    -0.010). The Z1 ablation EUREKA finding (Tier C σ=0.01 perturbation =
    A1↔PR106 medal-band gap fingerprint) suggests the within-class encoder
    is structurally saturated.
  - The Ballé hyperprior is a known across-class win; Catalog #219 cathedral
    autopilot ranker v2 rewards it -0.01 for literature-anchor + -0.02 for
    class_shift lane_class so the bet is asymmetric: tiny downside, modest
    upside via posterior calibration.
  - The sidecar overhead estimate is ~14,055 bytes (residual 10080 + w_hat
    2880 + weights 1058 + header 37). A1's latent_blob is 15,387 bytes so
    amortization requires the conditional-Gaussian rate-y to come in below
    ~1300 bytes for the full 600 pairs. The trainer adopts the Ballé
    amortization principle: ship the sidecar ONLY when bytes_saved >
    overhead, else fall back to byte-identical-to-A1.

  Modal T4 training is diagnostic unless the auth-eval contract itself records
  score_axis=contest_cuda and score_claim_valid=true. CPU axis remains
  required separately on Linux x86_64 before any frontier-claim language.

