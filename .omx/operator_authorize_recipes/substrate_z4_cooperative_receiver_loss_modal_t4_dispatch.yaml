# "Substrate scaffolds MUST be COMPLETE or RESEARCH-ONLY" + Catalog #220, the
# recipe MUST be tagged research_only=true so the contest-CUDA chain audit
# (tools/local_pre_deploy_check.py + Catalog candidate gate) recognizes it as
# transparently non-dispatchable. Removing this flag without first lifting the
# NotImplementedError WILL result in Modal dispatch crashing pre-auth-eval
