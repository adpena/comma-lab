literature_anchor: |
  Atick & Redlich (1990) "Towards a theory of early visual processing"
    Neural Computation 2(3):308-320 (cooperative-receiver theorem);
  Tishby & Zaslavsky (2017) "Opening the black box of deep neural networks via information"
    (Information Bottleneck cooperative formulation);
  Time-Traveler peer-seat council 2026-05-14: feedback_grand_council_maximize_value_landed_20260514.md;
  Zen-floor field-medal council 2026-05-14: feedback_zen_floor_field_medal_grade_council_landed_20260514.md.

risk: |
  Z4 first-anchor dispatch. The substrate inherits Z3's v2 latent-replacement byte grammar and
  introduces ONLY a loss-axis change. The predicted [0.180, 0.188] band is
  a mathematical derivation from the Atick-Redlich cooperative-receiver
  theorem, not measurement.

  Architectural risk:
  - The cooperative-receiver loss gradient flow through the differentiable
    scorer requires Catalog #187's patch_upstream_yuv6_globally to fire
    BEFORE load_differentiable_scorers. The trainer enforces this in
    _full_main; the smoke path bypasses the scorer entirely.
  - lambda_pixel=0 (pure cooperative-receiver) may produce visually-poor
    but scorer-good frames; the contest measures scorer-axis distortion
    so this is by design. Smoke verifies the grammar; full training
    verifies the loss-axis hypothesis.
  - The probe-disambiguator (lambda_pixel sweep) is the pre-promotion test.
    If lambda_pixel=0 does NOT beat lambda_pixel=1 by ΔS >= 0.003, the
    cooperative-receiver hypothesis is refuted on this scorer.

  Modal T4 training cost band: $0.50 smoke (200 epochs proxy); $5 full
  (200 epochs scorer-aware). Per CLAUDE.md "Auth eval EVERYWHERE" the
  dispatch MUST end with CUDA auth eval on the EMA shadow.

envelope_status: "FITS $5 envelope at p50 fallback for smoke ($0.50); full dispatch $5"

