research_only: true
dispatch_blockers:
  - phase_2_council_approval_required_to_lift_full_main_NotImplementedError
summary: |
  Z4 cooperative-receiver loss substrate (Time-Traveler L5 staircase Step 2)
  per `.omx/research/campaign_z4_cooperative_receiver_loss_20260514.md` and
  `feedback_grand_council_maximize_value_landed_20260514.md`.

  Mechanism (Atick & Redlich 1990 cooperative-receiver theorem):

  Loss-only intervention on the Z3 v2 latent-replacement + A1 substrate. Trains against the contest's
  ACTUAL scorer distortions via canonical score_pair_components (Catalog #164)
  with a tunable pixel-MSE residual weight λ_pixel ∈ [0.0, 1.0]. The pure
  cooperative-receiver regime (λ_pixel=0) is the Atick-Redlich H(X|W+A+P)
  form; λ_pixel=1 recovers Z3 baseline (pixel-MSE-only) for ablation.

  Per Time-Traveler peer-seat council (`feedback_grand_council_maximize_value_landed_20260514.md`
  STAIRCASE 10/11): Step 2 cooperative-receiver loss is the dominant
  marginal-value-per-byte intervention at the PR101+Z3 v2 operating point
  (pose marginal 2.71x SegNet's per CLAUDE.md operating-point-aware rule).

  Predicted ΔS -0.005 to -0.010 vs Z3 baseline 0.193 → predicted score band
  [0.180, 0.188] [mathematical-derivation; gradient-alignment-dominated].

  Probe-disambiguator (Catalog #125 hook #6): λ_pixel sweep over [0.0, 0.5, 1.0]
  arbitrates Atick-Redlich vs marginal-gradient-alignment hypotheses post-smoke.

