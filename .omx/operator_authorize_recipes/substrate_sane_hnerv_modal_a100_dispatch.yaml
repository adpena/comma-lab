schema_version: 1
name: substrate_sane_hnerv_modal_a100_dispatch
lane_id: lane_substrate_sane_hnerv_20260512
summary: sane_hnerv first-anchor dispatch on Modal A100 (Phase 1 first-anchor research).
smoke_only: true
smoke_validation_contract: training_artifact_v1

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
# Catalog #215 (FIX-HARDEN-OPT 2026-05-14 P0): A100 full-run requires
# matching smoke-phase compute class. SIREN smoke timed out on T4 default
# (rc=124 at 3601s wall-clock 2026-05-13); coordinate-MLP / NeRV-family
# substrates won't complete 100-epoch smoke on T4 within timeout. Declaring
# min_smoke_gpu pins the smoke phase to A100 too; the CLI --smoke-gpu T4
# default is overridden. Backfilled by RECIPE-CANON-BACKFILL-SUBAGENT
# 2026-05-14 (lane_recipe_canon_backfill_sweep_20260514).
min_smoke_gpu: "A100"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - research_substrate
canary_status: canary

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 8.00
  platform_key: modal
  gpu_key: A100

predicted_delta: "-0.030 to -0.050 [predicted; council substrate design memo]"
predicted_delta_basis: ".omx/research/grand_council_fields_medal_substrate_design_20260512.md"
risk: |
  Phase 1 first-anchor research dispatch on Modal A100. The shared
  modal_train_lane.py wrapper forces AUTH_EVAL_DEVICE=cpu and marks that
  eval advisory-only because the training container does not provide NVDEC.
  This recipe is therefore smoke_only with training_artifact_v1 validation:
  it validates trainer/archive wiring only. Contest-CUDA/contest-CPU paired
  exact eval must be launched through the canonical exact-eval dispatchers
  after a byte-closed archive is harvested.
envelope_status: "FITS $20 envelope at p50 fallback"

remote_driver: scripts/remote_lane_substrate_sane_hnerv.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_sane_hnerv.sh
  cost_band_trainer: experiments/train_substrate_sane_hnerv.py
  cost_band_epochs: 2000
  cost_band_batch_size: 32
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_sane_hnerv.py

env_overrides:
  SANE_HNERV_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  SANE_HNERV_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  SANE_HNERV_OUTPUT_DIR: /workspace/pact/lane_substrate_sane_hnerv_results/output
  SANE_HNERV_EPOCHS: "2000"
  SANE_HNERV_UPSTREAM_DIR: /workspace/pact/upstream
  SANE_HNERV_DEVICE: cuda
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_sane_hnerv.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_sane_hnerv.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)

notes: |
  Per operator directive 2026-05-12: "reroute all to modal and lightning free
  tier" + "all are approved".

  Background: Wave 3 prior attempt DEFERRED on two STOP-PRECONDITIONS:
    1. STRICT preflight RED on Catalog #151/#152/#154 rglob() cascade (resolved).
    2. Vast.ai account balance NEGATIVE (resolved by Modal re-route).

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

  Cost band: tac.cost_band_calibration.predict('modal', 'A100', 2000) — current
  confidence: weak_posterior (N=1 anchor). First dispatches bootstrap the
  calibration system.

  Cross-ref:
    feedback_substrate_sane_hnerv_full_main_wired_landed_20260512.md
    feedback_substrate_sane_hnerv_first_anchor_dispatch_landed_20260512.md
    feedback_modal_strategy_reevaluation_post_tier1_engineering_20260512.md
