notes: |
  E.7 K-sweep diagnostic variant. Sister of substrate_vq_vae_modal_a100_dispatch.yaml
  (full 2000ep production dispatch); this variant is the diagnostic smoke that
  empirically validates the Wave 2A Pareto-pole hypothesis BEFORE the
  full-substrate K wire-in wave.

  Council T3 Finding 1 directive (op-routable #1):
  "dispatch K-sweep paired-comparison smoke ($1-3 Modal T4) on D4 or
  sane_hnerv: K in {2, 4, 8, 16, 32, 64, 256} at lambda=1.0 to empirically
  validate the Pareto pole"

  Why VQ-VAE substrate (not D4 or sane_hnerv): the VQ-VAE substrate IS the
  canonical persistent-codebook substrate (van den Oord 2017); the K-sweep
  here is the direct test on the substrate-of-canonical-VQ-design. D4/sane_hnerv
  K-sweeps would be follow-on lanes.

  K dispatch matrix:
    K=2:   per-cell rate = 1 bit;  ~768 B + codebook 32 B
    K=4:   per-cell rate = 2 bits; ~1536 B + codebook 64 B
    K=8:   per-cell rate = 3 bits; ~2304 B + codebook 128 B
    K=16:  per-cell rate = 4 bits; ~3072 B + codebook 256 B  (smoke default)
    K=32:  per-cell rate = 5 bits; ~3840 B + codebook 512 B
    K=64:  per-cell rate = 6 bits; ~4608 B + codebook 1024 B  (Wave 2A anti-Pareto)
    K=128: per-cell rate = 7 bits; ~5376 B + codebook 2048 B
    K=256: per-cell rate = 8 bits; ~6144 B + codebook 4096 B  (Wave 2A anti-Pareto)

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py.

  Per CLAUDE.md "PER-SUBSTRATE OPTIMAL FORM via adversarial grand council
  symposium" (Catalog #325): convocation pending operator approval.

  Per CLAUDE.md "Forbidden premature KILL without research exhaustion": this
  K-sweep is an empirical-anchor research dispatch, NOT a kill verdict. Any
  K-value that under-performs at 100ep smoke is DEFERRED-pending-research
  (e.g. longer epochs may rescue large-K underutilization).

