risk: |
  K-sweep paired-comparison diagnostic smoke. Each K value (K in {2, 4, 8, 16,
  32, 64, 128, 256}) is independently trained for 100 epochs at lambda=1.0
  with identical seed/config; final auth-eval score recorded per K.

  Architectural risks per K:
  (a) K=2 collapse risk - 2-codeword codebook may collapse to mode-averaged
      outputs (vanDenOord council dissent); empirical anchor IS the question.
  (b) K=256 codebook utilization - large codebook may underutilize without
      sufficient training signal at 100ep smoke (typical full VQ-VAE training
      runs 1000s of epochs to populate large K).
  (c) Lambda=1.0 selectivity - the Pareto pole is reported at lambda=1.0
      specifically; the K-optimum may shift at other lambda values.

  Single-axis [contest-CUDA] acceptable for empirical anchor; CPU axis
  required separately for promotion claims.

envelope_status: "FITS $5 envelope at p50 fallback (8 K-values * $0.30 = $2.40)"

remote_driver: scripts/remote_lane_substrate_vq_vae.sh
timeout_hours: 1.5

