required_input_files_trainer: experiments/train_substrate_vq_vae.py

# K-sweep parameterization: VQ_VAE_CODEBOOK_SIZE drives --codebook-size flag.
# Operator dispatch fires 8 separate dispatches (one per K-value) by varying
# this env var, OR a sister harness wraps multi-K iteration.
env_overrides:
  VQ_VAE_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  VQ_VAE_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  VQ_VAE_OUTPUT_DIR: /workspace/pact/lane_substrate_vq_vae_k_sweep_results/output
  VQ_VAE_EPOCHS: "100"
  VQ_VAE_BATCH_SIZE: "16"
  VQ_VAE_UPSTREAM_DIR: /workspace/pact/upstream
  VQ_VAE_DEVICE: cuda
  VQ_VAE_CODEBOOK_SIZE: "${VQ_VAE_CODEBOOK_SIZE:-16}"
  VQ_VAE_ALPHA_RATE: "1.0"
  LOCAL_CUDA_WORKER: "1"

dependencies:
