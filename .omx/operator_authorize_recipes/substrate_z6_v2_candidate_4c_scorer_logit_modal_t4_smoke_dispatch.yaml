notes: |
  This recipe deliberately does not modify the existing Candidate 1 recipe.
  Candidate 1 remains the capacity-unwind branch; Candidate 4c is the
  side-info-channel branch. Operator choice is still required before spending,
  but the 4c dispatch surface is now concrete, auditable, and explicitly
  diagnostic-only under Modal training.

  Recommended dry-run before spend:
    .venv/bin/python tools/run_modal_smoke_before_full.py \
      --recipe substrate_z6_v2_candidate_4c_scorer_logit_modal_t4_smoke_dispatch \
      --operator-handle codex:z6_candidate4c_scorer_logit \
      --dry-run

