schema_version: 1
name: substrate_z6_v2_candidate_4c_scorer_logit_modal_t4_smoke_dispatch
lane_id: lane_z6_v2_candidate_4c_scorer_logit_conditioning_20260518

# Z6-v2 Candidate 4c: Atick side-information-channel branch.
# This is a distinct lane from Candidate 1. Candidate 1 tests whether
# increasing FiLM capacity rescues the original PoseNet-projection ego source.
# Candidate 4c tests whether the side-information source itself was the
# bottleneck by keeping the single-layer Z6 predictor and replacing the ego
# source with compress-time scorer-logit features.

research_only: false
dispatch_enabled: true
dispatch_blockers: []

summary: |
  Z6-v2 Candidate 4c scorer-logit conditioning recipe. Uses the canonical
  Z6 single-layer FiLM predictor but sets `Z6_EGO_SOURCE=scorer_logit`, so the
  trainer derives the fixed-width ego buffer from compress-time SegNet logits
  plus PoseNet head features. Inflate remains scorer-free because only the
  reduced side-info vector is packed into the existing Z6PCWM1 ego-motion
  section.

platform: modal
gpu: "${MODAL_GPU:-T4}"
min_vram_gb: 14
min_smoke_gpu: "T4"
video_input_strategy: per_dispatch_local_copy
pyav_decode_strategy: cpu_thread_async_upload
target_modes:
  - contest_one_video_replay
  - contest_generalized
  - research_substrate
canary_status: post_canary_dependent
canary_dependency: time_traveler_l5_z6

active_dispatch_contract: z6_v2_candidate_4c_scorer_logit_substrate
dispatch_contracts:
  - id: z6_v2_candidate_4c_scorer_logit_substrate
    archive_role: monolithic_z6pcwm1_self_contained_with_disambiguator_sidecar
    builder_surface: experiments/train_substrate_time_traveler_l5_z6.py
    status: active_recipe_contract
    exact_eval_path: archive.zip -> submission/inflate.sh -> experiments/contest_auth_eval.py --device cuda

cost_band:
  epochs: 300
  smoke_score_band: [0.13, 0.25]
  predicted_cuda_band: [0.11, 0.17]
  predicted_cost_usd: 13.0
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 10.0
  platform_key: modal
  gpu_key: T4

predicted_score_target: null
predicted_band: [0.11, 0.17]
smoke_score_band: [0.13, 0.25]
predicted_delta: "[0.11, 0.17] band [planning-prior; Path B design memo section 4.4c; HIGH VARIANCE pending paired CPU/CUDA empirical anchor]"
predicted_delta_basis: ".omx/research/z6_v2_cargo_cult_unwind_4_candidate_redesign_path_b_20260517.md section 4.4c + council_per_substrate_symposium_atw_v2_reactivation_20260518.md Revision #5"
provenance_kind: predicted_from_model
literature_anchor: |
  Atick-Redlich cooperative-receiver theorem; Rao-Ballard predictive coding;
  Z6 Phase 3 council Revision #6; ATW V2 reactivation symposium Revision #5.

source_supports: |
  Candidate 4c directly tests Atick's side-information-channel critique:
  Z6-v1 and Candidate 1 both preserve the PoseNet-projection ego sidecar,
  while Candidate 4c enriches the side-info with scorer-logit signals derived
  at compress time. This can validate or falsify the scorer-logit channel for
  both Z6 and ATW V2-1 without loading scorers at inflate time.

paper_claim_scope: |
  This recipe is not a score claim. It is a launchable empirical probe for the
  side-information-source hypothesis. Promotion requires harvested paired
  CPU/CUDA auth-eval artifacts, archive bytes/SHA-256, runtime custody,
  component distances, and terminal lane-claim rows.

pact_must_prove: |
  Candidate 4c must prove that scorer-logit-derived side-info beats the
  identity-predictor control by `full_minus_identity_score <= -0.005`
  at contest-CUDA (equivalently `identity_minus_full_score >= 0.005`, since
  lower score wins) and that the rate/seg/pose tradeoff lands below the current
  exact frontier on the same archive/runtime axis. A DEFER outcome on 4c
  updates the ATW V2-1 channel choice toward per-region histograms per the ATW
  V2 symposium.

decode_complexity_evidence: |
  Inflate complexity is unchanged from Z6-v1. The scorer-logit extraction is
  compress-time only; the archive stores the reduced ego buffer and the runtime
  consumes it through the existing Z6PCWM1 inflate path.

risk: |
  Candidate 4c is higher leverage than a Candidate 1 re-fire because it gates
  ATW V2-1's scorer-logit channel choice. The risk is that the compressed
  scorer-logit summary may still have low mutual information with the latent
  stream; that is an empirical DEFER, not a method kill. Dirty worktree
  dispatch still requires the Catalog #202 paired-env attestation and the
  Catalog #166 worker-side sentinel hash check.

envelope_status: "FITS $13 Candidate 4c envelope per Path B design memo section 4.4c ($1 smoke + $0.50 CPU + $10 full + $1.50 paired)"

