summary: |
  Z3-G1 scorer-class-conditional gating substrate — Wunderkind G1
  SUBSTITUTION-1:1 spec
  (`feedback_wunderkind_visionary_scorer_as_cooperative_receiver_paradigm_shift_20260515.md`).
  Replaces Z3 v2's per-pair Ballé hyperprior MLP with a per-class sigma TABLE
  (5 classes * 28 dims = 140 params, ~80B int8 brotli'd) indexed by SegNet's
  per-pair dominant class (computed at compress-time only — Catalog #6
  strict-scorer-rule preserved at inflate).

  Mechanism:

      For each pair p in range(600):
          class_p = mode of SegNet(GT_frame_0_p).argmax(1)  in [0, 4]
          sigma_p = sigma_table[class_p, :]   (28-dim per-dim scale)
          AC-encode residual_p under N(0, sigma_p^2)

  Production-safe form: ships direct-residual mode (matches Z3 v2 production
  packet). The G1 sigma table + class indices are TRAINING-TIME diagnostics
  until an entropy-coded decoder consumes them at inflate. This makes the
  G1 packet IDENTICAL on the wire to Z3 v2 — the only difference is the
  TRAINING-TIME loss function uses class-conditional sigmas.

  Predicted ΔS = -0.005 to -0.015 vs A1 0.1928 [contest-CPU 1to1]
  ``[prediction; first-principles-bound]``. Cost ~$5-10 (paired CPU+CUDA
  Modal T4 anchor per CLAUDE.md "Submission auth eval — BOTH CPU AND CUDA").

