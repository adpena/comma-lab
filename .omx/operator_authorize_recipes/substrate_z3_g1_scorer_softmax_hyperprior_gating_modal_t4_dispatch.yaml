predicted_delta_basis: |
  Wunderkind G1 cooperative-receiver substitution: replaces Z3 v2's per-pair
  hyperprior MLP (~1.8k params; ~1KB int8 brotli'd) with a per-class sigma
  TABLE (5 * 28 = 140 params; ~80B int8 brotli'd). The class index per pair
  ships as 1 byte (~200B brotli for 600 pairs). Math sanity:
  - Bits saved by class conditioning: H(latent) - H(latent | class).
  - For SegNet's 5-class output on driving scenes class entropy ~1.8 bits/pixel.
  - Conditional latent entropy reduction estimated 5-15% of marginal latent
    entropy (Ballé 2018 hyperprior achieves ~30%; G1 class-conditioning is
    coarser ~5-15%).
  - Rate basis: A1 archive rate ~0.20. 5-15% reduction = -0.010 to -0.030
    rate-only. Predicted band -0.005 to -0.015 (haircut for distillation
    imperfection + non-stationary class statistics).
  Production-safe form ships direct-residual mode (identical wire to Z3 v2);
  the training-time class-conditional sigma table influences how the AC coder
  shapes residual statistics. Empirical confirmation requires paired CPU+CUDA
  auth eval on the trained packet.
literature_anchor: |
  Wunderkind G1 SUBSTITUTION-1:1 spec
  (`feedback_wunderkind_visionary_scorer_as_cooperative_receiver_paradigm_shift_20260515.md`)
  +
  Ballé, Minnen, Singh, Hwang, Johnston (2018) "Variational image compression
  with a scale hyperprior" ICLR 2018 arXiv:1802.01436;
  Slepian-Wolf (1973) "Noiseless coding of correlated information sources";
  Atick & Redlich (1990) "Towards a theory of early visual processing";
  Hinton & Vinyals (2014) "Distilling the knowledge in a neural network".
council_phase_5_prediction: 0.185

risk: |
  Z3-G1 first paired Modal T4 dispatch. Predicted band [0.178, 0.190] is a
  first-principles synthesis (Wunderkind G1 spec + Ballé 2018 amortization +
  conservative class-entropy estimate), NOT measurement.

  The G1 substitution is contest-legal at compress-side only:
  - COMPRESS: SegNet runs on GT frames to compute per-pair class indices
    (FREE per CLAUDE.md "Strict scorer rule" rule #2).
  - INFLATE: NO scorer load (production-safe direct-residual mode reuses
    Z3 v2 grammar; G1 sigma table + class indices are training diagnostics).

  Architectural risk:
  - At A1's 99.29% scorer-conditional MDL density (Z1 ablation EUREKA finding)
    the within-class encoder is structurally saturated. The G1 across-class
    move depends on SegNet class actually disambiguating per-pair latent
    statistics. If class membership is uncorrelated with residual entropy,
    delta will be at the LOW end of the predicted band (~0).
  - The production-safe direct-residual form means BYTE SAVINGS in the SHIPPED
    archive equal Z3 v2's (the residual coder is the same). The G1 win comes
    from TRAINING-TIME shaping of residual statistics under a class-conditional
    prior. Empirical confirmation requires paired CPU+CUDA auth eval.

  Modal T4 training is diagnostic unless the auth-eval contract itself records
  score_axis=contest_cuda and score_claim_valid=true. CPU axis remains required
  separately on Linux x86_64 before any frontier-claim language.

