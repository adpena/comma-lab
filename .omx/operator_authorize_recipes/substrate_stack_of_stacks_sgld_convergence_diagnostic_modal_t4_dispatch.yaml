  platform_key: modal
  gpu_key: T4

# Catalog #324: predicted_band_validation_status MUST be declared. This is a
# convergence-diagnostic NOT a score-lowering dispatch; predicted_band is narrow
# (final score near baseline; we measure CONVERGENCE not delta).
predicted_band: [0.190, 0.210]
predicted_band_validation_status: pending_post_training
predicted_band_reactivation_criteria: |
  Post-training Tier-C density re-measurement IS the convergence diagnostic.
  Per-t_final dispatch records SGLD loss every 0.1*t_final to t_final; plateau
  identification is the dispatch's primary output. The score-band claim is
  secondary diagnostic ([0.190, 0.210] = score is bounded near A1 baseline
  since this is a custody-canary single-arm SGLD polish on the existing A1
  substrate, NOT a score-lowering multi-arm stack dispatch).

predicted_score_target: 0.20
predicted_delta: "convergence-diagnostic; score near A1 baseline 0.193; primary output is CONVERGENCE PLATEAU not score reduction [predicted; council T2 Finding 2]"
predicted_delta_basis: ".omx/research/council_t2_finding_2_sgld_t_final_ceiling_cap_20260518.md"
literature_anchor: "Welling & Teh (2011) SGLD; Wave 2A row #8 analytical t_final=17.4 formula vs cap=1.0 cost-band budget"
council_verdicts:
  COUNCIL_T2_FINDING_2: "PROCEED_WITH_REVISIONS; op-routable #1 directs convergence-diagnostic smoke sweep"

risk: |
  SGLD convergence-diagnostic smoke. Each t_final-CAP value (in {0.5, 1.0,
  2.0, 5.0, 10.0, 17.4}) is independently trained for 100 epochs with
  identical seed/config except for `--langevin-t-init <CAP>` (the temperature
  schedule UPPER BOUND; trainer's `--langevin-t-final` default 1e-4 is the
  schedule's FINAL temperature which is NOT swept here).

  Ambiguity per Catalog #229 premise verification:
  - The council's "cap=1.0" referenced in Finding 2 is from Wave 2A row #8
    analytical formula vs cost-band cap, where "cap=1.0" means the COST-BAND
    BUDGET CAP on dispatch wall-clock (operator-set, derived from $5-15
    Modal T4 envelope), NOT a SPECIFIC LANGEVIN-SCHEDULE TEMPERATURE BOUND.
  - The trainer's `--langevin-t-final 1e-4` is the FINAL temperature of the
    cosine schedule (Welling-Teh canonical: temperature decays from t_init
    to t_final during polish epochs).
  - The K-sweep here interprets "t_final-CAP" as the SCHEDULE INIT TEMPERATURE
    UPPER BOUND (i.e. `--langevin-t-init <value>`) since the analytical
    formula t_final=17.4 vs cap=1.0 is the INIT TEMPERATURE comparison.

  Per CLAUDE.md "Forbidden empirical-claim-without-evidence-tag": this
  ambiguity is documented as op-routable in the DRAFT memo for operator
  resolution before dispatch.

  Architectural risks per t_final-CAP:
  (a) t_final=0.5: shortest dispatch (~50min on T4 at 100ep); fast convergence
      to non-stationary distribution (if Wave 2A formula t_final=17.4 is
      correct).
  (b) t_final=17.4: full canonical Wave 2A formula; longest dispatch (~17h
      extrapolated; will TIMEOUT at 1.5h `timeout_hours`); intentionally
      time-bounded to identify plateau within budget.
  (c) Convergence plateau identification: log SGLD loss every 0.1*t_final;
      plateau is where d(loss)/d(t_final) -> 0. Plateau t_final IS the
      empirically-correct cap; analytical formula may over-estimate.

envelope_status: "FITS $2 envelope at p50 fallback (6 t_final-values * $0.30 = $1.80; t_final=17.4 timeouts intentional)"

