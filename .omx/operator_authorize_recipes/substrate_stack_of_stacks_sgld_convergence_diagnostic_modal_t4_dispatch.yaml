# Convergence-diagnostic parameterization: STACK_OF_STACKS_LANGEVIN_T_INIT_CAP
# drives the SGLD temperature schedule init temperature upper bound. Operator
# dispatch fires 6 separate dispatches (one per t_final-CAP value) by varying
# this env var, OR a sister harness wraps multi-t_final iteration.
env_overrides:
  STACK_OF_STACKS_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  STACK_OF_STACKS_BASE_ARCHIVE: /workspace/pact/submissions/a1/archive.zip
  STACK_OF_STACKS_BASE_RUNTIME_DIR: /workspace/pact/submissions/a1
  STACK_OF_STACKS_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  STACK_OF_STACKS_OUTPUT_DIR: /workspace/pact/lane_stack_of_stacks_sgld_convergence_results/output
  STACK_OF_STACKS_EPOCHS: "100"
  STACK_OF_STACKS_UPSTREAM_DIR: /workspace/pact/upstream
  STACK_OF_STACKS_DEVICE: cuda
  STACK_OF_STACKS_MIDDLE_ARM_SUBSTRATE_IDS: "a1"
  STACK_OF_STACKS_OUTER_K: "1"
  STACK_OF_STACKS_LANGEVIN_T_INIT_CAP: "${STACK_OF_STACKS_LANGEVIN_T_INIT_CAP:-1.0}"
  STACK_OF_STACKS_LANGEVIN_POLISH_EPOCHS: "100"
  LOCAL_CUDA_WORKER: "1"

