notes: |
  E.8 SGLD convergence-diagnostic variant. Sister of
  substrate_stack_of_stacks_modal_a100_dispatch.yaml (full multi-arm
  score-lowering dispatch, currently dispatch_enabled=false until L1 blockers
  clear). This variant is the diagnostic smoke that empirically validates the
  Wave 2A SGLD t_final=17.4 vs cap=1.0 ambiguity BEFORE the multi-arm wire-in.

  Council T2 Finding 2 directive (op-routable #1):
  "dispatch convergence-diagnostic smoke ($0.50-1.50 Modal T4): SGLD on
  stack_of_stacks substrate, log loss every 0.1*t_final to t_final=2.0;
  identify plateau"

  This recipe SLIGHTLY EXCEEDS the council's $0.50-1.50 envelope ($1.80) by
  including t_final={5.0, 10.0, 17.4} for full curve coverage. The
  council-approved minimum is t_final={0.5, 1.0, 2.0}; the extended sweep is
  operator-routable as a separate decision.

  t_final-CAP dispatch matrix:
    t_init=0.5:  short dispatch ~50min; if plateau reached here, cap is correct
    t_init=1.0:  council reference; if plateau reached here, cap is correct
    t_init=2.0:  Welling-Teh practical default; if plateau reached here, cap
                 needs raising
    t_init=5.0:  intermediate; if plateau reached here, formula needs review
    t_init=10.0: near-Wave-2A; if plateau reached here, formula is correct but
                 cost-band cap is wrong
    t_init=17.4: full Wave 2A formula; if plateau reached here, full formula
                 is correct (dispatch will TIMEOUT intentionally - we identify
                 plateau via the time-bounded log)

  Per Catalog #229 premise verification ambiguity: this recipe interprets
  "t_final-CAP" as the SCHEDULE INIT TEMPERATURE UPPER BOUND. If operator
  ratifies different interpretation, recipe needs update.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py.

  Per CLAUDE.md "PER-SUBSTRATE OPTIMAL FORM via adversarial grand council
  symposium" (Catalog #325): convocation pending operator approval.

  Per CLAUDE.md "Forbidden premature KILL without research exhaustion": this
  convergence-diagnostic is an empirical-anchor research dispatch, NOT a kill
  verdict. The Welling-Teh SGLD paradigm is canonical; what's tested here is
  the OPERATING POINT not the paradigm.

