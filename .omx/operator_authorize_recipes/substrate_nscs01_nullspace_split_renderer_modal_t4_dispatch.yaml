notes: |
  NSCS01 nullspace-split-renderer L1 SCAFFOLD smoke recipe.

  ``smoke_only: true`` and ``research_only: true`` per Catalog #240
  sister-protection: the trainer's _full_main raises NotImplementedError
  pending Phase 2 council green-up. Smoke-only dispatches are
  operator-authorized; the smoke verifies the export contract (NSP1
  archive bytes) end-to-end via the canonical inflate.sh + raw-output
  pipeline, but does NOT load scorers and does NOT produce a contest-CUDA
  score claim.

  Architecture: split-head per-pair-latent renderer.
  * frame_0_head: small (HEAD0_BITS=4 default; PoseNet-only training target).
  * frame_1_head: large (HEAD1_BITS=8 default; SegNet+PoseNet target).
  * Per-pair latents: 600 * latent_dim entries at LATENT_BITS=12 default.

