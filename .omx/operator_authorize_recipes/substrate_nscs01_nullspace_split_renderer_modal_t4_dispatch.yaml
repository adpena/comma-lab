summary: |
  NSCS01 nullspace-split-renderer substrate (assumptions-challenge audit
  NSCS01) — exploits the SegNet last-frame-only structural assumption.

  Mechanism (design memo §1-2):

  Per upstream/modules.py:108 SegNet's preprocess_input slices
  ``x[:, -1, ...]`` and so frame[0] is in the SegNet structural NULLSPACE.
  PoseNet uses BOTH frames. Therefore byte-rate spent on frame[0] beyond
  what PoseNet needs is WASTED. NSCS01 exploits this with a TWO-HEAD
  renderer:

  * frame_0_head: small (~30K params target, 4-bit packed) — trained ONLY
    against PoseNet (frame_0 is in SegNet's nullspace by construction).
  * frame_1_head: full (~150K params target, 8-bit packed) — trained
    against both SegNet (last-frame) AND PoseNet (frame-1).

  Score movement is unranked until frame-0/frame-1 PoseNet gradient norms and
  the head0 CNN-vs-MLP probe land. SegNet last-frame nullspace is a hypothesis
  for the next measured probe, not a dispatch-ranking claim.

  Distinction from sister D4 ``substrate_d4_wyner_ziv_frame_0``:
  D4 DERIVES frame[0] from frame[1] via Wyner-Ziv motion + residual.
  NSCS01 RENDERS both frames from the same per-pair latent but with
  DIFFERENT per-head architectures + bit-widths. The two are STRUCTURALLY
  DISTINCT and could compose: a future variant could use NSCS01's
  frame_1_head + D4's Wyner-Ziv frame_0 derivation.

  Predicted band [0.148, 0.178] ``[mathematical-derivation; first-principles-bound]``.

  L1 SCAFFOLD landing 2026-05-15: trainer's _full_main is council-gated
  (NotImplementedError) per CLAUDE.md "Substrate scaffolds MUST be COMPLETE
  or RESEARCH-ONLY" until the smoke + Tier C ablation land. Smoke-only
  dispatch remains disabled until the head0 architecture disambiguator and
  paired-axis plan land; full dispatch requires Phase 2 council green-up.

