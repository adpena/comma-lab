risk: |
  L1 SCAFFOLD first-anchor dispatch. The substrate is NOVEL — split-head
  per-pair-latent renderer with different per-head bit-widths has NOT been
  empirically anchored against the contest video.

  Architectural risk:
  - frame_0_head may collapse to constant if the PoseNet gradient is
    insufficient to drive its parameters (the lambda_pixel_0 auxiliary
    pixel-MSE keeps an anchor signal).
  - Per-head bit-width split assumes frame_0 tolerates 4-bit quantization;
    if it does not, the predicted ΔS collapses. Reactivation criterion
    (design memo §10): try HEAD0_BITS=6 if 4-bit fails.
  - The two-head architecture roughly doubles the renderer parameter budget
    vs a single canonical renderer; the rate term grows accordingly. The
    bet is that the frame_0-head bit-width compression more than recovers
    the parameter cost.

  Modal T4 training is diagnostic while this recipe is dispatch_enabled:false.
  Future promotion requires the auth-eval contract itself to record
  score_axis=contest_cuda and score_claim_valid=true, plus a separate CPU axis
  on Linux x86_64 before any frontier-claim language (CLAUDE.md "Submission
  auth eval — BOTH CPU AND CUDA").

