schema_version: 1
name: substrate_block_nerv_modal_a100_dispatch
lane_id: lane_substrate_block_nerv_20260512
summary: block_nerv first-anchor dispatch on Modal A100 (DEFERRED - MEDIUM-target HNeRV-family architectural twist).

dispatch_enabled: false
research_only: false
defer_reason: |
  MEDIUM-target HNeRV-family dispatch is intentionally held behind the
  HIGH-target substrate anchors (SIREN, Cool-Chic, VQ-VAE, self_compress_nn,
  balle_renderer). The trainer, wrapper, and remote driver exist, but this
  lane should not consume paid GPU before at least one HIGH-target substrate
  lands a smoke-green exact-eval path or the operator explicitly reroutes the
  priority queue. This is a routing defer, not an infrastructure gap.
dispatch_blockers:
  - high_target_substrate_anchor_required
  - modal_smoke_not_yet_green

platform: modal
gpu: "${MODAL_GPU:-A100}"
min_vram_gb: 40
video_input_strategy: per_dispatch_local_copy
canary_status: post_canary_dependent
canary_dependency: sane_hnerv

cost_band:
  epochs: 2000
  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 8.00
  platform_key: modal
  gpu_key: A100

predicted_score_target: 0.19
predicted_delta: "-0.003 to +0.007 vs PR101 0.193 [predicted; council Phase 5 MEDIUM]"
predicted_delta_basis: ".omx/research/grand_council_fields_medal_substrate_design_20260512.md#block_nerv"
literature_anchor: "Chen et al. - 'HNeRV: A Hybrid Neural Representation for Videos' NeurIPS 2023 + per-pair LoRA hypothesis (council Phase 5 + Hu et al. 'LoRA' 2021)"
council_phase_5_prediction: 0.19

risk: |
  WAVE-3-B MEDIUM-target dispatch on Modal A100. block_nerv adds per-pair
  LoRA-style residuals on the latent embedding (lora_latent_bias + lora_embed_gain)
  on top of the shared SIREN+PixelShuffle base. ~38K additional params encoded
  as int16+int8 in the BNV1 archive grammar; the per-pair tables let the optimizer
  over-specialize to individual frame-pairs' SegNet/PoseNet idiosyncrasies that
  a single shared decoder cannot capture.

  Architectural risk: the per-pair-gain (multiplicative) can amplify gradient
  magnitudes for pairs with extreme latent values. grad_clip=1.0 + lambda init
  at zero (lora_latent_bias zeros, lora_embed_gain ones) guards against this.
  The BNV1 grammar carries THREE quantized sections (int16 latents, int16 LoRA
  bias, int8 LoRA gain); quantization-induced parameter drift across reload is
  real but bounded by the int16/int8 scale tracking in JSON meta. Trainer
  _full_main wires 15 stages including auth eval at stage 12. Single-axis
  [contest-CUDA] acceptable for first anchor; CPU axis required separately
  before promotion.
envelope_status: "FITS $20 envelope at p50 fallback"

remote_driver: scripts/remote_lane_substrate_block_nerv.sh
timeout_hours: 4.0

required_input_files:
  - flag: --video-path
    default_path: upstream/videos/0.mkv

modal:
  lane_script: scripts/remote_lane_substrate_block_nerv.sh
  cost_band_trainer: experiments/train_substrate_block_nerv.py
  cost_band_epochs: 2000
  cost_band_batch_size: 32
  cost_band_all_flags_on: true

required_input_files_trainer: experiments/train_substrate_block_nerv.py

env_overrides:
  BLOCK_NERV_DISPATCH_INSTANCE_JOB_ID: "${INSTANCE_JOB_ID}"
  BLOCK_NERV_VIDEO_PATH: /workspace/pact/upstream/videos/0.mkv
  BLOCK_NERV_OUTPUT_DIR: /workspace/pact/lane_substrate_block_nerv_results/output
  BLOCK_NERV_EPOCHS: "2000"
  BLOCK_NERV_UPSTREAM_DIR: /workspace/pact/upstream
  BLOCK_NERV_DEVICE: cuda
  LOCAL_CUDA_WORKER: "1"

dependencies:
  - scripts/remote_lane_substrate_block_nerv.sh
  - upstream/videos/0.mkv
  - experiments/train_substrate_block_nerv.py
  - tools/validate_dispatch_required_inputs.py (Catalog #152)

notes: |
  WAVE-3-B MEDIUM-target HNeRV-family architectural twist. Tests whether
  per-pair LoRA-style specialization moves the HNeRV-family ceiling lower
  than the un-specialized sane_hnerv variant at the PR106 r2 operating
  point (pose_avg ~ 3.4e-5, pose marginal 2.71x SegNet's per CLAUDE.md
  'SegNet vs PoseNet - operating-point dependent').

  Architectural distinction vs sane_hnerv: shared SIREN+PixelShuffle base
  + per-pair tables (lora_latent_bias [int16] + lora_embed_gain [int8]).
  The score-aware Lagrangian is unchanged (same shape as sane_hnerv); the
  per-pair specialization is purely architectural.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

  Cross-ref:
