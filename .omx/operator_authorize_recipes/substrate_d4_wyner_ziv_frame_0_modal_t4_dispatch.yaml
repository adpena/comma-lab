  all_flags_on: true
  hand_calibrated_fallback_p50_usd: 10.00
  platform_key: modal
  gpu_key: T4

predicted_score_target: null
predicted_band: [0.148, 0.168]
smoke_score_band: [0.05, 0.50]
predicted_delta: "-0.025 to -0.045 vs PR101 0.193 [mathematical-derivation; first-principles-bound]"
predicted_delta_basis: ".omx/research/deep_math_geometry_manifolds_synthesis_20260514.md §3.5 (Wyner-Ziv duality) + §6 D4 description + §9 Shannon 1959 vector R(D)"
literature_anchor: |
  Slepian & Wolf (1973) IEEE Trans. Inf. Theory 19:471-480 DOI 10.1109/TIT.1973.1055037;
  Wyner & Ziv (1976) IEEE Trans. Inf. Theory 22:1-10 DOI 10.1109/TIT.1976.1055508;
  Pradhan & Ramchandran (2003) DISCUS IEEE Trans. Inf. Theory 49:626-643
    DOI 10.1109/TIT.2002.808103;
  Shannon (1959) "Coding theorems for a discrete source with a fidelity criterion"
    Bell Labs (vector R(D) - the deep-math memo §9 anchor);
  Lucas & Kanade (1981) IJCAI 7 (parametric optical flow);
  Rodrigues' rotation formula (1840; canonical SE(3) parameterization).
council_phase_5_prediction: 0.155

risk: |
  D4 substrate first-anchor dispatch. The substrate is NOVEL — per-pair SE(3)
  motion + photometric residual frame_0 derivation has NOT been empirically
  anchored against the contest video.  Predicted band [0.148, 0.168] is a
  literature-prediction synthesis (Wyner-Ziv 1976 + deep-math memo §3.5 +
  §6 D4 mechanism analysis), not measurement.

  Architectural risk:
  - Per-pair SE(3) motion assumes ego-motion-dominated scenes. The contest
    dashcam captures at 20 Hz with mostly forward driving, but lane changes
    and vehicle parallax break the parametric assumption. The OPTICAL_FLOW
    fallback mode handles parallax but pays a higher byte cost (30-50 KB
    flow vs 4-5 KB SE(3) after brotli).
  - The photometric residual is the dominant byte contribution at ~50-150 KB
    after brotli. The realized rate saving depends on the quality of the
    motion fit (better motion → smaller residual → smaller archive).
    Worst case: motion-residual error dominates PoseNet distortion and the
    predicted -0.025 to -0.045 ΔS collapses to -0.005.
  - The composition contract requires a BASE substrate. v1 ships with a
    synthetic smoke base for tests; production runs MUST register a real
    base substrate provider (A1 / PR101 / HDM8) before dispatch.

  Modal T4 training is diagnostic unless the auth-eval contract itself records
  score_axis=contest_cuda and score_claim_valid=true. CPU axis remains
  required separately on Linux x86_64 before any frontier-claim language.

