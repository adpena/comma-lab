summary: |
  D4 Wyner-Ziv frame-0 substrate (deep-math M7) — strongest single-substrate
  bet for sub-0.188 gate clearance per
  `.omx/research/deep_math_geometry_manifolds_synthesis_20260514.md` §6 D4.

  Mechanism (deep-math memo §3.1 + §3.5):

  Per upstream/modules.py:103-109 the SegNet contest scorer slices
  ``x[:, -1, ...]`` and so sees ONLY frame 1 of each pair; frame 0 is in the
  SegNet structural nullspace. Therefore frame 0 can be DERIVED at decode
  time from frame 1 + a low-rate side-info channel (Wyner-Ziv 1976 /
  Slepian-Wolf 1973):

      R_min(frame_0 | frame_1) = H(motion) + H(photometric_residual)
                              ≈ 24 B/pair (SE(3)) + ~5 KB/pair (residual)
                              ≈ 3,030 B/pair total

  The saved bytes from NOT encoding frame_0 directly amortize into a large
  rate-term Δ. Predicted ΔS -0.025 to -0.045 vs PR101 0.193 baseline
  ``[mathematical-derivation; first-principles-bound]``.

  Composition contract: D4 is a SIDECAR substrate that composes with a BASE
  substrate (A1, PR101, HDM8, sane_hnerv, ...). The BASE substrate provides
  frame_1 reconstruction; D4 carries the frame-0 derivation parameters
  (motion params + photometric residual) and the embedded BASE archive bytes
  for self-contained custody.

  Probe-disambiguator (Catalog #125 hook #6): two defensible motion-model
  interpretations ship as alternative modes (SE(3) parametric vs optical-flow
  non-parametric). The probe at `tools/probe_d4_motion_model_disambiguator.py`
  empirically arbitrates which mode best fits the contest video.

  Predicted band [0.148, 0.168] `[mathematical-derivation; first-principles-bound]`.

platform: modal
