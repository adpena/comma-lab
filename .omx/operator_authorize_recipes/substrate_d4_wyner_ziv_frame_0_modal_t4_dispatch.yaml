notes: |
  D4 Wyner-Ziv frame-0 substrate first-anchor dispatch recipe.

  The substrate is a single-archive WZF01 packet at 30-80 KB target. Motion
  params (4-5 KB SE(3) OR 30-50 KB optical-flow after brotli) + photometric
  residual (50-150 KB after brotli quantized int8) + embedded BASE substrate
  archive bytes (varies; A1 ~178 KB, PR101 ~178 KB). v1 dispatch composes
  with the BASE substrate specified via --base-archive-path; smoke uses a
  synthetic base.

  Per the deep-math memo ranking, D4 (M7) is the strongest single-substrate
  bet for sub-0.188 gate clearance (predicted ΔS -0.025 to -0.045 vs PR101
  0.193 baseline). The mid-cost Modal T4 dispatch (~$10 p50) makes this a
  strategic first-anchor for the Wyner-Ziv frame-0 derivation paradigm.

  PHASE 2 COUNCIL APPROVAL REQUIRED before --smoke=false dispatch. The
  trainer's `_full_main` raises NotImplementedError pending council green-up;
  smoke-only runs are operator-authorized.

  Predicted contest-CUDA score: 0.148-0.168 [mathematical-derivation;
  first-principles-bound] (NOT a score claim — score authority requires
  CUDA + CPU paired auth eval on 1:1 contest-CI hardware per CLAUDE.md
  "Submission auth eval — BOTH CPU AND CUDA").

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py
  uses .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

