risk: |
  L0 SCAFFOLD posture. Trainer _full_main raises NotImplementedError.
  Recipe is dispatch_enabled:false + research_only:true.

  Architectural distinction vs NeRV-family: coin_plus_plus uses a SHARED
  base coord-MLP + per-pair FiLM-modulation vectors (MOD_DIM=64 default).
  Per-pair latent is extremely small (~76 KB for 600 pairs at MOD_DIM=64
  + int8 quantization). Per-pair decode is O(H*W) coordinate sampling
  (inherent cost vs spatial-grid PixelShuffle decoders).

  Phase 2 council symposium MUST evaluate:
    (a) cargo-cult audit per Catalog #303 (MOD_DIM=64 + int8 quant +
        coord-MLP-vs-CNN-base TENSION all need empirical sweep);
    (b) 9-dim success checklist evidence per Catalog #294;
    (c) observability surface declaration per Catalog #305;
    (d) Dykstra-feasibility predicted-band per Catalog #296;
    (e) horizon-class declaration per Catalog #309;
    (f) per-substrate symposium 6-step contract per Catalog #325;
    (g) per-pair coordinate batching strategy (O(H*W) per pair is heavier
        than NeRV-family per-pair latent decode; training step time
        budget needs careful design).

envelope_status: |
  RESEARCH_ONLY: dispatch refused per recipe + trainer + 4 catalog gates
