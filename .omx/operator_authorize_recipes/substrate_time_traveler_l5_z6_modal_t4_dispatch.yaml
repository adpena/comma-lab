literature_anchor: |
  Rao & Ballard (1999) "Predictive coding in the visual cortex: a functional
    interpretation of some extra-classical receptive-field effects"
    Nature Neuroscience 2(1):79-87;
  Atick-Redlich (1990) cooperative-receiver theorem;
  Perez et al. (2017) "FiLM: Visual Reasoning with a General Conditioning Layer";
  Design memo commit aa412d2db: feedback Z6/Z7/Z8 design.

source_supports: |
  Source theorems Rao-Ballard 1999 (predictive coding in visual cortex; HARD-EARNED at
  neuroscience level) + Atick-Redlich 1990 (cooperative-receiver theorem; HARD-EARNED at
  theorem level) + Perez 2017 (FiLM modulation; HARD-EARNED at deep-learning level)
  empirically demonstrate predictive-coding paradigm at neuroscience + theorem +
  modulation surfaces. Z6 applies these to per-pair latent forecasting for video
  archive bytes.

paper_claim_scope: |
  Source papers establish the predictive-coding paradigm IS architecturally distinct
  from non-predictive baselines (Rao-Ballard); the cooperative-receiver theorem proves
  the rate bound shrinks from H(X) to H(X|f_R(X)) (Atick-Redlich); FiLM modulation
  IS a well-cited simple architecture for conditional modulation (Perez 2017). None
  of these papers makes claims about contest-CUDA archive byte savings on the Pact
  scorer; that surface is the Z6 empirical anchor target.

pact_must_prove: |
  Z6 must empirically prove on paired CPU/CUDA: (a) the FiLM predictor's residual
  encoding produces lower H(residual) than H(latent) on contest video; (b) the
  bit-savings exceed the predictor weight overhead (~50 KB); (c) the score-aware
  Lagrangian convergence lands within the predicted [0.13, 0.16] band; (d) the
  identity-predictor disambiguator probe shows full-FiLM beats identity by ΔS
  ≥ 0.005 (refutes capacity-hypothesis null).

decode_complexity_evidence: |
  Inflate runtime is ~120 LOC substrate-engineering waiver per HNeRV parity L4.
  Per-pair autoregressive unroll: 600 pair iterations × (FiLM modulation +
  single conv + 1x1 projection + decoder PixelShuffle blocks). T4 single-pair
  decode estimated <50ms per pair → <30s total per video on T4; well within the
  30 min contest inflate wall-clock budget.

risk: |
  Z6 Phase 1b trainer _full_main is implemented, but this recipe is still
  intentionally non-dispatchable (`research_only: true`,
  `dispatch_enabled: false`) pending Phase 2 council consensus and the
  smoke-before-full gate. The substrate is the FIRST F-asymptote
  predictive-coding world-model trajectory variant. Predicted [0.13, 0.16] band
  is a Dykstra-feasibility-validated planning prior; NOT measurement.

  Architectural risk:
  - The FiLM predictor adds ~50 KB of FP4-quantized weights; if the residual
    savings DO NOT exceed the predictor overhead, total bytes grow (BAD for
    rate term). Smoke verifies grammar; full training tests the entropy-
    reduction hypothesis.
  - Autoregressive unroll across 600 pairs at training time multiplies
    wall-clock by ~3-5x vs Z5 baseline. T4 batch_size=4 is the empirical floor;
    A10G or 4090 reduce wall-clock but increase $/hr.
  - The probe-disambiguator (identity_predictor ablation) is the
    pre-promotion test. If full FiLM does NOT beat identity by ΔS >= 0.005,
    Rao-Ballard predictive-coding is refuted on this scorer.
  - Ego-motion proxy quality matters: zeros (no ego-motion) reduces to
    identity-predictor-with-extra-params; PoseNet-projected ego-motion
    is the canonical signal.

  Modal T4 training cost band: $1 smoke (1-epoch + roundtrip); $10 full
  (300 epochs scorer-aware + autoregressive unroll). Per CLAUDE.md "Auth
  eval EVERYWHERE" the dispatch MUST end with CUDA auth eval on EMA shadow.

