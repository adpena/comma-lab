summary: |
  Z6 Time-Traveler L5 F-asymptote-node predictive-coding world-model
  substrate (FiLM-conditioned next-frame predictor; LOWEST engineering risk
  of the Z6/Z7/Z8 sequenced trajectory) per Z6/Z7/Z8 scoping design memo
  `.omx/research/time_traveler_l5_z6_z7_z8_predictive_coding_world_models_asymptotic_pursuit_scoping_design_20260516.md`
  (commit `aa412d2db`).

  Mechanism (Rao & Ballard 1999 predictive-coding + Atick-Redlich 1990
  cooperative-receiver):

  Single-layer FiLM-conditioned conv predicts z_t from z_{t-1} + ego_motion;
  the FiLM MLP maps ego_motion vector -> per-channel (scale, shift)
  modulation. The archive stores only the residual r[t] = z[t] -
  predictor(z[t-1], ego_motion[t]); the predictor itself is a shared prior
  between encoder and decoder. The bit budget shrinks from H(latent) to
  H(residual) for stationary-ergodic driving video.

  Distinction from Z5 (sister staircase Step 3): Z6 SIMPLIFIES the predictor
  to a single FiLM-conditioned conv block (~75K params) vs Z5's 2-3 layer
  hierarchical recurrent predictor. Trades a small amount of predictive
  power for substantially lower engineering risk.

  Per design memo Section 22 op-routable #2: Z6 is recommended FIRST build
  because (a) lowest engineering risk; (b) sister Z5 L1 scaffold pattern
  proven; (c) first empirical anchor on predictive-coding paradigm; (d)
  sets up sequenced Z7/Z8 trajectory; (e) $12.50 total cost (smoke $1 +
  full $10 + paired $1.50).

  Predicted ΔS band [0.13, 0.16] [planning-prior; Dykstra-feasibility-
  validated per design memo Section 18; HIGH VARIANCE pending paired
  CPU/CUDA empirical anchor].

  Probe-disambiguator (Catalog #125 hook #6): identity_predictor ablation
  refutes/confirms Rao-Ballard. If full FiLM beats identity by ΔS >= 0.005,
  predictive-coding hypothesis confirmed.

