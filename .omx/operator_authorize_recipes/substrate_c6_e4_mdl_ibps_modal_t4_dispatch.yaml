notes: |
  C6 MDL-IBPS substrate first-anchor dispatch recipe.

  The substrate is a single-archive IBPS1 packet at ~100-200 KB target.
  Encoder (~35K params) + decoder (~80K params) + per-pair latent
  (~14K bytes int8) + sorted-keys JSON meta. v1 smoke produces ~94KB
  archive at smoke config (8-dim latent, 48x64 output); full config
  produces ~219KB random-init archive (compresses better after training).

  Per the floor v3 routing memo, C6 is the cheapest LARGEST-bet single
  substrate (EV/$ #1) with predicted ΔS -0.030 to -0.080. The substrate
  is the across-class shift Z1 ablation says is required for sub-0.10.

  Stage 0B smoke ($0.50 Modal T4) is the gating empirical test:
  - Score in band [0.10, 0.30] → smoke green; advance to Stage 1 full ($5)
  - Score outside band → DEFERRED-pending-research per CLAUDE.md (NOT KILL)

  Post-smoke probe-disambiguator: run Z1 MDL ablation on the C6 archive
  via `tools/mdl_scorer_conditional_ablation.py`. If MDL density < 0.90,
  the substrate-class shift is CONFIRMED.

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py
  uses .spawn(); harvest within 24h via tools/harvest_modal_calls.py.

  Per CLAUDE.md "Auth eval EVERYWHERE": dispatch ends with CUDA auth eval
  on EMA shadow. CUDA-only at this stage; paired CPU axis on Linux x86_64
  required before frontier-claim language per CLAUDE.md "Submission auth
  eval — BOTH CPU AND CUDA".

