risk: |
  WAVE-1-A HIGH-target dispatch on Modal A100. VQ-VAE pays log2(K) bits per
  spatial cell rather than 16 bits per float-latent, which is the discrete
  counterpart to cool_chic's continuous-AR latents. Architectural risks:
  (a) codebook COLLAPSE - too few codes get used; van den Oord 2017 reports
      this is the dominant failure mode; mitigated via persistent EMA codebook
      (decay=0.99) inside _quantize STE path; per-batch commitment loss
      (weight=0.25) pulls encoder output toward chosen codebook entries.
  (b) GRADIENT INTERRUPTION at quantizer - the straight-through estimator
      (Bengio 2013) bypasses the argmin; deeper substrates can suffer from
      bias near the codebook boundary; council default decoder_hidden=24 keeps
      the post-quantizer decoder simple enough that STE bias stays bounded.
  (c) CODEBOOK LR sensitivity - cosine annealing on weights, but codebook
      uses an EMA buffer so it does not see the LR schedule; this is the van
      den Oord prescription and has been stable in our smoke tests.
  Trainer _full_main wires 16 stages including auth eval at stage 12.
  Single-axis [contest-CUDA] acceptable for first anchor; CPU axis required
  separately before promotion.
envelope_status: "FITS $20 envelope at p50 fallback"

