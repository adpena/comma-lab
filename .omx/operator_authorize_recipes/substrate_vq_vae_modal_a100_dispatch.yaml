notes: |
  WAVE-1-A HIGH-target attack on PR101's 0.193 [contest-CUDA] gold via the
  discrete-rate-axis substrate distinction.

  VQ-VAE architectural distinction vs sane_hnerv (continuous latents) /
  cool_chic (continuous AR-coded latents) / siren (zero latents, all-MLP):
    Per-cell rate = log2(K) bits. With K=512, D=8, grid 48x64 (downsample=8):
      per-pair index bytes  = 48 * 64 * 2 frames * 9 bits / 8 = 6912 B
      codebook bytes        = 512 * 8 * 2 (fp16)             = 8192 B
      decoder bytes         = ~10K params * 2 (fp16)         = ~20000 B
      total per video       approximately 35K B (ignoring brotli savings)
    By comparison sane_hnerv carries continuous fp16 latents at 28 dim per
    pair * 600 pairs * 2 = 33600 B for latents alone. VQ-VAE compresses the
    SAME information through a much smaller per-cell bit budget, freeing
    bytes for codebook expressivity OR for a deeper decoder.

  van den Oord persistent codebook EMA (decay=0.99, NOT the weight EMA 0.997)
  is the established prescription from the NeurIPS 2017 paper. It is wired in
  the substrate's _quantize STE path; the trainer's tac.training.EMA(0.997)
  applies to ENCODER + DECODER + CODEBOOK weight tensors, while van den Oord's
  faster-decay 0.99 applies INSIDE the codebook update via the persistent
  N_c / m_c buffers (CLAUDE.md "EMA - non-negotiable" codebook exception).

  Per CLAUDE.md "Modal `.spawn()` HARVEST OR LOSE": modal_train_lane.py uses
  .spawn(); harvest within 24h via tools/harvest_modal_calls.py or
  experiments/modal_recover_lane.py.

