literature_anchor: "Witten-Neal-Cleary 1987 + Said 2004 (arithmetic coding fractional-bit precision over FEC6 k=16 palette)"

risk: |
  L0 SCAFFOLD posture. The trainer raises NotImplementedError on non-smoke
  path per Catalog #240. Recipe is dispatch_enabled:false + research_only:true.

  Architectural distinction: pact_nerv_selector_v2 extends the FEC6 fixed-
  Huffman k=16 frame-exploit selector with arithmetic coding (Witten 1987).
  The hypothesis (per CROSS-CANDIDATE finding #1 + PACT-NERV-ULTIMATE
  Variant #11): the FEC6 fixed-Huffman wastes fractional bits on every
  selector; arithmetic coding tightens code-length without changing the
  16-mode palette. Stage 1 dispatch evaluates whether the fractional-bit
  precision translates to ~30-100 bytes of additional rate savings on the
  current 178158-byte saturated HNeRV backbone.

envelope_status: |
  RESEARCH_ONLY: dispatch refused per recipe + trainer + 4 catalog gates
  (#220 + #240 + #315 + #325). Reactivation criteria documented in trainer
  _full_main docstring + this recipe's dispatch_blockers.

