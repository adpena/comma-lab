name: CI

# Mirrors what tools/preflight_hook.py runs locally on commit:
#   ruff check        — F821 + the project rule selection
#   tac.preflight     — 5-layer arity / profile / arch / filename / drift
#   pytest            — unit + property tests (fuzz)
#
# Strategic-secrecy note: this repo is private during the contest. CI runs
# inside GitHub Actions for our own confidence; nothing is published until
# the human explicitly approves submission per CLAUDE.md "Strategic Secrecy".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create venv + install deps
        run: |
          uv venv
          # Install only what the lint + preflight + non-GPU tests need.
          # Skipping torch's GPU wheels to keep CI fast; CPU torch is enough.
          uv pip install -e '.[dev]' || uv pip install -e .
          uv pip install ruff ty mypy hypothesis pytest pytest-timeout pytest-subtests pydantic numpy
          # CPU torch only — avoids 1+ GB CUDA download in CI.
          uv pip install --index-url https://download.pytorch.org/whl/cpu \
            'torch>=2.0,<3.0' || true

      - name: Ruff lint (F821 critical, full rule set warnings)
        run: |
          .venv/bin/ruff check --select F821 src/ experiments/ submissions/robust_current/ scripts/
          .venv/bin/ruff check src/ || true  # warnings non-blocking initially

      - name: Type check (Astral ty)
        # ty is gradual — fail only on unresolved-reference (NameError class).
        # Other diagnostics print but don't block during ramp-up.
        run: |
          .venv/bin/ty check 2>&1 | tee ty.log || true
          ! grep -q "error\[unresolved-reference\]" ty.log

      - name: Preflight validators (5 layers)
        run: |
          PYTHONPATH=src:upstream:$PWD .venv/bin/python -m tac.preflight

      - name: Pytest (unit + fuzz, no GPU)
        env:
          PYTHONPATH: src:upstream
        run: |
          .venv/bin/python -m pytest src/tac/tests/ \
            --ignore=src/tac/tests/test_scheduler_cli.py \
            -q --no-header -m "not slow"
